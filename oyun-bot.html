<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Oyun Botu - Testlik</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="logo">Testlik Oyun Botu</div>
    <nav>
      <a href="admin.html">Admin Paneli</a>
      <a href="oyun-bot.html" class="active">Oyun Botu</a>
    </nav>
  </header>

  <main>
    <form>
      <h2>🎮 Otomatik Oyun Ekle</h2>
      <label>Oyun Türü Seç</label>
      <select style="width: 100%; padding: 0.6rem; margin-bottom: 1rem;">
        <option>Hafıza Oyunu</option>
        <option>Refleks Oyunu</option>
        <option>Basit Puzzle</option>
        <option>Eğlenceli Trivia</option>
      </select>

      <label>Kaç Adet Oyun Oluşturulsun?</label>
      <input type="number" min="1" max="10" value="1" required />

      <button type="submit">Oyunları Üret</button>
    </form>
    <div style="text-align:center; margin-top:2rem;">
      <p>Üretilen oyunlar otomatik olarak siteye eklenecek şekilde yapılandırılır.</p>
    </div>
  </main>

  <footer>
    <p>© 2025 Testlik - Oyun Botu</p>
  </footer>
</body>
</html>
