<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Giriş Yap | Testlik.com</title>
  <meta name="description" content="Testlik.com - Giriş ve üye ol sayfası.">
  <link rel="stylesheet" href="styles.css" />
  <!-- Firebase ve main.js (main.js zorunlu değil, sadece eklemek istersen ekle) -->
  <script src="firebase.js" type="module"></script>
</head>
<body>
  <header>
    <div class="container">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link">Admin</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="test-card" style="max-width:350px;margin:2rem auto;">
      <h2>Giriş Yap</h2>
      <input id="email" type="email" placeholder="E-Posta" style="width:100%;margin-bottom:10px;">
      <input id="password" type="password" placeholder="Şifre" style="width:100%;margin-bottom:10px;">
      <button onclick="login()" class="cta-btn" style="width:100%;">Giriş Yap</button>
      <div id="login-status" style="color:red;margin-top:10px;"></div>
      <hr>
      <button onclick="register()" style="width:100%;margin-top:10px;">Üye Ol</button>
    </div>
  </main>
  <footer>
    <div class="container">
      <p>&copy; 2025 Testlik.com</p>
    </div>
  </footer>
  <script type="module">
    import { auth, db } from './firebase.js';

    window.login = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      auth.signInWithEmailAndPassword(email, password)
        .then(() => { window.location.href = "index.html"; })
        .catch(err => {
          document.getElementById("login-status").innerText = err.message;
        });
    }
    window.register = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      auth.createUserWithEmailAndPassword(email, password)
        .then(async (userCred) => {
          // Kayıt olan kullanıcıya Firestore'da bir profil belgesi aç
          await db.collection("users").doc(userCred.user.uid).set({
            email,
            displayName: "",
            avatar: "",
            points: 0,
            favorites: [],
            completedTests: [],
            withdrawals: []
          });
          window.location.href = "index.html";
        })
        .catch(err => {
          document.getElementById("login-status").innerText = err.message;
        });
    }
  </script>
</body>
</html>
