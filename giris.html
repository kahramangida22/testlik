<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Giriş Yap | Testlik.com</title>
  <meta name="description" content="Testlik.com - Hemen giriş yap veya ücretsiz kayıt ol!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .giris-kutu {background:#fff;max-width:350px;border-radius:23px;box-shadow:0 2px 22px #735aff13;margin:60px auto 40px auto;padding:39px 16px 31px 16px;}
    .giris-btn {width:100%;margin-bottom:9px;}
    .tablar {display:flex;justify-content:space-between;}
    .tablar div {cursor:pointer;font-weight:700;padding:8px 16px;border-radius:8px;}
    .tablar .aktif {background:#ed4a88;color:#fff;}
  </style>
</head>
<body>
  <main>
    <div class="giris-kutu">
      <div style="text-align:center;margin-bottom:12px;">
        <img src="logo.png" alt="Testlik.com" style="height:43px;">
      </div>
      <div class="tablar" style="margin-bottom:13px;">
        <div id="tab-giris" class="aktif">Giriş Yap</div>
        <div id="tab-kayit">Kayıt Ol</div>
      </div>
      <form id="form-giris">
        <input type="email" id="email-giris" placeholder="E-posta" required>
        <input type="password" id="pass-giris" placeholder="Şifre" required>
        <button class="btn giris-btn" type="submit">Giriş Yap</button>
        <div id="giris-hata" style="color:#ed4a88;text-align:center;margin-top:8px;min-height:20px;"></div>
      </form>
      <form id="form-kayit" style="display:none;">
        <input type="text" id="ad-kayit" placeholder="Kullanıcı Adı" required maxlength="22">
        <input type="email" id="email-kayit" placeholder="E-posta" required>
        <input type="password" id="pass-kayit" placeholder="Şifre" required>
        <button class="btn giris-btn" type="submit">Kayıt Ol</button>
        <div id="kayit-hata" style="color:#ed4a88;text-align:center;margin-top:8px;min-height:20px;"></div>
      </form>
    </div>
  </main>
  <footer>
    <p style="text-align:center;color:#7a53c4;font-size:.98em;">&copy; 2025 <b>Testlik.com</b> | Tüm Hakları Saklıdır</p>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script>
    // Tab geçişleri
    document.getElementById("tab-giris").onclick = function(){
      this.classList.add("aktif");
      document.getElementById("tab-kayit").classList.remove("aktif");
      document.getElementById("form-giris").style.display = "block";
      document.getElementById("form-kayit").style.display = "none";
    };
    document.getElementById("tab-kayit").onclick = function(){
      this.classList.add("aktif");
      document.getElementById("tab-giris").classList.remove("aktif");
      document.getElementById("form-giris").style.display = "none";
      document.getElementById("form-kayit").style.display = "block";
    };

    // Giriş işlemi
    document.getElementById("form-giris").onsubmit = function(e){
      e.preventDefault();
      const email = document.getElementById("email-giris").value.trim();
      const pass = document.getElementById("pass-giris").value;
      firebase.auth().signInWithEmailAndPassword(email, pass)
      .then(()=>window.location.href="index.html")
      .catch(err=>{
        document.getElementById("giris-hata").innerText = "Giriş başarısız: " + (err.message || "");
      });
    };

    // Kayıt işlemi
    document.getElementById("form-kayit").onsubmit = function(e){
      e.preventDefault();
      const ad = document.getElementById("ad-kayit").value.trim();
      const email = document.getElementById("email-kayit").value.trim();
      const pass = document.getElementById("pass-kayit").value;
      if(ad.length < 3){
        document.getElementById("kayit-hata").innerText = "Kullanıcı adı en az 3 karakter olmalı!";
        return;
      }
      firebase.auth().createUserWithEmailAndPassword(email, pass)
      .then(cred=>{
        return firebase.firestore().collection("users").doc(cred.user.uid).set({
          displayName: ad,
          email,
          point: 0,
          solvedTests: [],
          favorites: [],
          createdAt: new Date()
        }).then(()=>{
          return cred.user.updateProfile({ displayName: ad });
        }).then(()=>window.location.href="index.html");
      })
      .catch(err=>{
        document.getElementById("kayit-hata").innerText = "Kayıt başarısız: " + (err.message || "");
      });
    };
  </script>
</body>
</html>
