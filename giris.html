<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Testlik.com - Giriş / Kayıt</title>
  <link rel="stylesheet" href="index-style.css" />
  <script type="module" src="auth.js" defer></script>
  <style>
    .auth-container {
      max-width: 400px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    .auth-tabs {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .auth-tabs button {
      flex: 1;
      padding: 10px;
      font-weight: bold;
      border: none;
      background-color: #eee;
      cursor: pointer;
    }

    .auth-tabs button.active {
      background-color: #ff7e5f;
      color: white;
      border-radius: 10px;
    }

    .auth-form {
      display: none;
      flex-direction: column;
      gap: 15px;
    }

    .auth-form.active {
      display: flex;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .form-btn {
      background-color: #2ecc71;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .form-btn:hover {
      background-color: #27ae60;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">🎉 Testlik.com</div>
    <button class="btn" onclick="window.location.href='index.html'">⬅ Ana Sayfa</button>
  </header>

  <div class="auth-container">
    <div class="auth-tabs">
      <button id="tab-login" class="active">Giriş Yap</button>
      <button id="tab-register">Kayıt Ol</button>
    </div>

    <!-- Giriş Formu -->
    <div id="login-form" class="auth-form active">
      <input type="email" id="email" placeholder="E-posta" />
      <input type="password" id="password" placeholder="Şifre" />
      <button class="form-btn" onclick="login()">Giriş Yap</button>
    </div>

    <!-- Kayıt Formu -->
    <div id="register-form" class="auth-form">
      <input type="text" id="kullaniciAdi" placeholder="Kullanıcı Adı" />
      <input type="email" id="email" placeholder="E-posta" />
      <input type="password" id="password" placeholder="Şifre" />
      <button class="form-btn" onclick="register()">Kayıt Ol</button>
    </div>
  </div>

  <script>
    const tabLogin = document.getElementById("tab-login");
    const tabRegister = document.getElementById("tab-register");
    const loginForm = document.getElementById("login-form");
    const registerForm = document.getElementById("register-form");

    tabLogin.addEventListener("click", () => {
      tabLogin.classList.add("active");
      tabRegister.classList.remove("active");
      loginForm.classList.add("active");
      registerForm.classList.remove("active");
    });

    tabRegister.addEventListener("click", () => {
      tabRegister.classList.add("active");
      tabLogin.classList.remove("active");
      registerForm.classList.add("active");
      loginForm.classList.remove("active");
    });
  </script>
</body>
</html>
