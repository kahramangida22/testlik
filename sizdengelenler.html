<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sizden Gelenler | Testlik.com</title>
  <meta name="description" content="Testlik.com - Topluluk tarafından eklenen testler!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="img/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <style>
    .test-list {display:flex;flex-wrap:wrap;gap:24px;justify-content:center;margin:32px 0;}
    .test-card {background:#fff;border-radius:20px;box-shadow:0 2px 18px #735aff13;padding:22px 16px;max-width:280px;width:100%;text-align:center;transition:box-shadow .13s,transform .12s;}
    .test-card:hover {box-shadow:0 6px 28px #fd72ff2c;transform:scale(1.06) translateY(-2px);}
    .test-img {width:100%;height:120px;object-fit:contain;border-radius:15px;}
    .test-title {color:#735aff;font-size:1.07em;font-weight:700;margin:12px 0 5px 0;}
    .test-category {font-size:.93em;color:#b69bfc;}
    .test-desc {color:#5a6cff;font-size:.99em;margin-bottom:8px;}
  </style>
</head>
<body>
  <header>
    <div class="container">
      <img src="img/logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html" class="active">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <main>
    <h2 style="text-align:center;color:#735aff;margin:38px 0 18px 0;">Sizden Gelen Testler <span class="emoji">🌐</span></h2>
    <div class="test-list" id="user-test-list"></div>
  </main>
  <footer>
    <div class="container">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="img/wise.png" alt="Wise" />
        <img src="img/payoneer.png" alt="Payoneer" />
        <img src="img/iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script>
    firebase.auth().onAuthStateChanged(function(user) {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        if (user) logoutBtn.style.display = 'inline-block';
        else logoutBtn.style.display = 'none';
      }
    });
    document.addEventListener('DOMContentLoaded', function() {
      var logoutBtnElem = document.getElementById('logout-btn');
      if (logoutBtnElem) {
        logoutBtnElem.onclick = function(e) {
          e.preventDefault();
          firebase.auth().signOut().then(() => {
            window.location.href = "index.html";
          });
        }
      }
    });

    // Sadece kullanıcıların eklediği testleri göster
    db.collection("tests").where("createdBy", "!=", "admin").get().then(snapshot => {
      let html = "";
      snapshot.forEach(doc => {
        const t = doc.data();
        // Sadece admin olmayanların testleri:
        if (t.createdBy && t.createdBy !== "admin") {
          html += `
          <div class="test-card">
            <img src="${t.image || 'img/soru-isareti.png'}" class="test-img" alt="Test Görseli"/>
            <div class="test-title">${t.title}</div>
            <div class="test-category">${t.category}</div>
            <div class="test-desc">${t.description}</div>
            <a href="test-render.html?id=${doc.id}" class="cta-btn">Testi Çöz</a>
          </div>`;
        }
      });
      document.getElementById("user-test-list").innerHTML = html || "<p style='text-align:center;width:100%;'>Henüz topluluk tarafından eklenen test yok.</p>";
    });
  </script>
</body>
</html>
