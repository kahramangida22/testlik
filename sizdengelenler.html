<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sizden Gelenler | Testlik.com</title>
  <meta name="description" content="Testlik.com - Kullanıcılar tarafından önerilen testler ve gönderiler burada!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .sg-wrap {max-width:760px;margin:36px auto 30px auto;}
    .sg-title {color:#735aff;font-size:1.33em;font-weight:800;margin-bottom:19px;}
    .sg-grid {display:grid;grid-template-columns:1fr 1fr;gap:27px;}
    .sg-card {
      background:#fff;border-radius:21px;box-shadow:0 2px 17px #735aff13;
      padding:24px 17px 15px 17px;text-align:left;
      display:flex;flex-direction:column;gap:9px;
      position:relative;
    }
    .sg-user {font-size:.99em;color:#7a53c4;margin-bottom:4px;}
    .sg-text {font-size:1.09em;font-weight:700;color:#ed4a88;}
    .sg-date {position:absolute;top:13px;right:17px;color:#a387ff;font-size:.93em;}
    @media (max-width:900px){.sg-grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <!-- Giriş Modalı -->
  <div class="modal-bg" id="login-modal" style="display:none;">
    <div class="modal-card">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <h2>Testlik.com'a Giriş</h2>
      <button class="modal-google" onclick="loginGoogle()">
        <img src="google-icon.png" style="height:22px;vertical-align:middle;margin-right:9px;"> Google ile Giriş Yap
      </button>
      <hr style="margin:23px 0 15px 0;opacity:.19;">
      <input type="email" id="login-email" class="modal-inp" placeholder="E-posta" style="width:95%;padding:11px;border-radius:9px;border:1px solid #ccbaff;">
      <input type="password" id="login-pass" class="modal-inp" placeholder="Şifre" style="width:95%;padding:11px;border-radius:9px;border:1px solid #ccbaff;margin-top:8px;">
      <button class="modal-btn" onclick="loginEmail()">Giriş Yap</button>
      <div id="login-error" style="color:#ed4a88;font-size:.98em;min-height:22px;margin-top:7px;"></div>
      <button class="modal-btn" style="margin-top:18px;background:#7a53c4;" onclick="registerEmail()">Kayıt Ol</button>
      <button class="modal-guest" onclick="guestLogin()">Üyeliksiz Devam Et</button>
    </div>
  </div>
  <!-- Header -->
  <header>
    <div class="nav-flex">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html" class="active">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link" id="admin-link" style="display:none;">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <!-- Main -->
  <main>
    <div class="sg-wrap">
      <div class="sg-title">Kullanıcıdan Gelenler & Öneriler</div>
      <div class="sg-grid" id="sg-list">
        <!-- Kullanıcıdan gelenler JS ile buraya gelecek -->
      </div>
    </div>
  </main>
  <!-- Footer -->
  <footer>
    <div class="footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="wise.png" alt="Wise" />
        <img src="payoneer.png" alt="Payoneer" />
        <img src="iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <!-- Firebase/JS -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script src="main.js"></script>
  <script>
    // Modal ve admin
    firebase.auth().onAuthStateChanged(function(user) {
      var adminLink = document.getElementById('admin-link');
      if (adminLink) {
        if (user && (user.email === "admin@testlik.com" || user.email === "seninadminmailin@...")) adminLink.style.display = "inline-block";
        else adminLink.style.display = "none";
      }
      if (!user) openModal();
      else closeModal();
    });

    // Sizden gelenleri çek ve göster
    async function getirSizdenGelenler() {
      const sgDiv = document.getElementById("sg-list");
      sgDiv.innerHTML = `<div style="color:#bba5fa;width:100%;">Yükleniyor...</div>`;
      const snap = await db.collection("suggestions").orderBy("createdAt","desc").limit(20).get();
      let html = "";
      snap.forEach(doc => {
        const s = doc.data();
        html += `
          <div class="sg-card">
            <div class="sg-user">${s.displayName || s.email || "Kullanıcı"}</div>
            <div class="sg-text">${s.text || "Gönderi"}</div>
            <div class="sg-date">${s.date || ""}</div>
          </div>
        `;
      });
      sgDiv.innerHTML = html || `<div style="color:#ed4a88;">Henüz gönderi yok!</div>`;
    }
    getirSizdenGelenler();
  </script>
</body>
</html>
