<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Sizden Gelenler | Testlik.com</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Testlik.com - Topluluk tarafından gönderilen testler ve sorular.">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="nav-flex">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html" class="active">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>

  <main>
    <h1 class="main-title"><span class="emoji">🤝</span> Sizden Gelenler</h1>
    <div style="text-align:center;margin-bottom:30px;">
      <a href="soru-uret.html" class="cta-btn">Sen de Test/Öneri Gönder</a>
    </div>
    <section class="testler-grid" id="gelenler-list">
      <!-- JS ile gelenler buraya -->
    </section>
  </main>

  <footer>
    <div class="footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="wise.png" alt="Wise" />
        <img src="payoneer.png" alt="Payoneer" />
        <img src="iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script>
    // Navbar çıkış butonu
    firebase.auth().onAuthStateChanged(function(user) {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        if (user) logoutBtn.style.display = 'inline-block';
        else logoutBtn.style.display = 'none';
      }
    });
    document.addEventListener('DOMContentLoaded', function() {
      var logoutBtnElem = document.getElementById('logout-btn');
      if (logoutBtnElem) {
        logoutBtnElem.onclick = function(e) {
          e.preventDefault();
          firebase.auth().signOut().then(() => {
            window.location.href = "index.html";
          });
        }
      }
    });

    // Sizden Gelenler (Onaylanmış kullanıcı önerileri)
    async function loadSizdenGelenler() {
      const list = document.getElementById("gelenler-list");
      list.innerHTML = "<p>Yükleniyor...</p>";
      const snap = await db.collection("suggestions").where("status","==","approved").orderBy("createdAt","desc").get();
      if (snap.empty) {
        list.innerHTML = "<p>Henüz topluluk önerisi yok.</p>";
        return;
      }
      list.innerHTML = "";
      snap.forEach(doc => {
        const s = doc.data();
        list.innerHTML += `
          <div class="test-card">
            <img src="add.png" alt="Öneri"/>
            <span>${s.title}</span>
            <small>${s.desc || ''}</small>
            <div style="font-size:.98em;color:#876fa9;margin:6px 0 0 0;">${s.detail || ''}</div>
          </div>
        `;
      });
    }
    loadSizdenGelenler();
  </script>
</body>
</html>
