<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sizden Gelenler | Testlik.com</title>
  <meta name="description" content="Testlik.com - Kullanıcılar tarafından önerilen testler ve sorular.">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .sg-container {max-width:640px;margin:40px auto;}
    .sg-card {
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 2px 18px #735aff13;
      padding: 20px 22px 16px 22px;
      margin: 20px 0;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      flex-wrap:wrap;
    }
    .sg-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      object-fit: contain;
      background: #faf4ff;
      box-shadow: 0 1px 7px #ed4a8812;
      margin-right:8px;
      flex-shrink:0;
      display:inline-block;
    }
    .sg-content {flex:1;}
    .sg-title {color: #735aff;font-size:1.19em;font-weight:700;margin-bottom:4px;}
    .sg-desc {color:#876fa9;margin-bottom:6px;}
    .sg-date {color:#bba5fa;font-size:.98em;}
    @media (max-width:680px){.sg-card{flex-direction:column;align-items:center;text-align:center;}}
  </style>
</head>
<body>
  <header>
    <div class="nav-flex">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html" class="active">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <main>
    <h1 class="main-title"><span class="emoji">💡</span> Sizden Gelenler</h1>
    <div class="sg-container" id="sg-list">
      <div style="text-align:center;color:#8f7fff;">Yükleniyor...</div>
    </div>
  </main>
  <footer>
    <div class="footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="wise.png" alt="Wise" />
        <img src="payoneer.png" alt="Payoneer" />
        <img src="iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script>
    // Navbar çıkış butonu
    firebase.auth().onAuthStateChanged(function(user) {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        if (user) logoutBtn.style.display = 'inline-block';
        else logoutBtn.style.display = 'none';
      }
    });
    document.addEventListener('DOMContentLoaded', function() {
      var logoutBtnElem = document.getElementById('logout-btn');
      if (logoutBtnElem) {
        logoutBtnElem.onclick = function(e) {
          e.preventDefault();
          firebase.auth().signOut().then(() => {
            window.location.href = "index.html";
          });
        }
      }
    });

    // Öneri listesi çek
    async function loadSG() {
      const sgList = document.getElementById("sg-list");
      const snap = await db.collection("suggestions").orderBy("createdAt", "desc").limit(30).get();
      if (snap.empty) {
        sgList.innerHTML = "<div style='text-align:center;color:#bba5fa;'>Henüz öneri yok.</div>";
        return;
      }
      let html = "";
      snap.forEach(doc=>{
        const d = doc.data();
        html += `
          <div class="sg-card">
            <img src="soru-isareti.png" alt="Soru" class="sg-icon" />
            <div class="sg-content">
              <div class="sg-title">${d.title || "Başlıksız Öneri"}</div>
              <div class="sg-desc">${d.desc || ""}</div>
              <div class="sg-date">${d.createdAt ? new Date(d.createdAt.seconds*1000 || d.createdAt).toLocaleString("tr-TR") : "-"}</div>
            </div>
          </div>
        `;
      });
      sgList.innerHTML = html;
    }
    loadSG();
  </script>
</body>
</html>
