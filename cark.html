<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Çarkıfelek | Testlik.com</title>
  <meta name="description" content="Testlik.com - Çarkı çevir, sürpriz puanlar kazan!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .cark-wrap {
      display:flex;flex-direction:column;align-items:center;justify-content:center;margin:46px 0 22px 0;
    }
    .cark-canvas {
      background: #fff; border-radius: 50%; box-shadow: 0 3px 30px #735aff21;
      width: 340px; height: 340px; max-width:95vw; transition:.3s;
      margin-bottom: 18px;
      position:relative;
    }
    .cark-btn {
      background: linear-gradient(90deg, #fd72ff 0%, #735aff 100%);
      color: #fff; font-weight: 800; border-radius: 18px;
      border: none; box-shadow: 0 2px 12px #735aff22;
      padding: 16px 44px; font-size: 1.19em; cursor: pointer; margin: 18px 0 0 0;
      letter-spacing: .5px;
      transition: background .13s;
    }
    .cark-btn:active {background: #ed4a88;}
    .cark-result {
      font-size:1.13em;color:#ed4a88;font-weight:700;margin-top:15px;min-height:33px;text-align:center;
      letter-spacing: .1px;
    }
    .cark-pointer {
      position:absolute;top:-28px;left:50%;transform:translateX(-50%);
      width: 46px; height:46px; z-index:2;
      pointer-events:none;
    }
    @media (max-width:540px){.cark-canvas{width:99vw;height:99vw;max-width:370px;}}
  </style>
</head>
<body>
  <!-- Giriş Modalı -->
  <div class="modal-bg" id="login-modal" style="display:none;">
    <div class="modal-card">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <h2>Testlik.com'a Giriş</h2>
      <button class="modal-google" onclick="loginGoogle()">
        <img src="google-icon.png" style="height:22px;vertical-align:middle;margin-right:9px;"> Google ile Giriş Yap
      </button>
      <hr style="margin:23px 0 15px 0;opacity:.19;">
      <input type="email" id="login-email" class="modal-inp" placeholder="E-posta" style="width:95%;padding:11px;border-radius:9px;border:1px solid #ccbaff;">
      <input type="password" id="login-pass" class="modal-inp" placeholder="Şifre" style="width:95%;padding:11px;border-radius:9px;border:1px solid #ccbaff;margin-top:8px;">
      <button class="modal-btn" onclick="loginEmail()">Giriş Yap</button>
      <div id="login-error" style="color:#ed4a88;font-size:.98em;min-height:22px;margin-top:7px;"></div>
      <button class="modal-btn" style="margin-top:18px;background:#7a53c4;" onclick="registerEmail()">Kayıt Ol</button>
      <button class="modal-guest" onclick="guestLogin()">Üyeliksiz Devam Et</button>
    </div>
  </div>
  <!-- Header -->
  <header>
    <div class="nav-flex">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html" class="active">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link" id="admin-link" style="display:none;">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <!-- Main -->
  <main>
    <div class="cark-wrap">
      <h1 style="color:#735aff;font-size:1.49em;font-weight:800;margin-bottom:11px;">Çarkı Çevir, Şansını Deneyip Puan Kazan!</h1>
      <div style="position:relative;">
        <canvas class="cark-canvas" id="cark-canvas" width="340" height="340"></canvas>
        <img src="soru-isareti.png" class="cark-pointer" alt="Pointer"/>
      </div>
      <button class="cark-btn" id="spin-btn">Çarkı Döndür</button>
      <div class="cark-result" id="cark-result"></div>
    </div>
  </main>
  <!-- Footer -->
  <footer>
    <div class="footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="wise.png" alt="Wise" />
        <img src="payoneer.png" alt="Payoneer" />
        <img src="iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <!-- Firebase/JS -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script src="main.js"></script>
  <script>
    // --- Modal ve Admin aynı mantık (her sayfa aynı!)
    firebase.auth().onAuthStateChanged(function(user) {
      var adminLink = document.getElementById('admin-link');
      if (adminLink) {
        if (user && (user.email === "admin@testlik.com" || user.email === "seninadminmailin@...")) adminLink.style.display = "inline-block";
        else adminLink.style.display = "none";
      }
      if (!user) openModal();
      else closeModal();
    });

    // Çark verileri
    const slices = [
      {label: "+100", color: "#735aff", result: 100},
      {label: "İflas", color: "#ff4066", result: 0},
      {label: "+250", color: "#a387ff", result: 250},
      {label: "0", color: "#d2c0fa", result: 0},
      {label: "+50", color: "#ff8ad8", result: 50},
      {label: "+500", color: "#ed4a88", result: 500},
      {label: "+25", color: "#13bd72", result: 25},
      {label: "Boş", color: "#f7f4fd", result: 0}
    ];

    let isSpinning = false, currentAngle = 0;
    const canvas = document.getElementById("cark-canvas");
    const ctx = canvas.getContext("2d");
    const spinBtn = document.getElementById("spin-btn");
    const resultDiv = document.getElementById("cark-result");

    function drawWheel(angle=0) {
      const cx = canvas.width/2, cy = canvas.height/2, r = canvas.width/2-8;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const n = slices.length;
      for(let i=0;i<n;i++) {
        const start = angle + (i*2*Math.PI/n);
        const end = angle + ((i+1)*2*Math.PI/n);
        ctx.beginPath();
        ctx.moveTo(cx,cy);
        ctx.arc(cx,cy,r,start,end,false);
        ctx.fillStyle = slices[i].color;
        ctx.fill();
        ctx.save();
        ctx.translate(cx,cy);
        ctx.rotate((start+end)/2-Math.PI/2);
        ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.font = "bold 1.1em Fredoka,Arial";
        ctx.fillStyle = "#fff";
        ctx.shadowColor="#735aff33";ctx.shadowBlur=6;
        ctx.fillText(slices[i].label, r-55, 0);
        ctx.restore();
      }
    }
    drawWheel();

    spinBtn.onclick = function() {
      if(isSpinning) return;
      isSpinning = true;
      resultDiv.innerText = "";
      let rotateTo = Math.floor(Math.random()*360 + 1800); // 5 tur+random
      let finalAngle = (rotateTo%360)*Math.PI/180;
      let t=0, speed=45, last=0;
      function animate() {
        t+=speed;
        currentAngle += speed*Math.PI/180;
        drawWheel(currentAngle);
        speed *= .98; // yavaşlama
        if(speed>1 || t<rotateTo) requestAnimationFrame(animate);
        else {
          currentAngle = finalAngle;
          drawWheel(currentAngle);
          // Sonuç hangi slice'da
          let n = slices.length;
          let anglePer = 2*Math.PI/n;
          let win = (2*Math.PI - (currentAngle%(2*Math.PI)) + Math.PI/2)%(2*Math.PI);
          let idx = Math.floor(win/anglePer)%n;
          let res = slices[idx];
          if(res.label === "İflas") resultDiv.innerHTML = `<span style="color:#ff4066;">İflas! Puan sıfırlandı 😥</span>`;
          else if(res.label === "0" || res.label === "Boş") resultDiv.innerHTML = `<span style="color:#a3a3a3;">Bu sefer boş geçti!</span>`;
          else resultDiv.innerHTML = `<span style="color:#13bd72;">Tebrikler! <b>+${res.result} puan</b> kazandın! 🎉</span>`;
          isSpinning=false;
        }
      }
      animate();
    };
  </script>
</body>
</html>
