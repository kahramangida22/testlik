<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çarkıfelek - Testlik</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    #wheel { width: 300px; height: 300px; margin: 2rem auto; border: 10px solid pink; border-radius: 50%; text-align: center; }
    #spinBtn { padding: 1rem; background: deeppink; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <header>
    <div class="logo">Testlik Çark</div>
  </header>

  <main>
    <h2>🎡 Çarkıfelek</h2>
    <div id="wheel">Dönen Çark</div>
    <button id="spinBtn">Çevir ve Puan Kazan</button>
    <p id="result"></p>
  </main>

  <footer><p>© 2025 Testlik</p></footer>

  <script>
    document.getElementById("spinBtn").onclick = () => {
      const prize = [10, 20, 50, 5, 0][Math.floor(Math.random() * 5)];
      document.getElementById("result").innerText = `Kazandığınız Puan: ${prize}`;
    }
  </script>
</body>
</html>
