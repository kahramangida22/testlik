<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Çarkıfelek | Testlik.com</title>
  <meta name="description" content="Testlik.com - Çarkıfelek ile günlük sürpriz puanlar kazan!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .cark-card {
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 2px 24px #735aff19;
      padding: 36px 24px 34px 24px;
      max-width: 410px;
      margin: 44px auto 22px auto;
      text-align: center;
      font-size: 1.15em;
    }
    .cark-img {
      width: 120px;
      height: 120px;
      margin-bottom: 19px;
      border-radius: 22px;
      background: #faf7ff;
      box-shadow: 0 2px 12px #b69bfc19;
      transition: transform 1.5s cubic-bezier(.44,1.7,.42,1);
    }
    .cark-btn {
      margin-top: 12px;
      font-size: 1.1em;
      background: linear-gradient(90deg,#fd72ff 0%, #735aff 100%);
      color: #fff;
      border: none;
      border-radius: 17px;
      padding: 12px 35px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 10px #735aff29;
      transition: background .13s;
    }
    .cark-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .cark-result {
      margin-top: 18px;
      font-size: 1.15em;
      color: #ed4a88;
      font-weight: 700;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <header>
    <div class="nav-flex">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html" class="active">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="cark-card">
      <img src="success.png" alt="Çarkıfelek" class="cark-img" id="cark-img"/>
      <div>Günde 1 kez çarkı çevir, sürpriz puan kazan!</div>
      <button class="cark-btn" id="cark-cevir-btn">Çarkı Çevir</button>
      <div class="cark-result" id="cark-result"></div>
    </div>
  </main>
  <footer>
    <div class="footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="wise.png" alt="Wise" />
        <img src="payoneer.png" alt="Payoneer" />
        <img src="iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script>
    // Navbar çıkış butonu
    firebase.auth().onAuthStateChanged(function(user) {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        if (user) logoutBtn.style.display = 'inline-block';
        else logoutBtn.style.display = 'none';
      }
    });
    document.addEventListener('DOMContentLoaded', function() {
      var logoutBtnElem = document.getElementById('logout-btn');
      if (logoutBtnElem) {
        logoutBtnElem.onclick = function(e) {
          e.preventDefault();
          firebase.auth().signOut().then(() => {
            window.location.href = "index.html";
          });
        }
      }
    });

    // Çarkıfelek sistemi
    const oduller = [
      {puan: 10,   text: "10 Puan! İyi başlangıç 🚀", img: "success.png"},
      {puan: 25,   text: "25 Puan! Güzel 👏", img: "result-medium.png"},
      {puan: 50,   text: "50 Puan! Şanslı günündesin 🎉", img: "result-success.png"},
      {puan: 0,    text: "Maalesef bu sefer yok 😬", img: "error.png"},
      {puan: 100,  text: "100 Puan! Efsane 🔥", img: "result-success.png"},
      {puan: 5,    text: "5 Puan! Ufak da olsa ☺️", img: "success.png"},
      {puan: 0,    text: "Boş! Bir dahaki sefere ✌️", img: "warning.png"},
      {puan: 15,   text: "15 Puan! Fena değil 🙃", img: "result-medium.png"},
    ];

    firebase.auth().onAuthStateChanged(async user => {
      const btn = document.getElementById("cark-cevir-btn");
      const res = document.getElementById("cark-result");
      const img = document.getElementById("cark-img");
      if (!user) {
        btn.disabled = true;
        res.innerHTML = "<span style='color:#ed4a88'>Çarkı çevirmek için giriş yapmalısın.</span>";
        return;
      }
      const userRef = db.collection("users").doc(user.uid);
      const userDoc = await userRef.get();
      let lastSpin = userDoc.data().lastSpin || 0;
      let now = Date.now();
      // 24 saatlik blok
      if (now - lastSpin < 1000 * 60 * 60 * 24) {
        btn.disabled = true;
        res.innerHTML = "Bugün çarkı zaten çevirdin! Yarın tekrar gel.";
        return;
      }
      btn.disabled = false;
      btn.onclick = async function() {
        btn.disabled = true;
        img.style.transform = "rotate(" + (720 + Math.floor(Math.random()*360)) + "deg)";
        await new Promise(r => setTimeout(r, 1200));
        // Ödül belirle
        const odul = oduller[Math.floor(Math.random() * oduller.length)];
        img.src = odul.img;
        res.innerHTML = odul.text + (odul.puan > 0 ? ` (+${odul.puan} puan)` : "");
        // Puan ekle ve son çevirme zamanını kaydet
        await userRef.update({
          points: (userDoc.data().points || 0) + odul.puan,
          lastSpin: now
        });
      };
    });
  </script>
</body>
</html>
