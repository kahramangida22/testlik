<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />

  <style>
    .cark-wrap { background: #fff; border-radius: 32px; box-shadow: 0 2px 22px #735aff13; margin: 38px auto 28px auto; padding: 44px 18px 31px 18px; max-width: 360px; text-align:center; }
    .cark-btn { margin-top:16px;font-size:1.13em;font-weight:700;}
    .cark-sonuc { margin-top:18px;font-size:1.07em;color:#ed4a88;font-weight:700;min-height:30px;}
    .cark-pointer { width:34px;height:34px;position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);}
    .cark-canvas { width:220px;height:220px;border-radius:50%;border:6px solid #735aff;background:#f8f0fd; }
    @media (max-width:500px){ .cark-wrap{padding:18px 4px 12px 4px;} .cark-canvas{width:140px;height:140px;} }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo"><img src="logo.png" alt="Testlik.com" style="height:32px;vertical-align:middle;"> Testlik.com</div>
    <nav class="nav-links">
      <a href="index.html">Anasayfa</a>

      <a href="leaderboard.html">Liderlik</a>
      <a href="admin.html" class="admin-link" id="admin-link" style="display:none;">Admin</a>
      <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
    </nav>
  </header>
  <!-- Main -->
  <main>
    <div class="cark-wrap">
      <h2 style="color:#735aff;text-align:center;font-weight:900;margin-bottom:12px;">Çarkıfelek</h2>
      <canvas id="cark-canvas" class="cark-canvas"></canvas>
      <br>
      <button class="btn cark-btn" id="spin-btn">Çarkı Çevir</button>
      <div class="cark-sonuc" id="cark-sonuc"></div>
    </div>
  </main>
  <!-- Footer -->
  <footer>
    <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
    <div class="odeme-logo">
      <img src="wise.png" alt="Wise" />
      <img src="payoneer.png" alt="Payoneer" />
      <img src="iban.png" alt="IBAN" />
    </div>
  </footer>
  <!-- Firebase/JS -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script src="main.js"></script>
  <script>
    // Çark seçenekleri (puan ve açıklama)
    const carkOptions = [
      {puan: 10, text: "10 Puan Kazandın!"},
      {puan: 25, text: "25 Puan!"},
      {puan: 0,  text: "Şansını bir daha dene!"},
      {puan: 50, text: "50 Puan!"},
      {puan: 5,  text: "5 Puan!"},
      {puan: 100, text: "100 Puan!"},
      {puan: 0,  text: "Üzgünüm, bu turda yok."},
      {puan: 15, text: "15 Puan!"}
    ];

    // Çark görsel çizimi
    function drawCark(selected=-1){
      const canvas = document.getElementById("cark-canvas");
      const ctx = canvas.getContext("2d");
      const d = canvas.width, r = d/2, angle = (2*Math.PI)/carkOptions.length;
      ctx.clearRect(0,0,d,d);
      for(let i=0; i<carkOptions.length; i++){
        ctx.beginPath();
        ctx.moveTo(r,r);
        ctx.arc(r,r,r-6,i*angle,(i+1)*angle);
        ctx.fillStyle = i%2===0 ? "#fd72ff" : "#735aff";
        ctx.globalAlpha = selected===i ? 1 : 0.84;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2.5;
        ctx.stroke();
        // Text
        ctx.save();
        ctx.translate(r,r);
        ctx.rotate(angle*i+angle/2);
        ctx.textAlign = "center";
        ctx.fillStyle = "#fff";
        ctx.font = "bold 16px Fredoka, Arial";
        ctx.fillText(carkOptions[i].puan + "", r-42, 6);
        ctx.restore();
      }
    }
    drawCark();

    // Spin işlemi
    let spinning = false;
    document.getElementById("spin-btn").onclick = async function(){
      if(spinning) return;
      spinning = true;
      document.getElementById("cark-sonuc").innerText = "";
      let selected = Math.floor(Math.random() * carkOptions.length);
      let steps = Math.floor(15 + Math.random()*7);
      let pos = 0;
      let interval = setInterval(()=>{
        drawCark(pos%carkOptions.length);
        pos++;
        if(pos > steps){
          clearInterval(interval);
          drawCark(selected);
          carkSonuc(selected);
          spinning = false;
        }
      },85);
    };

    // Sonucu ekrana yaz ve puanı ekle
    async function carkSonuc(idx){
      const opt = carkOptions[idx];
      document.getElementById("cark-sonuc").innerText = opt.text;
      if(opt.puan > 0){
        firebase.auth().onAuthStateChanged(async function(user){
          if(user){
            const userRef = db.collection("users").doc(user.uid);
            const doc = await userRef.get();
            let mevcut = doc.data()?.point || 0;
            await userRef.update({ point: mevcut + opt.puan });
          }
        });
      }
    }

    // Admin ve login kontrolü
    firebase.auth().onAuthStateChanged(function(user) {
      var adminLink = document.getElementById('admin-link');
      if (adminLink) {
        if (user && user.email === "admin@testlik.com") adminLink.style.display = "inline-block";
        else adminLink.style.display = "none";
      }
    });
  </script>
</body>
</html>
