<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard | Testlik.com</title>
  <meta name="description" content="Testlik.com - Kazançlarını takip et, para çekim taleplerini yönet!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .db-wrap {max-width:510px;margin:38px auto 32px auto;background:#fff;border-radius:25px;box-shadow:0 2px 22px #735aff15;padding:33px 28px 26px 28px;}
    .db-title {color:#735aff;font-size:1.23em;font-weight:800;margin-bottom:16px;}
    .db-puan {
      background:linear-gradient(90deg,#fd72ff 0%,#735aff 100%);
      color:#fff;font-size:1.53em;font-weight:900;padding:18px 0;border-radius:17px;text-align:center;
      margin-bottom:21px;box-shadow:0 2px 13px #735aff19;
    }
    .db-subtitle {color:#ed4a88;font-weight:700;margin-top:8px;margin-bottom:3px;}
    .db-history {margin:12px 0 14px 0;max-height:145px;overflow:auto;}
    .db-history-item {color:#7a53c4;background:#faf4ff;padding:9px 14px;border-radius:13px;margin-bottom:8px;font-size:1em;}
    .db-form {margin-top:17px;}
    .db-label {display:block;margin-bottom:4px;color:#735aff;font-weight:600;}
    .db-inp {
      width:100%;padding:11px 8px;border-radius:11px;border:1.2px solid #ccbaff;font-size:1.04em;font-family:'Fredoka',Arial;background:#f5f0fa;
      margin-bottom:7px;
    }
    .db-btn {
      background:linear-gradient(90deg,#fd72ff 0%,#735aff 100%);
      color:#fff;font-weight:700;border-radius:14px;border:none;box-shadow:0 2px 11px #735aff14;padding:10px 28px;font-size:1.08em;cursor:pointer;
      transition:background .13s;
      margin-top:5px;
    }
    .db-btn:active{background:#ed4a88;}
  </style>
</head>
<body>
  <!-- Giriş Modalı -->
  <div class="modal-bg" id="login-modal" style="display:none;">
    <div class="modal-card">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <h2>Testlik.com'a Giriş</h2>
      <button class="modal-google" onclick="loginGoogle()">
        <img src="google-icon.png" style="height:22px;vertical-align:middle;margin-right:9px;"> Google ile Giriş Yap
      </button>
      <hr style="margin:23px 0 15px 0;opacity:.19;">
      <input type="email" id="login-email" class="modal-inp" placeholder="E-posta" style="width:95%;padding:11px;border-radius:9px;border:1px solid #ccbaff;">
      <input type="password" id="login-pass" class="modal-inp" placeholder="Şifre" style="width:95%;padding:11px;border-radius:9px;border:1px solid #ccbaff;margin-top:8px;">
      <button class="modal-btn" onclick="loginEmail()">Giriş Yap</button>
      <div id="login-error" style="color:#ed4a88;font-size:.98em;min-height:22px;margin-top:7px;"></div>
      <button class="modal-btn" style="margin-top:18px;background:#7a53c4;" onclick="registerEmail()">Kayıt Ol</button>
      <button class="modal-guest" onclick="guestLogin()">Üyeliksiz Devam Et</button>
    </div>
  </div>
  <!-- Header -->
  <header>
    <div class="nav-flex">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link" id="admin-link" style="display:none;">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <!-- Main -->
  <main>
    <div class="db-wrap">
      <div class="db-title">Kullanıcı Puanı & Kazanç Paneli</div>
      <div class="db-puan"><span id="db-puan">0</span> Puan</div>
      <div class="db-subtitle">İşlem Geçmişi</div>
      <div class="db-history" id="db-history"></div>
      <div class="db-subtitle">Para Çekme Talebi (IBAN)</div>
      <form class="db-form" id="db-form" onsubmit="return paraCekTalep();">
        <label class="db-label" for="db-iban">IBAN Numarası</label>
        <input class="db-inp" id="db-iban" maxlength="32" required placeholder="TR..." />
        <label class="db-label" for="db-tutar">Tutar (₺)</label>
        <input class="db-inp" id="db-tutar" type="number" min="10" max="10000" step="1" required placeholder="Çekmek istediğin tutar" />
        <button class="db-btn" type="submit">Talep Oluştur</button>
        <div id="db-sonuc" style="color:#ed4a88;font-size:1em;min-height:18px;margin-top:4px;"></div>
      </form>
    </div>
  </main>
  <!-- Footer -->
  <footer>
    <div class="footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="wise.png" alt="Wise" />
        <img src="payoneer.png" alt="Payoneer" />
        <img src="iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <!-- Firebase/JS -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script src="main.js"></script>
  <script>
    // Modal ve admin linki
    firebase.auth().onAuthStateChanged(function(user) {
      var adminLink = document.getElementById('admin-link');
      if (adminLink) {
        if (user && (user.email === "admin@testlik.com" || user.email === "seninadminmailin@...")) adminLink.style.display = "inline-block";
        else adminLink.style.display = "none";
      }
      if (!user) openModal();
      else closeModal();
    });

    // Kullanıcı verileri ve geçmiş
    firebase.auth().onAuthStateChanged(async function(user) {
      if (!user) return;
      // Puan göster
      db.collection("users").doc(user.uid).get().then(doc => {
        document.getElementById("db-puan").innerText = (doc.data() && doc.data().points) || 0;
      });
      // İşlem geçmişi göster (ör: çekim talepleri ve kazançlar)
      let snap = await db.collection("users").doc(user.uid).collection("history").orderBy("createdAt", "desc").limit(30).get();
      let html = "";
      snap.forEach(doc => {
        let h = doc.data();
        html += `<div class="db-history-item">${h.type === "withdraw" ? "<b>Çekim Talebi:</b> " : "<b>Kazanç:</b> "} ${h.amount}₺ ${h.iban ? "→ " + h.iban : ""} <span style="color:#bba5fa;float:right;font-size:.97em;">${h.date || ""}</span></div>`;
      });
      document.getElementById("db-history").innerHTML = html || `<div style="color:#bba5fa;">Hiç işlem yok!</div>`;
    });

    // Para çekme talebi
    function paraCekTalep() {
      var iban = document.getElementById("db-iban").value.trim().toUpperCase();
      var tutar = parseInt(document.getElementById("db-tutar").value);
      var sonuc = document.getElementById("db-sonuc");
      if (!iban.startsWith("TR") || iban.length < 15) {
        sonuc.innerText = "Geçerli bir IBAN gir!";
        return false;
      }
      if (isNaN(tutar) || tutar < 10) {
        sonuc.innerText = "En az 10 TL çekebilirsin!";
        return false;
      }
      firebase.auth().onAuthStateChanged(function(user) {
        if (!user) return;
        db.collection("users").doc(user.uid).get().then(doc => {
          let mevcut = (doc.data() && doc.data().points) || 0;
          if (mevcut < tutar) {
            sonuc.innerText = "Yeterli puanın yok!";
            return;
          }
          // Talep kaydet
          db.collection("users").doc(user.uid).collection("history").add({
            type: "withdraw",
            amount: tutar,
            iban,
            createdAt: new Date(),
            date: new Date().toLocaleString("tr-TR")
          }).then(() => {
            // Puanı düş
            db.collection("users").doc(user.uid).update({points: mevcut - tutar});
            sonuc.innerText = "Talebin başarıyla alındı!";
            setTimeout(() => location.reload(), 1100);
          });
        });
      });
      return false;
    }
  </script>
</body>
</html>
