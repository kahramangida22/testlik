<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard | Testlik.com</title>
  <meta name="description" content="Testlik.com - Puan, ödeme ve işlem geçmişi.">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .dash-flex {display:flex;gap:28px;flex-wrap:wrap;justify-content:center;}
    .dash-card {
      background:#fff;
      border-radius:28px;
      box-shadow:0 2px 24px #735aff19;
      padding:32px 26px 28px 26px;
      max-width:370px;
      min-width:260px;
      text-align:center;
      margin:18px 0;
      font-size:1.08em;
      flex:1;
    }
    .dash-title {color:#735aff;font-size:1.17em;font-weight:700;margin-bottom:8px;}
    .dash-badge {
      font-size:2.05em;color:#fff;
      background:linear-gradient(90deg,#fd72ff 0%,#735aff 100%);
      border-radius:18px;
      padding:11px 28px;
      font-weight:800;
      letter-spacing:0.02em;
      box-shadow:0 2px 12px #735aff29;
      margin-bottom:12px;
      display:inline-block;
    }
    .iban-inp {width:90%;max-width:320px;padding:9px;border-radius:12px;border:1.2px solid #b69bfc;margin-bottom:10px;}
    .odeme-gonder-btn {
      background:#ed4a88;color:#fff;font-weight:700;
      border:none;border-radius:15px;
      padding:9px 22px;margin-top:9px;cursor:pointer;
      transition:background .13s;
    }
    .odeme-gonder-btn:hover {background:#735aff;}
    .islem-card {
      background:#f7e8ff;border-radius:14px;
      padding:13px 12px;margin-bottom:7px;
      color:#513a80;text-align:left;font-size:.99em;
      box-shadow:0 1px 7px #735aff12;
      display:flex;justify-content:space-between;align-items:center;gap:8px;
    }
    .islem-odendi {color:#13bd72;}
    .islem-bekliyor {color:#fd72ff;}
  </style>
</head>
<body>
  <header>
    <div class="nav-flex">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <main>
    <h1 class="main-title"><span class="emoji">💸</span> Dashboard & Kazançlar</h1>
    <div class="dash-flex">
      <!-- Puan kartı -->
      <div class="dash-card">
        <div class="dash-title">Toplam Puanım</div>
        <div class="dash-badge" id="user-puan">0</div>
        <div style="color:#876fa9;margin-top:7px;">Test çözerek daha fazla puan kazan!</div>
      </div>
      <!-- Para çekme kartı -->
      <div class="dash-card">
        <div class="dash-title">IBAN ile Para Çek</div>
        <input type="text" class="iban-inp" id="iban-inp" placeholder="TRxxxxxxxxxxxx" maxlength="26"/>
        <button class="odeme-gonder-btn" id="odeme-btn">Çekim Talebi Gönder</button>
        <div id="odeme-msg" style="margin-top:8px;min-height:18px;"></div>
      </div>
      <!-- Geçmiş işlemler kartı -->
      <div class="dash-card" style="min-width:340px;max-width:420px;">
        <div class="dash-title">İşlem Geçmişim</div>
        <div id="islem-list"></div>
      </div>
    </div>
  </main>
  <footer>
    <div class="footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="wise.png" alt="Wise" />
        <img src="payoneer.png" alt="Payoneer" />
        <img src="iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script>
    firebase.auth().onAuthStateChanged(function(user) {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        if (user) logoutBtn.style.display = 'inline-block';
        else logoutBtn.style.display = 'none';
      }
    });
    document.addEventListener('DOMContentLoaded', function() {
      var logoutBtnElem = document.getElementById('logout-btn');
      if (logoutBtnElem) {
        logoutBtnElem.onclick = function(e) {
          e.preventDefault();
          firebase.auth().signOut().then(() => {
            window.location.href = "index.html";
          });
        }
      }
    });

    // Kullanıcı puanı, işlem geçmişi
    firebase.auth().onAuthStateChanged(async user => {
      if (!user) {
        document.querySelector('.dash-flex').innerHTML = `
          <div class="dash-card"><p>Dashboard’u görmek için giriş yapmalısın.</p><a href="giris.html" class="cta-btn">Giriş Yap</a></div>
        `;
        return;
      }
      const userDoc = await db.collection("users").doc(user.uid).get();
      const d = userDoc.data();
      document.getElementById("user-puan").innerText = d.points || 0;
      // Geçmiş işlemler
      const islemList = document.getElementById("islem-list");
      let islemler = d.transactions || [];
      if (islemler.length === 0) {
        islemList.innerHTML = "<div style='color:#bba5fa;'>Henüz işlem yok.</div>";
      } else {
        islemList.innerHTML = "";
        for (let tx of islemler.slice(-10).reverse()) {
          islemList.innerHTML += `
            <div class="islem-card">
              <span>${tx.date ? new Date(tx.date).toLocaleDateString('tr-TR') : '-'}</span>
              <span>${tx.amount || 0} TL</span>
              <span class="${tx.status === 'paid' ? 'islem-odendi' : 'islem-bekliyor'}">
                ${tx.status === 'paid' ? 'Ödendi' : 'Beklemede'}
              </span>
            </div>
          `;
        }
      }
    });

    // Para çekme talebi
    document.getElementById('odeme-btn').onclick = async function() {
      const iban = document.getElementById('iban-inp').value.trim().toUpperCase();
      const odemeMsg = document.getElementById('odeme-msg');
      if (!iban.startsWith("TR") || iban.length !== 26) {
        odemeMsg.innerHTML = "<span style='color:#ed4a88;'>Geçerli bir IBAN giriniz.</span>";
        return;
      }
      const user = firebase.auth().currentUser;
      if (!user) return;
      // Basit: her talep anında eklenir, admin panelden işlenir
      const userRef = db.collection("users").doc(user.uid);
      const userDoc = await userRef.get();
      let islemler = userDoc.data().transactions || [];
      islemler.push({
        date: Date.now(),
        iban,
        amount: userDoc.data().points || 0,
        status: "waiting"
      });
      await userRef.update({ transactions: islemler, points: 0 });
      odemeMsg.innerHTML = "<span style='color:#13bd72;'>Talebin alındı! Ödeme birkaç gün içinde gerçekleşecek.</span>";
      document.getElementById("user-puan").innerText = "0";
    };
  </script>
</body>
</html>
