<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard | Testlik.com</title>
  <meta name="description" content="Testlik.com - Puanlar, ödemeler ve geçmiş işlemler paneli!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo"><img src="logo.png" alt="Testlik.com" style="height:32px;vertical-align:middle;"> Testlik.com</div>
    <nav class="nav-links">
      <a href="index.html">Anasayfa</a>
      <a href="kategoriler.html">Kategoriler</a>
      <a href="sizdengelenler.html">Sizden Gelenler</a>
      <a href="soru-uret.html">Soru Üret</a>
      <a href="cark.html">Çarkıfelek</a>
      <a href="video-izle.html">Video İzle Kazan</a>
      <a href="favoriler.html">Favoriler</a>
      <a href="profil.html">Profil</a>
      <a href="dashboard.html" class="active">Dashboard</a>
      <a href="akademi.html">Akademi</a>
      <a href="istatistik.html">İstatistik</a>
      <a href="leaderboard.html">Liderlik</a>
      <a href="admin.html" class="admin-link" id="admin-link" style="display:none;">Admin</a>
      <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
    </nav>
  </header>
  <!-- Main -->
  <main>
    <section style="max-width:440px;margin:36px auto 30px auto;">
      <div class="dashboard-wrap">
        <h2 style="color:#735aff;text-align:center;font-weight:900;margin-bottom:18px;">Puan ve Ödeme Paneli</h2>
        <div id="dashboard-bilgi">
          <div style="text-align:center;margin-bottom:15px;">
            <span style="color:#ed4a88;font-size:1.26em;font-weight:800;">Puanın: </span>
            <span id="puan" style="font-size:1.18em;color:#7a53c4;font-weight:700;">0</span>
          </div>
          <label>IBAN Bilgisi (TR)</label>
          <input type="text" id="iban" maxlength="30" placeholder="TR...">
          <button class="btn" onclick="ibanGuncelle()">IBAN Kaydet</button>
          <div style="margin:18px 0 7px 0;font-size:1.07em;font-weight:700;color:#735aff;">Çekim Talebi</div>
          <input type="number" id="cekimMiktar" min="10" max="1000000" placeholder="Çekmek istediğin miktar">
          <button class="btn" onclick="cekimTalep()">Çekim Talep Et</button>
          <div id="dashboard-sonuc" style="margin-top:10px;color:#7a53c4;font-weight:700;min-height:20px;"></div>
          <div style="margin:21px 0 9px 0;font-size:1.07em;font-weight:700;color:#735aff;">Geçmiş İşlemler</div>
          <div id="dashboard-gecmis" style="font-size:.99em;"></div>
        </div>
      </div>
    </section>
  </main>
  <!-- Footer -->
  <footer>
    <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
    <div class="odeme-logo">
      <img src="wise.png" alt="Wise" />
      <img src="payoneer.png" alt="Payoneer" />
      <img src="iban.png" alt="IBAN" />
    </div>
  </footer>
  <!-- Firebase/JS -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script src="main.js"></script>
  <script>
    let currentUid = "";
    firebase.auth().onAuthStateChanged(async function(user) {
      var adminLink = document.getElementById('admin-link');
      if (adminLink) {
        if (user && user.email === "admin@testlik.com") adminLink.style.display = "inline-block";
        else adminLink.style.display = "none";
      }
      if (user) {
        currentUid = user.uid;
        const doc = await db.collection("users").doc(user.uid).get();
        const data = doc.data();
        document.getElementById("puan").innerText = data.point || 0;
        document.getElementById("iban").value = data.iban || "";
        gecmisiYukle();
      } else {
        document.getElementById("dashboard-bilgi").innerHTML = "<div style='color:#bbb;text-align:center;'>Giriş yapmadan bu sayfa görüntülenemez.</div>";
      }
    });

    // IBAN güncelle
    async function ibanGuncelle() {
      if (!currentUid) return;
      const iban = document.getElementById("iban").value.trim();
      if (!iban || !iban.startsWith("TR") || iban.length < 20) {
        document.getElementById("dashboard-sonuc").innerText = "Geçerli bir IBAN giriniz!";
        return;
      }
      await db.collection("users").doc(currentUid).update({ iban });
      document.getElementById("dashboard-sonuc").innerText = "IBAN güncellendi!";
    }

    // Çekim talebi oluştur
    async function cekimTalep() {
      if (!currentUid) return;
      const miktar = parseInt(document.getElementById("cekimMiktar").value) || 0;
      const doc = await db.collection("users").doc(currentUid).get();
      const mevcutPuan = doc.data().point || 0;
      if (miktar < 10) {
        document.getElementById("dashboard-sonuc").innerText = "Minimum 10 puan çekebilirsiniz!";
        return;
      }
      if (miktar > mevcutPuan) {
        document.getElementById("dashboard-sonuc").innerText = "Yeterli puanınız yok!";
        return;
      }
      // Çekim işlemini Firestore'a kaydet (admin onayı gerektirebilir)
      await db.collection("withdrawals").add({
        userId: currentUid,
        amount: miktar,
        iban: doc.data().iban || "",
        status: "beklemede",
        createdAt: new Date()
      });
      // Puanı düş
      await db.collection("users").doc(currentUid).update({
        point: mevcutPuan - miktar
      });
      document.getElementById("dashboard-sonuc").innerText = "Çekim talebiniz alındı!";
      gecmisiYukle();
    }

    // Geçmiş çekim işlemlerini getir
    async function gecmisiYukle() {
      if (!currentUid) return;
      const snap = await db.collection("withdrawals")
        .where("userId", "==", currentUid)
        .orderBy("createdAt", "desc").limit(7).get();
      let html = "";
      snap.forEach(doc => {
        const d = doc.data();
        html += `<div>
          <b>${d.amount} puan</b> — <span style="color:#ed4a88;">${d.status}</span>
          <span style="color:#bbb;">(${new Date(d.createdAt.seconds*1000).toLocaleDateString("tr-TR")})</span>
        </div>`;
      });
      document.getElementById("dashboard-gecmis").innerHTML = html || "<div style='color:#bbb;'>Henüz işlem yok.</div>";
    }
  </script>
</body>
</html>
