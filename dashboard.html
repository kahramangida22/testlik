<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard | Testlik.com</title>
  <meta name="description" content="Testlik.com - Puanlarını ve işlemlerini yönet!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="img/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <style>
    .dash-card {
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 2px 18px #735aff13;
      padding: 28px 22px;
      max-width: 410px;
      margin: 38px auto 18px auto;
      text-align: center;
    }
    .iban-input {
      margin-top: 15px;
      margin-bottom: 12px;
      width: 95%;
      padding: 9px 12px;
      border-radius: 14px;
      border: 1.5px solid #b69bfc;
      background: #f7e8ff;
      font-size: 1.1em;
    }
    .tx-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 18px;
      font-size: 1em;
    }
    .tx-table th, .tx-table td {
      padding: 7px 6px;
      border-bottom: 1px solid #eee;
      text-align: center;
    }
    .tx-table th {
      color: #735aff;
    }
    .badge-wait { background:#ffe082;color:#755b00;padding:3px 11px;border-radius:9px;font-size:.97em;}
    .badge-ok { background:#13bd72;color:#fff;padding:3px 13px;border-radius:10px;font-size:.97em;}
    .badge-rej { background:#ed4a88;color:#fff;padding:3px 13px;border-radius:10px;font-size:.97em;}
  </style>
</head>
<body>
  <header>
    <div class="container nav-flex">
      <img src="img/logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <main>
    <section>
      <div class="dash-card" id="dashboard-area">
        <div class="loader">Yükleniyor...</div>
      </div>
    </section>
  </main>
  <footer>
    <div class="container footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="img/wise.png" alt="Wise" />
        <img src="img/payoneer.png" alt="Payoneer" />
        <img src="img/iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script>
    firebase.auth().onAuthStateChanged(function(user) {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        if (user) logoutBtn.style.display = 'inline-block';
        else logoutBtn.style.display = 'none';
      }
    });
    document.addEventListener('DOMContentLoaded', function() {
      var logoutBtnElem = document.getElementById('logout-btn');
      if (logoutBtnElem) {
        logoutBtnElem.onclick = function(e) {
          e.preventDefault();
          firebase.auth().signOut().then(() => {
            window.location.href = "index.html";
          });
        }
      }
    });

    firebase.auth().onAuthStateChanged(async user => {
      const area = document.getElementById("dashboard-area");
      if (!user) {
        area.innerHTML = `<p>Paneli görmek için giriş yapmalısın.</p><a href="giris.html" class="cta-btn">Giriş Yap</a>`;
        return;
      }
      const userDoc = await db.collection("users").doc(user.uid).get();
      const u = userDoc.data();
      area.innerHTML = `
        <h2 style="color:#735aff;margin-bottom:7px;">Puanım: <span style="color:#ed4a88;font-weight:700;">${u.points || 0}</span></h2>
        <form id="ibanForm" style="margin-top:18px;">
          <input type="text" id="iban" maxlength="34" class="iban-input" placeholder="IBAN ile para çek (örn. TR...)">
          <button type="submit" class="cta-btn" style="width:100%;">Çekim Talebi Oluştur</button>
        </form>
        <div id="ibanMsg" style="min-height:18px;font-weight:600;margin-top:7px;"></div>
        <h3 style="color:#735aff;margin-top:22px;">Geçmiş İşlemlerim</h3>
        <table class="tx-table">
          <thead>
            <tr>
              <th>Tarih</th>
              <th>Tutar</th>
              <th>IBAN</th>
              <th>Durum</th>
            </tr>
          </thead>
          <tbody>
            ${
              (u.withdrawals && u.withdrawals.length > 0)
              ? u.withdrawals.map(w => `
                  <tr>
                    <td>${w.date}</td>
                    <td>${w.amount}₺</td>
                    <td>${w.iban}</td>
                    <td>
                      ${
                        w.status == 'waiting'
                        ? '<span class="badge-wait">Bekliyor</span>'
                        : w.status == 'ok'
                        ? '<span class="badge-ok">Onaylandı</span>'
                        : '<span class="badge-rej">Reddedildi</span>'
                      }
                    </td>
                  </tr>
                `).join('
