<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profil | Testlik.com</title>
  <meta name="description" content="Testlik.com - Kullanıcı profilini görüntüle, bilgilerini güncelle!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .profil-wrap {
      max-width: 480px;
      margin: 40px auto 30px auto;
      background: #fff;
      border-radius: 27px;
      box-shadow: 0 2px 22px #735aff1a;
      padding: 35px 25px 28px 25px;
      text-align: center;
      position: relative;
    }
    .profil-avatar {
      width: 104px; height: 104px; border-radius: 50%;
      object-fit: cover; background: #faf4ff; border: 3px solid #735aff22;
      margin-bottom: 13px; box-shadow: 0 1px 15px #bba5fa0e;
    }
    .profil-change {
      margin-top: 6px; font-size: .97em; color: #ed4a88;
      cursor: pointer; text-decoration: underline; background: none; border: none;
    }
    .profil-username {
      color: #735aff; font-size: 1.17em; font-weight: 700; margin-bottom: 3px;
    }
    .profil-email {
      color: #a387ff; font-size: 1.04em; font-weight: 600; margin-bottom: 7px;
      word-break: break-all;
    }
    .profil-info-list {
      margin: 17px auto 0 auto; display: flex; flex-direction:column; gap: 7px; font-size: 1.01em;
    }
    .profil-info-list span {color:#7a53c4;}
  </style>
</head>
<body>
  <!-- Giriş Modalı (Her sayfada!) -->
  <div class="modal-bg" id="login-modal" style="display:none;">
    <div class="modal-card">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <h2>Testlik.com'a Giriş</h2>
      <button class="modal-google" onclick="loginGoogle()">
        <img src="google-icon.png" style="height:22px;vertical-align:middle;margin-right:9px;"> Google ile Giriş Yap
      </button>
      <hr style="margin:23px 0 15px 0;opacity:.19;">
      <input type="email" id="login-email" class="modal-inp" placeholder="E-posta" style="width:95%;padding:11px;border-radius:9px;border:1px solid #ccbaff;">
      <input type="password" id="login-pass" class="modal-inp" placeholder="Şifre" style="width:95%;padding:11px;border-radius:9px;border:1px solid #ccbaff;margin-top:8px;">
      <button class="modal-btn" onclick="loginEmail()">Giriş Yap</button>
      <div id="login-error" style="color:#ed4a88;font-size:.98em;min-height:22px;margin-top:7px;"></div>
      <button class="modal-btn" style="margin-top:18px;background:#7a53c4;" onclick="registerEmail()">Kayıt Ol</button>
      <button class="modal-guest" onclick="guestLogin()">Üyeliksiz Devam Et</button>
    </div>
  </div>
  <!-- Header -->
  <header>
    <div class="nav-flex">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html" class="active">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link" id="admin-link" style="display:none;">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <!-- Main -->
  <main>
    <div class="profil-wrap" id="profil-card">
      <img src="default-profile.png" id="profil-avatar" class="profil-avatar" alt="Profil Fotoğrafı" />
      <input type="file" id="profil-input" accept="image/*" style="display:none;" />
      <button class="profil-change" onclick="document.getElementById('profil-input').click();">Fotoğrafı Değiştir</button>
      <div class="profil-username" id="profil-username">Kullanıcı Adı</div>
      <div class="profil-email" id="profil-email">kullanici@mail.com</div>
      <div class="profil-info-list">
        <div><span>Puan:</span> <b id="profil-puan">0</b></div>
        <div><span>Favori Testler:</span> <b id="profil-favori">0</b></div>
      </div>
    </div>
  </main>
  <!-- Footer -->
  <footer>
    <div class="footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="wise.png" alt="Wise" />
        <img src="payoneer.png" alt="Payoneer" />
        <img src="iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <!-- Firebase/JS -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script src="main.js"></script>
  <script>
    // Modal ve admin linki
    firebase.auth().onAuthStateChanged(function(user) {
      var adminLink = document.getElementById('admin-link');
      if (adminLink) {
        if (user && (user.email === "admin@testlik.com" || user.email === "seninadminmailin@...")) adminLink.style.display = "inline-block";
        else adminLink.style.display = "none";
      }
      if (!user) openModal();
      else closeModal();
    });

    // Kullanıcı verisi çekme ve gösterme
    firebase.auth().onAuthStateChanged(function(user) {
      if (!user) return;
      let profilAvatar = document.getElementById("profil-avatar");
      let profilUsername = document.getElementById("profil-username");
      let profilEmail = document.getElementById("profil-email");
      let profilPuan = document.getElementById("profil-puan");
      let profilFavori = document.getElementById("profil-favori");
      profilAvatar.src = user.photoURL || "default-profile.png";
      profilUsername.innerText = user.displayName || "Kullanıcı";
      profilEmail.innerText = user.email || "Misafir";
      db.collection("users").doc(user.uid).get().then(doc => {
        const data = doc.data() || {};
        profilPuan.innerText = data.points || 0;
        profilFavori.innerText = (data.favorites && data.favorites.length) || 0;
      });
    });

    // Profil fotoğrafı yükleme
    document.getElementById("profil-input").onchange = function(e) {
      var file = e.target.files[0];
      if (!file) return;
      // Fotoğrafı yükle ve güncelle (ör: Firebase Storage ile)
      // Bu örnekte sadece önizleme:
      var reader = new FileReader();
      reader.onload = function(ev) {
        document.getElementById("profil-avatar").src = ev.target.result;
        // Gerçek upload: Burada Firebase Storage ile yükleyip,
        // ardından kullanıcı profilini ve db kaydını güncelleyebilirsin.
      };
      reader.readAsDataURL(file);
    };
  </script>
</body>
</html>
