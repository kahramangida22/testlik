<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profilim | Testlik.com</title>
  <meta name="description" content="Testlik.com - Profil ve kullanıcı bilgileri.">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .profil-card {
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 2px 24px #735aff19;
      padding: 40px 28px 30px 28px;
      max-width: 420px;
      margin: 44px auto 22px auto;
      text-align: center;
      font-size: 1.11em;
    }
    .profil-avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #b69bfc;
      background: #faf7ff;
      margin-bottom: 18px;
      box-shadow: 0 1px 8px #7a56ff12;
    }
    .profil-username {
      color: #735aff;
      font-size: 1.27em;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .profil-email {
      color: #876fa9;
      font-size: 1.03em;
      margin-bottom: 7px;
      word-break: break-all;
    }
    .profil-puan {
      color: #ed4a88;
      font-size: 1.15em;
      font-weight: 700;
      margin-bottom: 5px;
    }
    .profil-uye-tarih {color:#bba5fa;font-size:.99em;}
    .profil-upload-btn {
      margin-top: 10px;
      background: #f7e8ff;
      color: #735aff;
      border-radius: 16px;
      padding: 8px 17px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      font-size: 1em;
      transition: background .13s;
    }
    .profil-upload-btn:hover {
      background: linear-gradient(90deg,#fd72ff 0%, #735aff 100%);
      color:#fff;
    }
  </style>
</head>
<body>
  <header>
    <div class="nav-flex">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html" class="active">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="profil-card" id="profil-kart">
      <img src="default-profile.png" alt="Profil Fotoğrafı" class="profil-avatar" id="avatar-img"/>
      <input type="file" id="avatar-input" style="display:none;" accept="image/*" />
      <button class="profil-upload-btn" id="avatar-btn">Profil Fotoğrafı Yükle</button>
      <div class="profil-username" id="profil-username">Kullanıcı Adı</div>
      <div class="profil-email" id="profil-email">E-posta</div>
      <div class="profil-puan" id="profil-puan">0 Puan</div>
      <div class="profil-uye-tarih" id="profil-uye-tarih">Üyelik: -</div>
    </div>
  </main>
  <footer>
    <div class="footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="wise.png" alt="Wise" />
        <img src="payoneer.png" alt="Payoneer" />
        <img src="iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script>
    firebase.auth().onAuthStateChanged(function(user) {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        if (user) logoutBtn.style.display = 'inline-block';
        else logoutBtn.style.display = 'none';
      }
    });
    document.addEventListener('DOMContentLoaded', function() {
      var logoutBtnElem = document.getElementById('logout-btn');
      if (logoutBtnElem) {
        logoutBtnElem.onclick = function(e) {
          e.preventDefault();
          firebase.auth().signOut().then(() => {
            window.location.href = "index.html";
          });
        }
      }
    });

    // Kullanıcı bilgilerini getir
    firebase.auth().onAuthStateChanged(async user => {
      if (!user) {
        document.getElementById('profil-kart').innerHTML = `
          <p>Profil bilgilerini görmek için giriş yapmalısın.</p>
          <a href="giris.html" class="cta-btn">Giriş Yap</a>
        `;
        return;
      }
      const userDoc = await db.collection("users").doc(user.uid).get();
      const d = userDoc.data();
      document.getElementById("profil-username").innerText = d.displayName || "Kullanıcı Adı";
      document.getElementById("profil-email").innerText = user.email || "-";
      document.getElementById("profil-puan").innerText = (d.points || 0) + " Puan";
      const tarih = user.metadata && user.metadata.creationTime ? new Date(user.metadata.creationTime) : null;
      document.getElementById("profil-uye-tarih").innerText = "Üyelik: " + (tarih ? tarih.toLocaleDateString('tr-TR') : "-");
      document.getElementById("avatar-img").src = d.avatar || "default-profile.png";
    });

    // Profil fotoğrafı yükleme
    document.getElementById('avatar-btn').onclick = () => document.getElementById('avatar-input').click();
    document.getElementById('avatar-input').onchange = async function(e) {
      const file = e.target.files[0];
      if (!file) return;
      // Kullanıcı giriş kontrolü
      const user = firebase.auth().currentUser;
      if (!user) return;
      // Resmi base64 olarak kaydet (gelişmiş projelerde storage kullanılır)
      const reader = new FileReader();
      reader.onload = async function(event) {
        const base64 = event.target.result;
        await db.collection("users").doc(user.uid).update({ avatar: base64 });
        document.getElementById("avatar-img").src = base64;
      }
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
