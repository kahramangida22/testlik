<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profilim | Testlik.com</title>
  <meta name="description" content="Testlik.com - Kendi profilini, puanını ve başarılarını gör!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="img/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="container">
      <img src="img/logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html" class="active">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <main>
    <section class="profile-section" style="margin-top:36px;">
      <h1 style="text-align:center;color:#735aff;font-weight:700;">Profilim <span class="emoji">🧑‍💻</span></h1>
      <div class="test-card" id="profile-area" style="max-width:410px;">
        <div class="loader">Profil yükleniyor...</div>
      </div>
    </section>
  </main>
  <footer>
    <div class="container">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="img/wise.png" alt="Wise" />
        <img src="img/payoneer.png" alt="Payoneer" />
        <img src="img/iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script>
    firebase.auth().onAuthStateChanged(function(user) {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        if (user) logoutBtn.style.display = 'inline-block';
        else logoutBtn.style.display = 'none';
      }
    });
    document.addEventListener('DOMContentLoaded', function() {
      var logoutBtnElem = document.getElementById('logout-btn');
      if (logoutBtnElem) {
        logoutBtnElem.onclick = function(e) {
          e.preventDefault();
          firebase.auth().signOut().then(() => {
            window.location.href = "index.html";
          });
        }
      }
    });

    // PROFİL KARTI (Fotoğraf ve Kullanıcı Adı güncellemeli)
    auth.onAuthStateChanged(async user => {
      const area = document.getElementById("profile-area");
      if (!user) {
        area.innerHTML = `<p>Profilini görmek için giriş yapmalısın.</p><a href="giris.html" class="cta-btn">Giriş Yap</a>`;
        return;
      }
      try {
        const doc = await db.collection("users").doc(user.uid).get();
        const u = doc.data();
        area.innerHTML = `
          <form id="profileForm" enctype="multipart/form-data" style="display:flex;flex-direction:column;align-items:center;">
            <img src="${u.avatar || 'img/default-profile.png'}" alt="Profil Fotoğrafı" id="profile-avatar" style="width:90px; border-radius:50%; margin-bottom: 1.2rem;box-shadow:0 2px 14px #ffb2f85c;object-fit:cover;">
            <input type="file" id="avatarInput" accept="image/*" style="margin-bottom:10px;"/>
            <input type="text" id="displayName" value="${u.displayName || ''}" placeholder="Kullanıcı adı" style="margin-bottom:10px;width:70%;">
            <button type="submit" class="cta-btn" style="width:100%;">Kaydet</button>
          </form>
          <p style="font-size:1.08em;"><b>Puan:</b> <span style="color:#ed4a88;font-weight:600;">${u.points || 0}</span></p>
          <p><b>Favori Testler:</b> <span style="color:#735aff;">${u.favorites ? u.favorites.length : 0}</span></p>
          <p><b>Çözülen Testler:</b> <span style="color:#5ab8ad;">${u.completedTests ? u.completedTests.length : 0}</span></p>
          <div id="profileMsg"></div>
        `;

        // Profil fotoğrafı önizleme
        document.getElementById("avatarInput").onchange = e => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = ev => {
            document.getElementById("profile-avatar").src = ev.target.result;
          };
          reader.readAsDataURL(file);
        };

        // Form kaydetme
        document.getElementById("profileForm").onsubmit = async function(e) {
          e.preventDefault();
          const displayName = document.getElementById("displayName").value;
          const fileInput = document.getElementById("avatarInput");
          let avatarUrl = u.avatar || "";
          if (fileInput.files[0]) {
            // (Base64 olarak kaydedilir. Daha profesyonel için Firebase Storage önerilir.)
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = async function(ev) {
              avatarUrl = ev.target.result;
              await db.collection("users").doc(user.uid).update({ displayName, avatar: avatarUrl });
              document.getElementById("profileMsg").innerHTML = '<span style="color:#13bd72;">Profil güncellendi!</span>';
            };
            reader.readAsDataURL(file);
          } else {
            await db.collection("users").doc(user.uid).update({ displayName });
            document.getElementById("profileMsg").innerHTML = '<span style="color:#13bd72;">Profil güncellendi!</span>';
          }
        };
      } catch (err) {
        area.innerHTML = "<p>Profil yüklenemedi!</p>";
        console.error(err);
      }
    });
  </script>
  <style>
    .test-card input[type="file"] {
      margin-bottom: 10px;
      padding: 5px;
      border-radius: 12px;
      background: #f7e8ff;
      color: #735aff;
      border: 1.5px solid #d7caff;
    }
    .test-card input[type="text"] {
      margin-bottom: 10px;
    }
  </style>
</body>
</html>
