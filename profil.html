<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profilim | Testlik.com</title>
  <meta name="description" content="Testlik.com profil sayfan. Profil fotoğrafı ve kullanıcı adı güncelle.">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="img/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <style>
    .profil-icerik {max-width:420px;margin:52px auto 22px auto;background:#fff;border-radius:22px;box-shadow:0 2px 18px #735aff13;padding:38px 28px;text-align:center;}
    .profil-foto {width:108px;height:108px;object-fit:cover;border-radius:50%;border:3px solid #ed4a88;margin-bottom:16px;}
    .profil-bilgi {color:#735aff;font-size:1.08em;font-weight:600;margin-bottom:10px;}
    .profil-input {width:88%;margin:8px auto 14px auto;padding:8px 14px;border-radius:12px;border:1px solid #ddd;}
    .profil-btn {margin:10px auto 5px auto;}
  </style>
</head>
<body>
  <header>
    <div class="container">
      <img src="img/logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="profil.html" class="active">Profil</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="profil-icerik">
      <img id="profilFoto" src="img/default-profile.png" class="profil-foto" alt="Profil Fotoğrafı" />
      <br />
      <input type="file" id="profilFotoInput" accept="image/*" style="margin-bottom:12px;" />
      <div class="profil-bilgi">Kullanıcı Adı: <span id="profilKullaniciAdi"></span></div>
      <input id="profilKullaniciAdiInput" class="profil-input" type="text" placeholder="Kullanıcı adını güncelle" maxlength="16" />
      <button id="kullaniciAdiGuncelleBtn" class="cta-btn profil-btn">Kullanıcı Adını Güncelle</button>
      <div class="profil-bilgi">E-posta: <span id="profilEmail"></span></div>
      <div id="profilMesaj" style="min-height:20px;color:#ed4a88;font-weight:600;margin-top:8px;"></div>
    </div>
  </main>
  <footer>
    <div class="container">
      <p>&copy; 2025 <b>Testlik.com</b></p>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script src="firebase.js"></script>
  <script>
    let currentUid;
    firebase.auth().onAuthStateChanged(async function(user) {
      if (!user) {
        window.location.href = "giris.html";
        return;
      }
      currentUid = user.uid;
      const userDoc = await db.collection("users").doc(user.uid).get();
      if (userDoc.exists) {
        const data = userDoc.data();
        document.getElementById("profilKullaniciAdi").innerText = data.username || "(Yok)";
        document.getElementById("profilKullaniciAdiInput").value = data.username || "";
        document.getElementById("profilEmail").innerText = data.email || "";
        document.getElementById("profilFoto").src = data.profilePic ? data.profilePic : "img/default-profile.png";
      }
    });

    // Profil fotoğrafı yükle
    document.getElementById("profilFotoInput").addEventListener("change", async function(event) {
      if (!currentUid) return;
      const file = event.target.files[0];
      if (!file) return;
      const storageRef = firebase.storage().ref();
      const profileImageRef = storageRef.child('profile_images/' + currentUid + '.jpg');
      try {
        await profileImageRef.put(file);
        const downloadURL = await profileImageRef.getDownloadURL();
        await db.collection("users").doc(currentUid).update({ profilePic: downloadURL });
        document.getElementById("profilFoto").src = downloadURL;
        document.getElementById("profilMesaj").style.color = "#13bd72";
        document.getElementById("profilMesaj").innerText = "Profil fotoğrafı güncellendi!";
      } catch (err) {
        document.getElementById("profilMesaj").style.color = "#ed4a88";
        document.getElementById("profilMesaj").innerText = "Hata oluştu.";
      }
    });

    // Kullanıcı adı güncelle
    document.getElementById("kullaniciAdiGuncelleBtn").onclick = async function() {
      const yeniAd = document.getElementById("profilKullaniciAdiInput").value.trim();
      if (yeniAd.length < 3) {
        document.getElementById("profilMesaj").innerText = "Kullanıcı adı en az 3 harf olmalı!";
        return;
      }
      // Başkasında var mı kontrol et
      const q = await db.collection("users").where("username", "==", yeniAd).get();
      if (!q.empty) {
        let kendiMi = false;
        q.forEach(doc=>{if(doc.id===currentUid) kendiMi=true;});
        if (!kendiMi) {
          document.getElementById("profilMesaj").innerText = "Bu kullanıcı adı zaten alınmış!";
          return;
        }
      }
      try {
        await db.collection("users").doc(currentUid).update({ username: yeniAd });
        document.getElementById("profilMesaj").style.color = "#13bd72";
        document.getElementById("profilMesaj").innerText = "Kullanıcı adı güncellendi!";
        document.getElementById("profilKullaniciAdi").innerText = yeniAd;
      } catch (err) {
        document.getElementById("profilMesaj").style.color = "#ed4a88";
        document.getElementById("profilMesaj").innerText = "Hata oluştu.";
      }
    };
  </script>
</body>
</html>
