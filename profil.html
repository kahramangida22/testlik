<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profilim | Testlik.com</title>
  <meta name="description" content="Testlik.com - Kullanıcı profilin, favoriler ve başarılar.">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="img/favicon.png" />
</head>
<body>
  <header>
    <div class="container">
      <img src="img/logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html" class="active">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link">Admin</a>
      </nav>
    </div>
  </header>
  <main>
    <section class="profile-section">
      <h1>Profilim</h1>
      <div class="test-card" id="profile-area">
        <p>Profil yükleniyor...</p>
      </div>
    </section>
  </main>
  <footer>
    <div class="container">
      <p>&copy; 2025 Testlik.com</p>
      <div class="odeme-logo">
        <img src="img/wise.png" alt="Wise" />
        <img src="img/payoneer.png" alt="Payoneer" />
        <img src="img/iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <script src="firebase.js"></script>
  <script>
    auth.onAuthStateChanged(async user => {
      const area = document.getElementById("profile-area");
      if (!user) {
        area.innerHTML = `<p>Profilini görmek için giriş yapmalısın.</p><a href="giris.html" class="cta-btn">Giriş Yap</a>`;
        return;
      }
      try {
        const doc = await db.collection("users").doc(user.uid).get();
        const u = doc.data();
        area.innerHTML = `
          <img src="${u.avatar || 'img/default-profile.png'}" alt="Profil Fotoğrafı" style="width:90px; border-radius:50%; margin-bottom: 1rem;">
          <h2>${u.displayName || u.email}</h2>
          <p><b>Puan:</b> ${u.points || 0}</p>
          <p><b>Favori Testler:</b> ${u.favorites ? u.favorites.length : 0}</p>
          <p><b>Çözülen Testler:</b> ${u.completedTests ? u.completedTests.length : 0}</p>
        `;
      } catch (err) {
        area.innerHTML = "<p>Profil yüklenemedi!</p>";
        console.error(err);
      }
    });
  </script>
</body>
</html>
