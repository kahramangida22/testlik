<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profilim | Testlik.com</title>
  <meta name="description" content="Testlik.com - Kendi profil bilgilerini görüntüle ve güncelle!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo"><img src="logo.png" alt="Testlik.com" style="height:32px;vertical-align:middle;"> Testlik.com</div>
    <nav class="nav-links">
      <a href="index.html">Anasayfa</a>
      <a href="kategoriler.html">Kategoriler</a>
      <a href="sizdengelenler.html">Sizden Gelenler</a>
      <a href="soru-uret.html">Soru Üret</a>
      <a href="cark.html">Çarkıfelek</a>
      <a href="video-izle.html">Video İzle Kazan</a>
      <a href="favoriler.html">Favoriler</a>
      <a href="profil.html" class="active">Profil</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="akademi.html">Akademi</a>
      <a href="istatistik.html">İstatistik</a>
      <a href="leaderboard.html">Liderlik</a>
      <a href="admin.html" class="admin-link" id="admin-link" style="display:none;">Admin</a>
      <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
    </nav>
  </header>
  <!-- Main -->
  <main>
    <section style="max-width:440px;margin:36px auto 30px auto;">
      <div class="profile-wrap">
        <h2 style="color:#735aff;text-align:center;font-weight:900;margin-bottom:18px;">Profilim</h2>
        <div id="profil-bilgiler">
          <div style="text-align:center;margin-bottom:17px;">
            <img id="profil-foto" src="img/soru-isareti.png" alt="Profil Fotoğrafı" style="width:80px;height:80px;border-radius:40px;box-shadow:0 2px 14px #735aff17;">
            <br>
            <input type="file" id="profilFotoInput" accept="image/*" style="margin-top:7px;"/>
            <button class="btn" style="padding:5px 13px;font-size:.93em;margin-top:5px;" onclick="profilFotoYukle()">Fotoğrafı Yükle</button>
          </div>
          <label>Kullanıcı Adı</label>
          <input type="text" id="displayName" maxlength="24">
          <label>E-posta</label>
          <input type="email" id="email" disabled>
          <div style="margin:9px 0 3px 0;font-size:1.03em;color:#735aff;">
            <b id="puan">0</b> puan • <b id="cozum">0</b> test çözüldü
          </div>
          <button class="btn" onclick="profilGuncelle()">Kaydet</button>
          <div id="profil-sonuc" style="margin-top:10px;color:#7a53c4;font-weight:700;min-height:20px;"></div>
        </div>
      </div>
    </section>
  </main>
  <!-- Footer -->
  <footer>
    <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
    <div class="odeme-logo">
      <img src="wise.png" alt="Wise" />
      <img src="payoneer.png" alt="Payoneer" />
      <img src="iban.png" alt="IBAN" />
    </div>
  </footer>
  <!-- Firebase/JS -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script src="main.js"></script>
  <script>
    let currentUid = "";
    firebase.auth().onAuthStateChanged(async function(user) {
      var adminLink = document.getElementById('admin-link');
      if (adminLink) {
        if (user && user.email === "admin@testlik.com") adminLink.style.display = "inline-block";
        else adminLink.style.display = "none";
      }
      if (user) {
        currentUid = user.uid;
        document.getElementById("email").value = user.email;
        // Firestore'dan profil bilgisi çek
        const doc = await db.collection("users").doc(user.uid).get();
        const data = doc.data();
        document.getElementById("displayName").value = data.displayName || "";
        document.getElementById("puan").innerText = data.point || 0;
        document.getElementById("cozum").innerText = data.solvedTests ? data.solvedTests.length : 0;
        // Profil fotoğrafı (isteğe bağlı)
        if (data.profilePhoto) document.getElementById("profil-foto").src = data.profilePhoto;
      } else {
        document.getElementById("profil-bilgiler").innerHTML = "<div style='color:#bbb;text-align:center;'>Giriş yapmadan profil görüntülenemez.</div>";
      }
    });

    // Profil güncelle
    async function profilGuncelle() {
      if (!currentUid) return;
      const displayName = document.getElementById("displayName").value.trim();
      if (!displayName) {
        document.getElementById("profil-sonuc").innerText = "Kullanıcı adı boş olamaz!";
        return;
      }
      await db.collection("users").doc(currentUid).update({ displayName });
      const user = firebase.auth().currentUser;
      await user.updateProfile({ displayName });
      document.getElementById("profil-sonuc").innerText = "Profil güncellendi!";
    }

    // Profil fotoğrafı yükle (base64 ile - demo, gerçek projede storage kullanılması tavsiye edilir)
    function profilFotoYukle() {
      const input = document.getElementById("profilFotoInput");
      if (!input.files.length) return alert("Bir fotoğraf seçin.");
      const file = input.files[0];
      const reader = new FileReader();
      reader.onload = function(e) {
        const imgBase64 = e.target.result;
        db.collection("users").doc(currentUid).update({ profilePhoto: imgBase64 });
        document.getElementById("profil-foto").src = imgBase64;
        document.getElementById("profil-sonuc").innerText = "Fotoğraf güncellendi!";
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
