<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kızlar Kulübü Admin Paneli | Testlik.com</title>
  <meta name="description" content="Testlik.com Kızlar Kulübü admin paneli üzerinden kolayca yeni konular ekleyin. Toplu konu yönetimi ile hızlı düzenleme yapın.">
  <meta name="robots" content="noindex, nofollow"> <!-- Çünkü bu admin paneli, Google dizinine girmemeli -->
  <link rel="stylesheet" href="admin-style.css" />
  <script type="module" src="admin-kizlar.js" defer></script>
</head>
<body>
  <header class="admin-header">
    <h1>🌸 Kızlar Kulübü - Admin Paneli</h1>
  </header>

  <main class="admin-panel">
    <section>
      <h2>📝 Toplu Konu Ekle</h2>
      <textarea id="konuJsonInput" placeholder='[ { "baslik": "...", "aciklama": "..." }, ... ]'></textarea>
      <button id="konuEkleBtn">📌 Konu(lar)ı Ekle</button>
    </section>

    <div id="sonucAlani"></div>
  </main>
</body>
</html>
