<!-- list-detail.html -->
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Testlik | Liste Detayı</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="firebase.js"></script>
  <script type="module">
    import { db } from './firebase.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const urlParams = new URLSearchParams(window.location.search);
    const listId = urlParams.get("id");

    async function loadList() {
      const container = document.getElementById('list-detail');
      const ref = doc(db, "lists", listId);
      const snap = await getDoc(ref);

      if (snap.exists()) {
        const data = snap.data();
        container.innerHTML = `<h2>${data.title}</h2><ul>${data.items.map(item => `<li>${item}</li>`).join('')}</ul>`;
      } else {
        container.innerHTML = "Liste bulunamadı.";
      }
    }

    window.onload = loadList;
  </script>
</head>
<body>
  <nav>
    <a href="lists.html">← Tüm Listeler</a>
  </nav>

  <main>
    <div id="list-detail">Yükleniyor...</div>
  </main>

  <footer>
    <p>© 2025 Testlik</p>
  </footer>
</body>
</html>
