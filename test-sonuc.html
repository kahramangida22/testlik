<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test Sonucu | Testlik.com</title>
  <meta name="description" content="Testlik.com - Test sonucu ve puan ekranı.">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .sonuc-card {
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 2px 24px #735aff19;
      padding: 38px 26px 32px 26px;
      max-width: 420px;
      margin: 40px auto 22px auto;
      text-align: center;
      font-size: 1.12em;
      color: #4a306f;
    }
    .sonuc-img {
      width: 110px;
      height: 110px;
      object-fit: contain;
      border-radius: 26px;
      background: #f9f6ff;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px #b69bfc19;
    }
    .puan-badge {
      font-size: 1.23em;
      color: #fff;
      background: linear-gradient(90deg, #fd72ff 0%, #735aff 100%);
      border-radius: 22px;
      padding: 10px 30px;
      font-weight: 700;
      display: inline-block;
      margin: 18px 0 8px 0;
      letter-spacing: 0.02em;
      box-shadow: 0 2px 12px #735aff29;
    }
    .sonuc-title {color: #735aff; font-size: 1.22em; font-weight:700;margin-bottom:11px;}
    .sonuc-detail {color: #876fa9;}
    .sonuc-btns {margin-top:28px;display:flex;gap:12px;justify-content:center;}
    .sonuc-btns .cta-btn {padding:10px 25px;font-size:1em;margin:0;}
  </style>
</head>
<body>
  <header>
    <div class="nav-flex">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <main>
    <div id="sonuc-alani"></div>
  </main>
  <footer>
    <div class="footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="wise.png" alt="Wise" />
        <img src="payoneer.png" alt="Payoneer" />
        <img src="iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script>
    firebase.auth().onAuthStateChanged(function(user) {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        if (user) logoutBtn.style.display = 'inline-block';
        else logoutBtn.style.display = 'none';
      }
    });
    document.addEventListener('DOMContentLoaded', function() {
      var logoutBtnElem = document.getElementById('logout-btn');
      if (logoutBtnElem) {
        logoutBtnElem.onclick = function(e) {
          e.preventDefault();
          firebase.auth().signOut().then(() => {
            window.location.href = "index.html";
          });
        }
      }
    });

    // SONUÇ HESAPLA
    async function loadResult() {
      const sonuc = document.getElementById("sonuc-alani");
      const urlParams = new URLSearchParams(window.location.search);
      const testId = urlParams.get('id');
      let answers;
      try {
        answers = JSON.parse(decodeURIComponent(urlParams.get('answers') || "[]"));
      } catch { answers = []; }
      if (!testId) {
        sonuc.innerHTML = "<p>Test sonucu bulunamadı.</p>";
        return;
      }
      const testDoc = await db.collection("tests").doc(testId).get();
      if (!testDoc.exists) {
        sonuc.innerHTML = "<p>Test sonucu bulunamadı.</p>";
        return;
      }
      const testData = testDoc.data();
      // Basit puanlama: Doğru cevaplar 1'er puan, sonuç metni testData.results arrayinden alınır (puan aralığına göre)
      let point = 0;
      for (let i = 0; i < (testData.questions || []).length; i++) {
        const correct = testData.questions[i].correct; // Doğru şık indexi
        if (typeof correct !== "undefined" && answers[i] == correct) point++;
      }
      // Sonuç metni/görseli:
      let resultObj = (testData.results || []).find(r => point >= (r.min||0) && point <= (r.max||99));
      if (!resultObj) resultObj = { text: "Tebrikler, sonucu başarıyla tamamladın!", image: "success.png" };
      // Puan rozet rengi/grafiği
      sonuc.innerHTML = `
        <div class="sonuc-card">
          <img class="sonuc-img" src="${resultObj.image || 'success.png'}" alt="Sonuç" />
          <div class="puan-badge">${point} Puan</div>
          <div class="sonuc-title">${resultObj.title || "Sonuç"}</div>
          <div class="sonuc-detail">${resultObj.text || ""}</div>
          <div class="sonuc-btns">
            <a href="test-render.html?id=${testId}" class="cta-btn">Tekrar Çöz</a>
            <a href="index.html" class="cta-btn">Anasayfaya Dön</a>
          </div>
        </div>
      `;
      // Kullanıcı giriş yaptıysa puanı güncelle
      firebase.auth().onAuthStateChanged(async user => {
        if (user) {
          const userRef = db.collection("users").doc(user.uid);
          const userDoc = await userRef.get();
          let prev = userDoc.data().completedTests || [];
          if (!prev.includes(testId)) {
            await userRef.update({
              completedTests: [...prev, testId],
              points: (userDoc.data().points || 0) + point
            });
          }
        }
      });
    }
    loadResult();
  </script>
</body>
</html>
