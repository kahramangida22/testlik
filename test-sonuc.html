
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sonuç Sayfası</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f7f7; margin: 0; padding: 20px; text-align: center; }
    h1 { color: #333; }
    .result-container { background: white; padding: 20px; border-radius: 10px; max-width: 500px; margin: 40px auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    img { max-width: 100%; border-radius: 10px; margin-top: 20px; }
    #loading { color: #666; font-style: italic; }
  </style>
</head>
<body>
  <div class="result-container">
    <h1>Sonuç Sayfası</h1>
    <div id="loading">Yükleniyor...</div>
    <div id="result" style="display: none;">
      <p id="result-text"></p>
      <img id="result-image" src="" alt="Sonuç Görseli"/>
    </div>
  </div>

  <script type="module">
    import {{ initializeApp }} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {{ getFirestore, doc, getDoc }} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {{
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    }};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const testId = urlParams.get('id') || "test-1";
    const score = parseInt(urlParams.get('score'), 10) || 0;

    async function getResult() {{
      const docRef = doc(db, "testler", testId);
      const docSnap = await getDoc(docRef);

      if (docSnap.exists()) {{
        const data = docSnap.data();
        const resultData = data.results.find(r => score >= r.min && score <= r.max);
        if (resultData) {{
          document.getElementById("result-text").innerText = resultData.text;
          document.getElementById("result-image").src = resultData.image;
        }} else {{
          document.getElementById("result-text").innerText = "Sonuç bulunamadı.";
        }}
        document.getElementById("loading").style.display = "none";
        document.getElementById("result").style.display = "block";
      }} else {{
        document.getElementById("loading").innerText = "Test bulunamadı.";
      }}
    }}

    getResult();
  </script>
</body>
</html>
