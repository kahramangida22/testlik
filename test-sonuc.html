<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test Sonucu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .result-container {
      background-color: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 600px;
    }
    #resultImage {
      max-width: 100%;
      margin-top: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="result-container">
    <h1>Sonuç Sayfası</h1>
    <p id="resultText">Yükleniyor...</p>
    <img id="resultImage" src="" alt="Sonuç Görseli"/>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCjM4E***************", // Gerçek API anahtarınızla değiştirin
      authDomain: "testlik.firebaseapp.com",
      projectId: "testlik",
      storageBucket: "testlik.appspot.com",
      messagingSenderId: "1081********",
      appId: "1:1081*********:web:**********"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const testId = urlParams.get("id");

    async function fetchResults() {
      const docRef = doc(db, "testler", testId);
      const docSnap = await getDoc(docRef);

      if (docSnap.exists()) {
        const data = docSnap.data();
        const results = data.results || [];
        const totalScore = parseInt(localStorage.getItem("score") || 0);

        const result = results.find(r => totalScore >= r.min && totalScore <= r.max);

        if (result) {
          document.getElementById("resultText").innerText = result.text;
          document.getElementById("resultImage").src = result.image;
        } else {
          document.getElementById("resultText").innerText = "Sonuç bulunamadı.";
        }
      } else {
        document.getElementById("resultText").innerText = "Veri alınamadı.";
      }
    }

    fetchResults();
  </script>
</body>
</html>
