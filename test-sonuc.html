
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sonuç Sayfası</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 600px;
    }
    .result-image {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin-bottom: 1rem;
    }
    .loading {
      font-style: italic;
      color: gray;
    }
  </style>
</head>
<body>
  <div class="container" id="result-container">
    <h1>Sonuç Sayfası</h1>
    <p class="loading">Yükleniyor...</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const testId = urlParams.get("id");
    const score = parseInt(urlParams.get("score"), 10);

    async function fetchAndDisplayResult() {
      if (!testId || isNaN(score)) return;

      const docRef = doc(db, "testler", testId);
      const docSnap = await getDoc(docRef);

      if (docSnap.exists()) {
        const data = docSnap.data();
        const results = data.results || [];
        const result = results.find(r => score >= r.min && score <= r.max);

        const container = document.getElementById("result-container");
        container.innerHTML = "<h1>Sonuç Sayfası</h1>";

        if (result) {
          if (result.image) {
            const img = document.createElement("img");
            img.src = result.image;
            img.alt = "Sonuç Görseli";
            img.className = "result-image";
            container.appendChild(img);
          }

          const text = document.createElement("p");
          text.textContent = result.text || "Sonuç metni bulunamadı.";
          container.appendChild(text);
        } else {
          container.innerHTML += "<p>Sonuç bulunamadı.</p>";
        }
      } else {
        document.getElementById("result-container").innerHTML = "<h1>Sonuç Sayfası</h1><p>Test bulunamadı.</p>";
      }
    }

    fetchAndDisplayResult();
  </script>
</body>
</html>
