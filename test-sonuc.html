
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sonuç Sayfası</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f6f6f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .result-container {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
    }
    .result-container img {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="result-container">
    <h2>Sonuç Sayfası</h2>
    <p id="resultText">Yükleniyor...</p>
    <img id="resultImage" style="display:none;" />
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const testId = urlParams.get("id");
    const score = parseInt(localStorage.getItem("score"));

    async function fetchResult() {
      if (!testId || isNaN(score)) {
        document.getElementById("resultText").textContent = "Sonuç bulunamadı.";
        return;
      }

      const docRef = doc(db, "testler", testId);
      const docSnap = await getDoc(docRef);

      if (!docSnap.exists()) {
        document.getElementById("resultText").textContent = "Test bulunamadı.";
        return;
      }

      const data = docSnap.data();
      const results = data.results || [];

      const matched = results.find(r => score >= r.min && score <= r.max);
      if (matched) {
        document.getElementById("resultText").textContent = matched.text;
        const img = document.getElementById("resultImage");
        img.src = matched.image;
        img.style.display = "block";
      } else {
        document.getElementById("resultText").textContent = "Uygun sonuç bulunamadı.";
      }
    }

    fetchResult();
  </script>
</body>
</html>
