<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Sonuç Sayfası</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      max-width: 500px;
    }
    h1 {
      margin-bottom: 20px;
    }
    img {
      max-width: 100%;
      margin-top: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sonuç Sayfası</h1>
    <div id="resultText">Yükleniyor...</div>
    <img id="resultImage" src="" alt="Sonuç Görseli" style="display:none;">
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script>
    // Firebase Config (güncellemeyi unutma!)
    const firebaseConfig = {
      apiKey: "API_KEY",
      authDomain: "testlik.firebaseapp.com",
      projectId: "testlik",
      storageBucket: "testlik.appspot.com",
      messagingSenderId: "SENDER_ID",
      appId: "APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const params = new URLSearchParams(window.location.search);
    const testId = params.get("id");
    const puan = parseInt(params.get("puan")) || 0;

    const resultText = document.getElementById("resultText");
    const resultImage = document.getElementById("resultImage");

    async function loadResult() {
      if (!testId) {
        resultText.innerText = "Test ID eksik.";
        return;
      }

      try {
        const doc = await db.collection("testler").doc(testId).get();
        if (!doc.exists) {
          resultText.innerText = "Test bulunamadı.";
          return;
        }

        const data = doc.data();
        const results = data.results || [];

        const matched = results.find(r => puan >= r.min && puan <= r.max);

        if (matched) {
          resultText.innerText = matched.text;
          if (matched.image) {
            resultImage.src = matched.image;
            resultImage.style.display = "block";
          }
        } else {
          resultText.innerText = "Sonuç bulunamadı.";
        }
      } catch (e) {
        resultText.innerText = "Hata: " + e.message;
      }
    }

    loadResult();
  </script>
</body>
</html>
