
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sonuç Sayfası</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      text-align: center;
      padding: 50px;
    }
    .result-container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      display: inline-block;
    }
    h1 {
      color: #333;
    }
    #resultText {
      font-size: 18px;
      margin: 20px 0;
    }
    #resultImage {
      max-width: 300px;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="result-container">
    <h1>Sonuç Sayfası</h1>
    <p id="loading">Yükleniyor...</p>
    <p id="resultText" style="display:none;"></p>
    <img id="resultImage" src="" alt="Sonuç Görseli" style="display:none;" />
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const testId = urlParams.get("id");
    const puan = parseInt(urlParams.get("puan"));

    async function getResult() {
      const ref = doc(db, "testler", testId);
      const snap = await getDoc(ref);
      if (!snap.exists()) {
        document.getElementById("loading").innerText = "Sonuç bulunamadı.";
        return;
      }

      const data = snap.data();
      if (!data.results) {
        document.getElementById("loading").innerText = "Sonuçlar tanımlı değil.";
        return;
      }

      const result = data.results.find(r => puan >= r.min && puan <= r.max);
      if (!result) {
        document.getElementById("loading").innerText = "Uygun sonuç bulunamadı.";
        return;
      }

      document.getElementById("loading").style.display = "none";
      document.getElementById("resultText").innerText = result.text;
      document.getElementById("resultText").style.display = "block";
      document.getElementById("resultImage").src = result.image;
      document.getElementById("resultImage").style.display = "block";
    }

    getResult();
  </script>
</body>
</html>
