
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Sonuç Sayfası</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      text-align: center;
      background-color: #f2f2f2;
    }
    #result-container img {
      max-width: 300px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Sonuç Sayfası</h1>
  <div id="result-container">Yükleniyor...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const testId = urlParams.get("id") || "test-1";

    const docRef = doc(db, "testler", testId);
    const docSnap = await getDoc(docRef);

    const resultContainer = document.getElementById("result-container");

    if (docSnap.exists()) {
      const testData = docSnap.data();
      const userTotalScore = parseInt(localStorage.getItem("score")) || 0;

      if (testData.results && Array.isArray(testData.results)) {
        const result = testData.results.find(r => userTotalScore >= r.min && userTotalScore <= r.max);
        if (result) {
          resultContainer.innerHTML = `
            <h2>Sonuç: ${userTotalScore} Puan</h2>
            <p>${result.text}</p>
            <img src="${result.image}" alt="Sonuç Görseli">
          `;
        } else {
          resultContainer.innerHTML = "<p>Sonuca ulaşılamadı.</p>";
        }
      } else {
        resultContainer.innerHTML = "<p>Sonuç verisi bulunamadı.</p>";
      }
    } else {
      resultContainer.innerHTML = "<p>Test bulunamadı.</p>";
    }
  </script>
</body>
</html>
