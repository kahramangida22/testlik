<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Test Sonucu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 40px;
      text-align: center;
    }
    .result-box {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
    .result-box img {
      max-width: 100%;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .result-box h2 {
      margin: 0;
      color: #00796b;
    }
    .result-box p {
      font-size: 18px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="result-box">
    <img id="resultImage" src="" alt="Sonuç Görseli" />
    <h2 id="resultTitle">Yükleniyor...</h2>
    <p id="resultMessage"></p>
    <p id="resultPoints"></p>
  </div>

  <script type="module" src="test-sonuc.js"></script>
</body>
</html>
