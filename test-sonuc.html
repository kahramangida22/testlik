<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sonuç Sayfası</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }
    .result-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      max-width: 500px;
    }
    img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="result-box">
    <h2>Sonuç Sayfası</h2>
    <div id="resultContent">Yükleniyor...</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "test-api",
      authDomain: "testlik.firebaseapp.com",
      projectId: "testlik",
      storageBucket: "testlik.appspot.com",
      messagingSenderId: "test-id",
      appId: "test-app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const testId = params.get("id") || "test-1";
    const userScore = 13;

    async function getResult() {
      const ref = doc(db, "testler", testId);
      const snap = await getDoc(ref);
      const resultBox = document.getElementById("resultContent");

      if (!snap.exists()) {
        resultBox.innerHTML = "Sonuç bulunamadı.";
        return;
      }

      const data = snap.data();
      if (!data.results) {
        resultBox.innerHTML = "Sonuç alanı eksik.";
        return;
      }

      const match = data.results.find(r => userScore >= r.min && userScore <= r.max);
      if (!match) {
        resultBox.innerHTML = "Puanınıza uygun sonuç bulunamadı.";
        return;
      }

      resultBox.innerHTML = `
        <img src="${match.image}" alt="Sonuç Görseli">
        <p>${match.text}</p>
      `;
    }

    getResult();
  </script>
</body>
</html>
