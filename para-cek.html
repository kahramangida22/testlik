
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Para Çek - Testlik</title>
  <script type="module" src="auth.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background-color: #f7f7f7; }
    h2 { color: #333; }
    label { display: block; margin-top: 10px; }
    input, textarea { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; }
    button { margin-top: 15px; padding: 10px 20px; font-size: 16px; border: none; background-color: #28a745; color: white; border-radius: 6px; cursor: pointer; }
    button:hover { background-color: #218838; }
  </style>
</head>
<body>
  <h2>Para Çekme Talebi</h2>
  <form onsubmit="requestWithdrawal(); return false;">
    <label for="iban">IBAN Numarası:</label>
    <input type="text" id="iban" required />

    <label for="amount">Çekmek İstediğiniz Puan:</label>
    <input type="number" id="amount" required min="100" />

    <label for="explanation">Açıklama (isteğe bağlı):</label>
    <textarea id="explanation"></textarea>

    <button type="submit">Talebi Gönder</button>
  </form>
</body>
</html>
