<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test Sayfası</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }
    .container {
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { margin-bottom: 20px; }
    .option {
      margin: 10px 0;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="test-title">Test Yükleniyor...</h1>
    <div id="question-container"></div>
    <button id="next-btn" style="display:none;">Devam Et</button>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "API_KEY",
      authDomain: "testlik.firebaseapp.com",
      projectId: "testlik",
      storageBucket: "testlik.appspot.com",
      messagingSenderId: "SENDER_ID",
      appId: "APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Helpers
    const urlParams = new URLSearchParams(window.location.search);
    const testId = urlParams.get('id');
    const testTitle = document.getElementById("test-title");
    const questionContainer = document.getElementById("question-container");
    const nextBtn = document.getElementById("next-btn");

    let currentQuestionIndex = 0;
    let selectedAnswers = [];
    let questions = [];

    async function loadTest() {
      if (!testId) {
        testTitle.textContent = "Test bulunamadı.";
        return;
      }

      const docRef = db.collection("testler").doc(testId);
      const doc = await docRef.get();

      if (!doc.exists) {
        testTitle.textContent = "Test bulunamadı.";
        return;
      }

      const data = doc.data();
      questions = data.questions;
      testTitle.textContent = data.title || "Test";

      showQuestion();
    }

    function showQuestion() {
      if (currentQuestionIndex >= questions.length) {
        const totalScore = selectedAnswers.length * 10;
        window.location.href = `test-sonuc.html?id=${testId}&puan=${totalScore}`;
        return;
      }

      const q = questions[currentQuestionIndex];
      questionContainer.innerHTML = `<p><strong>${q.question}</strong></p>`;

      q.options.forEach((option, index) => {
        const optionHTML = `
          <div class="option">
            <label>
              <input type="radio" name="answer" value="${index}" />
              ${option}
            </label>
          </div>
        `;
        questionContainer.innerHTML += optionHTML;
      });

      nextBtn.style.display = "inline-block";
    }

    nextBtn.addEventListener("click", () => {
      const selected = document.querySelector('input[name="answer"]:checked');
      if (!selected) {
        alert("Lütfen bir seçenek seçin.");
        return;
      }

      selectedAnswers.push(parseInt(selected.value));
      currentQuestionIndex++;
      showQuestion();
    });

    loadTest();
  </script>
</body>
</html>
