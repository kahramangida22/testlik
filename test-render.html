<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test Sayfası</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }
    .container {
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { margin-bottom: 20px; }
    .option {
      margin: 10px 0;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="test-title">Test Yükleniyor...</h1>
    <div id="question-container"></div>
    <button id="next-btn" style="display:none;">Devam Et</button>
    <button id="favori-btn">♡ Favorilere Ekle</button>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDcneigub2eAJjTrfrkiETuLgy5ule8L6s",
      authDomain: "testlik.firebaseapp.com",
      projectId: "testlik",
      storageBucket: "testlik.appspot.com",
      messagingSenderId: "668524500496",
      appId: "1:668524500496:web:579bb4fc5990c87afedc95"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const testId = urlParams.get('id');

    const testTitle = document.getElementById("test-title");
    const questionContainer = document.getElementById("question-container");
    const nextBtn = document.getElementById("next-btn");
    const favoriBtn = document.getElementById("favori-btn");

    let currentQuestionIndex = 0;
    let selectedAnswers = [];
    let questions = [];

    async function loadTest() {
      if (!testId) {
        testTitle.textContent = "Test bulunamadı.";
        return;
      }

      const docRef = doc(db, "testler", testId);
      const docSnap = await getDoc(docRef);

      if (!docSnap.exists()) {
        testTitle.textContent = "Test bulunamadı.";
        return;
      }

      const data = docSnap.data();
      questions = data.questions;
      testTitle.textContent = data.title || "Test";

      showQuestion();
    }

    function showQuestion() {
      if (currentQuestionIndex >= questions.length) {
        const totalScore = selectedAnswers.length * 10;
        window.location.href = `test-sonuc.html?id=${testId}&puan=${totalScore}`;
        return;
      }

      const q = questions[currentQuestionIndex];
      questionContainer.innerHTML = `<p><strong>${q.question}</strong></p>`;

      q.options.forEach((option, index) => {
        const optionHTML = `
          <div class="option">
            <label>
              <input type="radio" name="answer" value="${index}" />
              ${option}
            </label>
          </div>
        `;
        questionContainer.innerHTML += optionHTML;
      });

      nextBtn.style.display = "inline-block";
    }

    nextBtn.addEventListener("click", () => {
      const selected = document.querySelector('input[name="answer"]:checked');
      if (!selected) {
        alert("Lütfen bir seçenek seçin.");
        return;
      }

      selectedAnswers.push(parseInt(selected.value));
      currentQuestionIndex++;
      showQuestion();
    });

    // Favorilere ekle
    favoriBtn.addEventListener("click", () => {
      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          alert("Favorilere eklemek için giriş yapmalısınız.");
          return;
        }

        const uid = user.uid;
        const userRef = doc(db, "kullanicilar", uid);

        try {
          await updateDoc(userRef, {
            favorites: arrayUnion(testId)
          });
          alert("Test favorilere eklendi!");
        } catch (error) {
          console.error("Favori ekleme hatası:", error);
          alert("Favoriye eklenemedi.");
        }
      });
    });

    loadTest();
  </script>
</body>
</html>
