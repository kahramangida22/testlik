
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Çöz</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .card { background: #fff; border-radius: 8px; padding: 20px; max-width: 600px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    .question { margin: 20px 0; }
    .options label { display: block; margin-bottom: 8px; }
    button { margin-top: 20px; padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h2 id="test-title">Yükleniyor...</h2>
    <div id="questions"></div>
    <button onclick="finishTest()">Testi Bitir</button>
  </div>

  <script>
    async function loadTest() {
      const res = await fetch("test-1.json");
      const data = await res.json();
      document.getElementById("test-title").textContent = data.title;
      const container = document.getElementById("questions");
      data.questions.forEach((q, index) => {
        const div = document.createElement("div");
        div.classList.add("question");
        div.innerHTML = `<strong>${index + 1}. ${q.question}</strong><div class="options">` +
          q.options.map(opt => `<label><input type="radio" name="q${index}" value="${opt}"> ${opt}</label>`).join("") +
          `</div>`;
        container.appendChild(div);
      });
    }

    function finishTest() {
      alert("Cevaplarınız alınmıştır. Teşekkürler!");
    }

    loadTest();
  </script>
</body>
</html>
