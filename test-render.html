<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test Çöz | Testlik.com</title>
  <meta name="description" content="Testlik.com - Test çöz, anında puan kazan ve ödülleri topla!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo"><img src="logo.png" alt="Testlik.com" style="height:32px;vertical-align:middle;"> Testlik.com</div>
    <nav class="nav-links">
      <a href="index.html">Anasayfa</a>
      <a href="kategoriler.html">Kategoriler</a>
      <a href="sizdengelenler.html">Sizden Gelenler</a>
      <a href="soru-uret.html">Soru Üret</a>
      <a href="cark.html">Çarkıfelek</a>
      <a href="video-izle.html">Video İzle Kazan</a>
      <a href="favoriler.html">Favoriler</a>
      <a href="profil.html">Profil</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="akademi.html">Akademi</a>
      <a href="istatistik.html">İstatistik</a>
      <a href="leaderboard.html">Liderlik</a>
      <a href="admin.html" class="admin-link" id="admin-link" style="display:none;">Admin</a>
      <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
    </nav>
  </header>
  <!-- Main -->
  <main>
    <section style="max-width:530px;margin:37px auto 30px auto;">
      <div id="test-soru-wrap" class="profile-wrap" style="padding: 28px 14px 21px 14px;">
        <!-- Test soruları burada adım adım gösterilecek -->
      </div>
    </section>
  </main>
  <!-- Footer -->
  <footer>
    <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
    <div class="odeme-logo">
      <img src="wise.png" alt="Wise" />
      <img src="payoneer.png" alt="Payoneer" />
      <img src="iban.png" alt="IBAN" />
    </div>
  </footer>
  <!-- Firebase/JS -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script src="main.js"></script>
  <script>
    // Yardımcı fonksiyonlar
    function getQueryParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || "";
    }
    const testId = getQueryParam("id");
    let testData = null, curr = 0, answers = [];

    // Admin kontrol
    firebase.auth().onAuthStateChanged(function(user) {
      var adminLink = document.getElementById('admin-link');
      if (adminLink) {
        if (user && user.email === "admin@testlik.com") adminLink.style.display = "inline-block";
        else adminLink.style.display = "none";
      }
    });

    // Test verisini Firestore'dan çek
    async function yukleTest() {
      if (!testId) {
        document.getElementById("test-soru-wrap").innerHTML = "<div style='color:#bba5fa;width:100%;text-align:center;'>Test bulunamadı.</div>";
        return;
      }
      const doc = await db.collection("tests").doc(testId).get();
      if (!doc.exists) {
        document.getElementById("test-soru-wrap").innerHTML = "<div style='color:#bba5fa;width:100%;text-align:center;'>Test bulunamadı.</div>";
        return;
      }
      testData = doc.data();
      curr = 0;
      answers = [];
      renderSoru();
    }

    // Soruyu ekrana bas
    function renderSoru() {
      if (!testData || !testData.questions || curr >= testData.questions.length) {
        // Sonuca geç
        showResult();
        return;
      }
      const q = testData.questions[curr];
      let html = `<div style="font-weight:700;color:#735aff;font-size:1.1em;margin-bottom:10px;">${curr+1}. Soru</div>`;
      if (q.image) html += `<img src="${q.image}" alt="" style="max-width:110px;margin-bottom:8px;border-radius:12px;">`;
      html += `<div style="font-size:1.1em;margin-bottom:12px;">${q.text}</div>`;
      q.options.forEach((op, idx) => {
        html += `<div style="margin-bottom:7px;">
          <label style="display:flex;align-items:center;gap:7px;cursor:pointer;">
            <input type="radio" name="cevap" value="${idx}"> <span>${op}</span>
          </label>
        </div>`;
      });
      html += `<button class="btn" style="margin-top:13px;" onclick="soruDevam()">Devam Et</button>`;
      document.getElementById("test-soru-wrap").innerHTML = html;
    }

    // Sonraki soruya geç
    function soruDevam() {
      const sec = document.querySelector('input[name="cevap"]:checked');
      if (!sec) return alert("Bir seçenek seçmelisin!");
      answers[curr] = parseInt(sec.value);
      curr++;
      renderSoru();
    }

    // Sonuç ekranı
    function showResult() {
      // Kaç doğru, toplam puan, sonuç metni vs.
      let dogru = 0;
      if (testData.correctAnswers && Array.isArray(testData.correctAnswers)) {
        testData.correctAnswers.forEach((cevap, i) => {
          if (answers[i] === cevap) dogru++;
        });
      }
      // Puan hesapla (ör: 10 puan/soru)
      let puan = (testData.point || 10) * dogru;
      // Sonuç metni (puan aralığına göre)
      let resultTxt = "";
      let resultImg = "img/soru-isareti.png";
      if (Array.isArray(testData.results)) {
        for (const r of testData.results) {
          if (dogru >= r.min && dogru <= r.max) {
            resultTxt = r.text;
            resultImg = r.image || resultImg;
            break;
          }
        }
      }
      let html = `<div style="font-size:1.18em;font-weight:800;color:#735aff;margin-bottom:14px;">Test Sonucu</div>
        <img src="${resultImg}" style="max-width:130px;margin-bottom:11px;border-radius:18px;box-shadow:0 2px 11px #735aff13;">
        <div style="color:#ed4a88;font-size:1.1em;font-weight:700;margin:9px 0;">${resultTxt || ''}</div>
        <div style="font-size:1.04em;color:#7a53c4;margin-bottom:7px;">Doğru Sayısı: <b>${dogru}</b></div>
        <div style="font-size:1.04em;color:#7a53c4;margin-bottom:7px;">Kazanılan Puan: <b>${puan}</b></div>
        <button class="btn" style="margin-top:17px;" onclick="window.location.href='index.html'">Anasayfaya Dön</button>`;
      document.getElementById("test-soru-wrap").innerHTML = html;
      // Kullanıcıya puan ekle
      firebase.auth().onAuthStateChanged(function(user){
        if (user && puan > 0) {
          const userRef = db.collection("users").doc(user.uid);
          userRef.get().then(docu => {
            let mevcut = docu.data()?.point || 0;
            let solved = docu.data()?.solvedTests || [];
            if (!solved.includes(testId)) {
              userRef.update({
                point: mevcut + puan,
                solvedTests: [...solved, testId]
              });
            }
          });
        }
      });
    }

    document.addEventListener("DOMContentLoaded", yukleTest);
  </script>
</body>
</html>
