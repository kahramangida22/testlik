<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Testlik - Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #e0f2f1, #ffffff);
      font-family: 'Segoe UI', sans-serif;
    }
    .container {
      max-width: 600px;
      margin: 60px auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 30px;
      text-align: center;
    }
    h2 {
      color: #004d40;
      font-size: 22px;
    }
    .options {
      margin-top: 20px;
      text-align: left;
    }
    .options label {
      display: block;
      margin: 10px 0;
      background: #f1f1f1;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .options label:hover {
      background: #c8e6c9;
    }
    button {
      margin-top: 30px;
      padding: 12px 24px;
      background: #00796b;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #004d40;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="question">Yükleniyor...</h2>
    <form id="options" class="options"></form>
    <button id="nextBtn" style="display:none">Devam Et</button>
  </div>

  <script type="module" src="test-render.js"></script>
</body>
</html>
