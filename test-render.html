<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Testi Çöz | Testlik.com</title>
  <meta name="description" content="Testlik.com - Test çöz ve puan kazan!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .test-header-card {
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 2px 22px #735aff14;
      padding: 32px 16px 22px 16px;
      max-width: 410px;
      margin: 30px auto 22px auto;
      text-align: center;
    }
    .test-header-card img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      margin-bottom: 11px;
      border-radius: 22px;
      background: #faf7ff;
      box-shadow: 0 2px 12px #b69bfc19;
    }
    .test-fav-btn {
      background: none;
      border: none;
      margin-left: 8px;
      cursor: pointer;
      vertical-align: middle;
    }
    .test-fav-btn img {
      width: 34px;
      height: 34px;
      vertical-align: middle;
      transition: filter .15s;
    }
    .test-question-card {
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 2px 22px #735aff14;
      padding: 30px 18px 22px 18px;
      max-width: 410px;
      margin: 18px auto 22px auto;
      text-align: left;
      font-size: 1.08em;
    }
    .option-btn {
      width: 100%;
      margin: 8px 0;
      border: none;
      border-radius: 16px;
      padding: 15px 8px;
      background: #f7e8ff;
      font-weight: 700;
      color: #735aff;
      font-size: 1.13em;
      box-shadow: 0 1px 7px #735aff13;
      cursor: pointer;
      transition: background .14s, color .13s;
    }
    .option-btn.selected,
    .option-btn:active {
      background: linear-gradient(90deg,#fd72ff 0%, #735aff 100%);
      color: #fff;
    }
    .next-btn {
      width: 100%;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <header>
    <div class="nav-flex">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <main>
    <div id="test-area"></div>
  </main>
  <footer>
    <div class="footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="wise.png" alt="Wise" />
        <img src="payoneer.png" alt="Payoneer" />
        <img src="iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script>
    // Navbar çıkış butonu
    firebase.auth().onAuthStateChanged(function(user) {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        if (user) logoutBtn.style.display = 'inline-block';
        else logoutBtn.style.display = 'none';
      }
    });
    document.addEventListener('DOMContentLoaded', function() {
      var logoutBtnElem = document.getElementById('logout-btn');
      if (logoutBtnElem) {
        logoutBtnElem.onclick = function(e) {
          e.preventDefault();
          firebase.auth().signOut().then(() => {
            window.location.href = "index.html";
          });
        }
      }
    });

    // TESTİ GETİR, FAV BUTON, SORULAR/ŞIKLAR
    let testId = new URLSearchParams(window.location.search).get('id');
    let testData = null, currentQ = 0, userAnswers = [];
    let user, isFavorite = false;

    firebase.auth().onAuthStateChanged(async _user => {
      user = _user;
      if (!testId) {
        document.getElementById('test-area').innerHTML = "<p>Test bulunamadı.</p>";
        return;
      }
      const testDoc = await db.collection("tests").doc(testId).get();
      if (!testDoc.exists) {
        document.getElementById('test-area').innerHTML = "<p>Test bulunamadı.</p>";
        return;
      }
      testData = testDoc.data();
      if (!testData) return;
      // Favori kontrol
      if (user) {
        const userDoc = await db.collection("users").doc(user.uid).get();
        const favorites = userDoc.data().favorites || [];
        isFavorite = favorites.includes(testId);
      }
      renderTest();
    });

    function renderTest() {
      if (!testData) return;
      // Test header kartı
      let icon = "test-category-default.png";
      if (testData.category === "Genel") icon = "category-genel.png";
      if (testData.category === "Eğlence") icon = "category-eglence.png";
      if (testData.category === "Bilgi") icon = "category-bilgi.png";
      if (testData.category === "Psikoloji") icon = "category-psikoloji.png";
      if (testData.category === "Oyun") icon = "category-oyun.png";
      document.getElementById('test-area').innerHTML = `
        <div class="test-header-card">
          <img src="${icon}" alt="${testData.category || ''}" />
          <h2 style="color:#735aff;margin-bottom:6px;">${testData.title}</h2>
          <div style="color:#876fa9;font-size:1.05em;margin-bottom:7px;">${testData.description || ''}</div>
          <button class="test-fav-btn" id="fav-btn" title="Favorilere ekle/kaldır">
            <img src="${isFavorite ? 'favorite-active.png' : 'favorite-inactive.png'}" alt="Favori"/>
          </button>
        </div>
        <div class="test-question-card" id="question-card"></div>
      `;
      renderQuestion();
      document.getElementById('fav-btn').onclick = toggleFavorite;
    }

    function renderQuestion() {
      if (!testData || !testData.questions) return;
      const q = testData.questions[currentQ];
      if (!q) {
        // Bitti, sonuç sayfasına yönlendir
        const answerStr = encodeURIComponent(JSON.stringify(userAnswers));
        window.location.href = `test-sonuc.html?id=${testId}&answers=${answerStr}`;
        return;
      }
      let optionsHtml = "";
      q.options.forEach((opt, i) => {
        optionsHtml += `<button class="option-btn" onclick="selectOption(${i})" id="opt${i}">${opt}</button>`;
      });
      document.getElementById('question-card').innerHTML = `
        <div style="font-weight:700;color:#735aff;margin-bottom:8px;">Soru ${currentQ+1} / ${testData.questions.length}</div>
        <div style="margin-bottom:13px;">${q.question}</div>
        <div>${optionsHtml}</div>
        <button class="cta-btn next-btn" id="nextBtn" disabled>Devam Et</button>
      `;
      // Option seçimi kontrolü
      window.selectOption = function(idx) {
        document.querySelectorAll('.option-btn').forEach(btn=>btn.classList.remove('selected'));
        document.getElementById('opt'+idx).classList.add('selected');
        document.getElementById('nextBtn').disabled = false;
        window.selectedOpt = idx;
      }
      document.getElementById('nextBtn').onclick = function() {
        userAnswers[currentQ] = typeof window.selectedOpt === "undefined" ? null : window.selectedOpt;
        currentQ++;
        window.selectedOpt = undefined;
        renderQuestion();
      }
    }

    // Favori Ekle/Kaldır
    async function toggleFavorite() {
      if (!user) {
        alert("Favorilere eklemek için giriş yapmalısın!");
        window.location.href = "giris.html";
        return;
      }
      const userRef = db.collection("users").doc(user.uid);
      const userDoc = await userRef.get();
      let favorites = userDoc.data().favorites || [];
      if (isFavorite) {
        favorites = favorites.filter(f => f !== testId);
        isFavorite = false;
      } else {
        favorites.push(testId);
        isFavorite = true;
      }
      await userRef.update({ favorites });
      renderTest();
    }
  </script>
</body>
</html>
