<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Testi Çöz | Testlik.com</title>
  <meta name="description" content="Testlik.com - Test çöz, bilginle yarış ve puan topla!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="img/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <style>
    .test-kart {background:#fff;border-radius:22px;box-shadow:0 2px 18px #735aff13;padding:32px 24px;max-width:500px;margin:42px auto 24px auto;text-align:center;}
    .test-img {width:100%;max-width:300px;height:140px;object-fit:contain;border-radius:16px;margin:0 auto 14px auto;display:block;}
    .test-baslik {color:#735aff;font-size:1.35em;font-weight:700;margin-bottom:7px;}
    .test-kategori {font-size:.99em;color:#b69bfc;}
    .test-soru {margin:28px 0 16px 0;font-size:1.14em;font-weight:600;color:#ed4a88;}
    .secenekler {display:flex;flex-direction:column;gap:12px;}
    .secenek-btn {background:#f7e8ff;color:#735aff;font-weight:700;border:none;padding:14px 0;border-radius:16px;font-size:1em;cursor:pointer;transition:background .13s;}
    .secenek-btn:hover {background:#735aff;color:#fff;}
    .cozuldu-etiket {display:inline-block;background:#13bd72;color:#fff;font-weight:700;border-radius:16px;padding:7px 15px;margin-bottom:8px;font-size:1em;}
  </style>
</head>
<body>
  <header>
    <div class="container">
      <img src="img/logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="profil.html">Profil</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <main>
    <section>
      <div class="test-kart" id="test-alani">
        <div class="loader">Test yükleniyor...</div>
      </div>
    </section>
  </main>
  <footer>
    <div class="container">
      <p>&copy; 2025 <b>Testlik.com</b></p>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="main.js"></script>
  <script src="firebase.js"></script>
  <script>
    // Kullanıcı oturum kontrolü + çıkış
    firebase.auth().onAuthStateChanged(function(user) {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) logoutBtn.style.display = user ? 'inline-block' : 'none';
    });

    // Test yükleme ve çözme
    const urlParams = new URLSearchParams(window.location.search);
    const testId = urlParams.get("id");
    let kategoriGlobal = "Genel";
    let testDoc, sorular, soruIndex = 0, dogruSayisi = 0;

    async function testYukle() {
      if (!testId) {
        document.getElementById("test-alani").innerHTML = "<div style='color:#ed4a88;font-size:1.1em;'>Test bulunamadı!</div>";
        return;
      }
      const doc = await db.collection("tests").doc(testId).get();
      if (!doc.exists) {
        document.getElementById("test-alani").innerHTML = "<div style='color:#ed4a88;font-size:1.1em;'>Test bulunamadı!</div>";
        return;
      }
      testDoc = doc.data();
      sorular = testDoc.questions;
      kategoriGlobal = testDoc.category || "Genel";
      soruIndex = 0;
      dogruSayisi = 0;
      await cozulduKontrolVeSoruGoster();
    }

    async function cozulduKontrolVeSoruGoster() {
      // Çözüldü etiketi kontrolü (main.js fonksiyonu)
      let cozdu = false;
      try {
        if (firebase.auth().currentUser) {
          cozdu = await isTestSolved(testId);
        }
      } catch {}
      soruGoster(cozdu);
    }

    function soruGoster(cozuldu) {
      if (soruIndex >= sorular.length) {
        // Test bitti, sonuç ekranına yönlendir
        markTestAsSolved(testId); // main.js fonksiyonu ile çözüldü olarak işaretle
        window.location.href = `test-sonuc.html?id=${testId}&puan=${dogruSayisi}`;
        return;
      }
      const s = sorular[soruIndex];
      let secenekler = "";
      s.options.forEach((op, i) => {
        secenekler += `<button class="secenek-btn" onclick="secenekSec(${i})">${op}</button>`;
      });
      document.getElementById("test-alani").innerHTML = `
        ${cozuldu ? '<div class="cozuldu-etiket">✔️ Daha önce çözdün</div>' : ""}
        <img src="${testDoc.image || 'img/soru-isareti.png'}" class="test-img" alt="Test Görseli"/>
        <div class="test-baslik">${testDoc.title}</div>
        <div class="test-kategori">${testDoc.category}</div>
        <div class="test-soru">Soru ${soruIndex+1}: ${s.question}</div>
        <div class="secenekler">${secenekler}</div>
      `;
    }

    window.secenekSec = function(i) {
      if (sorular[soruIndex].answer === i) dogruSayisi++;
      soruIndex++;
      soruGoster(false); // Yeni soruda çözüldü etiketi olmasın
    };

    // Başlat
    testYukle();
  </script>
</body>
</html>
