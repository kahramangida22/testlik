<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Paneli - Testlik</title>
  <link rel="stylesheet" href="admin-style.css" />
  <script type="module" src="admin.js" defer></script>
</head>
<body>
  <header class="admin-header">
    <h1>🛠️ Testlik Admin Paneli</h1>
  </header>

  <main class="admin-panel">
    <section>
      <h2>📥 Toplu Test Ekle</h2>
      <textarea id="testJsonInput" placeholder='[ { "baslik": "...", "sorular": [ ... ] }, ... ]'></textarea>
      <button id="testEkleBtn">🧪 Test(ler)i Ekle</button>
    </section>

    <section>
      <h2>📰 Toplu Haber Ekle</h2>
      <textarea id="haberJsonInput" placeholder='[ { "baslik": "...", "icerik": "...", "kategori": "...", ... }, ... ]'></textarea>
      <button id="haberEkleBtn">📢 Haber(ler)i Ekle</button>
    </section>
<section>
  <h2>📝 Toplu Konu Ekle</h2>
  <textarea id="konuJsonInput" placeholder='[ { "baslik": "...", "aciklama": "..." }, ... ]'></textarea>
  <button id="konuEkleBtn">📌 Konu(lar)ı Ekle</button>
</section>

    <div id="sonucAlani"></div>
  </main>
</body>
</html>
