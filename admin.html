<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Admin Paneli - Test Yükle</title>
  <link rel="stylesheet" href="admin-style.css">
  <script type="module" src="admin.js" defer></script>
</head>
<body>
  <h1>⚙️ Admin Paneli</h1>

  <label for="kategori">Kategori Adı (ör. mizah, bilgi, spor):</label><br>
  <input type="text" id="kategori" placeholder="Kategori ismi yaz..."><br><br>

  <label for="jsonInput">Test JSON Verisi:</label><br>
  <textarea id="jsonInput" rows="15" cols="60" placeholder='[
  {
    "soru": "Atatürk’ün doğum yılı nedir?",
    "secenekler": ["1871", "1881", "1891", "1901"],
    "cevap": "1881"
  }
]'></textarea><br><br>

  <button id="gonderBtn">🔥 Firestore’a Yükle</button>
  <p id="durum"></p>
</body>
</html>
