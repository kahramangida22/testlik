
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel - Testlik</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background-color: #f9f9f9; }
    h1 { color: #333; }
    input, textarea, select, button {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 100%;
      max-width: 600px;
    }
  </style>
</head>
<body>
  <h1>Admin Panel</h1>
  <form id="testForm">
    <input type="text" id="testTitle" placeholder="Test Başlığı" required />
    <textarea id="testDescription" placeholder="Test Açıklaması" rows="3"></textarea>
    <textarea id="testJSON" placeholder="Test JSON içeriği" rows="10" required></textarea>
    <button type="submit">Testi Yayınla</button>
  </form>
  <div id="status"></div>

  <script type="module" src="./admin.js"></script>
</body>
</html>
