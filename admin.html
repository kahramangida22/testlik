<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Testlik Admin Paneli</title>
  <script type="module" src="admin.js" defer></script>
  <style>
    body {
      font-family: Arial;
      padding: 2rem;
      background: #f2f2f2;
    }
    textarea {
      width: 100%;
      height: 300px;
    }
    button {
      padding: 0.7rem 1.5rem;
      background: #4CAF50;
      color: white;
      border: none;
      margin-top: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>🛠️ Admin Paneli – Test Ekle</h1>
  <label>Test Başlığı:</label>
  <input type="text" id="baslik"><br><br>
  <label>Kategori (örn: dizi, spor, bilgi):</label>
  <input type="text" id="kategori"><br><br>
  <label>JSON formatında sorular (soru, secenekler[], cevap):</label>
  <textarea id="jsonVeri" placeholder='[{"soru": "...", "secenekler": ["A", "B", "C", "D"], "cevap": 1}]'></textarea>
  <br>
  <button id="ekleBtn">Teste Kaydet</button>
  <p id="durum"></p>
</body>
</html>
