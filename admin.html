  <header class="site-header">

      <div class="logo">🧠 <span>Testlik</span><strong>.com</strong></div>

<main>
  <section>
    <h2>🛠️ Admin Paneli – Test Ekle</h2>
    <label>Test Başlığı:</label>
    <input type="text" id="baslik" placeholder="Örn: Futbol Bilgisi"><br>

    <label>Kategori (örn: dizi, spor, bilgi):</label>
    <input type="text" id="kategori" placeholder="Örn: spor"><br>

    <label>JSON formatında sorular:</label>
    <textarea id="jsonVeri" placeholder='[{"soru": "...", "secenekler": ["A", "B", "C", "D"], "cevap": 1}]'></textarea>

    <button id="ekleBtn">Teste Kaydet</button>
    <p id="durum"></p>
  </section>

  <section>
    <h2>📰 Admin Paneli – Haber Ekle</h2>
    <label>Haber Başlığı:</label>
    <input type="text" id="haberBaslik" placeholder="Örn: Yapay Zeka Trendi"><br>

    <label>Haber Kategorisi:</label>
    <input type="text" id="haberKategori" placeholder="Örn: teknoloji"><br>

    <label>Haber İçeriği:</label>
    <textarea id="haberIcerik" placeholder="Haberin içeriğini buraya yaz..."></textarea>

    <button id="haberEkleBtn">Haberi Kaydet</button>
    <p id="haberDurum"></p>
  </section>

  <div class="alt-reklam">
    <!-- reklam -->
  </div>
</main>
