<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel | Testlik.com</title>
  <meta name="description" content="Testlik.com - Yönetici paneli, test ekle ve düzenle.">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .admin-flex {display:flex;gap:32px;flex-wrap:wrap;justify-content:center;}
    .admin-card {
      background:#fff;border-radius:28px;box-shadow:0 2px 24px #735aff19;
      padding:34px 24px 30px 24px;max-width:430px;text-align:left;font-size:1.11em;margin:22px 0;flex:1;
    }
    .admin-title {color:#735aff;font-size:1.17em;font-weight:700;margin-bottom:10px;}
    .admin-btn {
      background:linear-gradient(90deg,#fd72ff 0%,#735aff 100%);color:#fff;
      border:none;border-radius:13px;padding:9px 20px;font-weight:700;font-size:1em;
      cursor:pointer;margin-top:10px;margin-bottom:10px;transition:background .13s;
    }
    .admin-btn:active{background:#ed4a88;}
    .admin-input, .admin-select, .admin-textarea {
      width:98%;padding:7px 10px;margin-bottom:10px;
      border-radius:11px;border:1.3px solid #b69bfc;font-size:1em;
      background:#faf4ff;resize:vertical;
    }
    .admin-textarea {min-height:44px;max-height:300px;}
    .admin-table {width:100%;margin-top:12px;border-collapse:collapse;font-size:.97em;}
    .admin-table th, .admin-table td {border:1px solid #e1dbf5;padding:8px;text-align:left;}
    .admin-table th {background:#f7e8ff;color:#735aff;}
    .admin-table tr:nth-child(even){background:#faf7ff;}
    .admin-edit-btn, .admin-del-btn {
      background:none;border:none;cursor:pointer;margin-right:4px;
    }
    .admin-edit-btn img, .admin-del-btn img {height:22px;}
    .admin-section-title {color:#ed4a88;font-weight:700;margin-top:24px;margin-bottom:7px;}
  </style>
</head>
<body>
  <header>
    <div class="nav-flex">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link active">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <main>
    <h1 class="main-title"><span class="emoji">🛠️</span> Admin Paneli</h1>
    <div class="admin-flex">
      <!-- Test Ekleme Formu -->
      <div class="admin-card">
        <div class="admin-title">Yeni Test Ekle</div>
        <input class="admin-input" id="test-title" placeholder="Test Başlığı" />
        <input class="admin-input" id="test-desc" placeholder="Kısa Açıklama" />
        <select class="admin-select" id="test-category">
          <option value="Genel">Genel</option>
          <option value="Eğlence">Eğlence</option>
          <option value="Bilgi">Bilgi</option>
          <option value="Psikoloji">Psikoloji</option>
          <option value="Oyun">Oyun</option>
        </select>
        <input class="admin-input" id="test-image" placeholder="Görsel linki (isteğe bağlı)" />
        <textarea class="admin-textarea" id="test-questions" placeholder="Soruları JSON array olarak gir. (ör: [{question:'...',options:['a','b','c'],correct:0}, ...])"></textarea>
        <textarea class="admin-textarea" id="test-results" placeholder="Sonuçları JSON array olarak gir. (ör: [{min:0,max:3,text:'...',image:'result-fail.png'}, ...])"></textarea>
        <button class="admin-btn" onclick="addTest()">Testi Ekle</button>
        <div id="add-test-msg" style="min-height:22px;margin-top:7px;"></div>
      </div>
      <!-- Test Listesi -->
      <div class="admin-card" style="min-width:390px;">
        <div class="admin-title">Tüm Testler</div>
        <table class="admin-table" id="tests-table">
          <thead>
            <tr>
              <th>Başlık</th><th>Kategori</th><th>Durum</th><th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <div class="admin-section-title">Kullanıcı Önerileri</div>
        <table class="admin-table" id="sg-table">
          <thead>
            <tr>
              <th>Başlık</th><th>Açıklama</th><th>Tarih</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
    <!-- Test düzenleme popup'ı (isteğe bağlı genişletilebilir) -->
  </main>
  <footer>
    <div class="footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="wise.png" alt="Wise" />
        <img src="payoneer.png" alt="Payoneer" />
        <img src="iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script>
    // Navbar çıkış butonu
    firebase.auth().onAuthStateChanged(function(user) {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        if (user) logoutBtn.style.display = 'inline-block';
        else logoutBtn.style.display = 'none';
      }
    });
    document.addEventListener('DOMContentLoaded', function() {
      var logoutBtnElem = document.getElementById('logout-btn');
      if (logoutBtnElem) {
        logoutBtnElem.onclick = function(e) {
          e.preventDefault();
          firebase.auth().signOut().then(() => {
            window.location.href = "index.html";
          });
        }
      }
    });

    // Test ekle
    async function addTest() {
      const title = document.getElementById("test-title").value.trim();
      const desc = document.getElementById("test-desc").value.trim();
      const category = document.getElementById("test-category").value;
      const image = document.getElementById("test-image").value.trim();
      let questions, results;
      try { questions = JSON.parse(document.getElementById("test-questions").value); } catch { questions = null; }
      try { results = JSON.parse(document.getElementById("test-results").value); } catch { results = null; }
      const msg = document.getElementById("add-test-msg");
      if (!title || !desc || !questions || !Array.isArray(questions) || !results || !Array.isArray(results)) {
        msg.innerHTML = "<span style='color:#ed4a88;'>Lütfen tüm alanları doğru doldurun!</span>";
        return;
      }
      await db.collection("tests").add({
        title, description: desc, category, image, questions, results, createdAt: Date.now()
      });
      msg.innerHTML = "<span style='color:#13bd72;'>Test başarıyla eklendi!</span>";
      loadTests();
    }

    // Test listesini çek
    async function loadTests() {
      const table = document.querySelector("#tests-table tbody");
      const snap = await db.collection("tests").orderBy("createdAt", "desc").limit(50).get();
      let html = "";
      snap.forEach(doc => {
        const d = doc.data();
        html += `
          <tr>
            <td>${d.title || "-"}</td>
            <td>${d.category || "-"}</td>
            <td>${d.questions ? "Aktif" : "Eksik"}</td>
            <td>
              <button class="admin-edit-btn" onclick="editTest('${doc.id}')"><img src="edit.png" alt="Düzenle"/></button>
              <button class="admin-del-btn" onclick="deleteTest('${doc.id}')"><img src="delete.png" alt="Sil"/></button>
            </td>
          </tr>
        `;
      });
      table.innerHTML = html;
    }

    // Test sil
    async function deleteTest(id) {
      if (!confirm("Testi silmek istediğine emin misin?")) return;
      await db.collection("tests").doc(id).delete();
      loadTests();
    }

    // (Örnek) Test düzenle açılabilir
    function editTest(id) {
      alert("Düzenleme popup'ı eklenebilir (gelişmiş admin için)!");
    }

    // Kullanıcı önerilerini çek
    async function loadSuggestions() {
      const table = document.querySelector("#sg-table tbody");
      const snap = await db.collection("suggestions").orderBy("createdAt","desc").limit(20).get();
      let html = "";
      snap.forEach(doc => {
        const d = doc.data();
        html += `
          <tr>
            <td>${d.title || "-"}</td>
            <td>${d.desc || "-"}</td>
            <td>${d.createdAt ? new Date(d.createdAt.seconds*1000 || d.createdAt).toLocaleDateString("tr-TR") : "-"}</td>
          </tr>
        `;
      });
      table.innerHTML = html;
    }

    // İlk yükleme
    loadTests();
    loadSuggestions();
  </script>
</body>
</html>
