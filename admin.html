<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Paneli | Testlik.com</title>
  <meta name="description" content="Testlik.com - Admin için test, kategori ve sonuç ekleme paneli">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .admin-wrap { background: #fff; border-radius: 28px; box-shadow: 0 2px 22px #735aff13; margin: 38px auto 28px auto; padding: 37px 18px 31px 18px; max-width: 540px; }
    textarea { width:100%; border-radius:10px; border:1.5px solid #ccbaff; padding:8px 10px; font-family:inherit; font-size:1em; margin-bottom:13px; }
    .admin-btn { background:linear-gradient(90deg,#fd72ff 0%,#735aff 100%); color:#fff;font-weight:700;border-radius:13px;border:none;box-shadow:0 2px 11px #735aff14;padding:10px 24px;font-size:1.06em;cursor:pointer;transition:background .13s;margin-bottom:9px; }
    .admin-btn:active{background:#ed4a88;}
    .admin-label { color:#735aff;font-weight:700;margin:11px 0 5px 0;display:block;}
    @media (max-width:600px){ .admin-wrap{padding:13px 4px 7px 4px;} }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo"><img src="logo.png" alt="Testlik.com" style="height:32px;vertical-align:middle;"> Testlik.com</div>
    <nav class="nav-links">
      <a href="index.html">Anasayfa</a>
      <a href="kategoriler.html">Kategoriler</a>
      <a href="sizdengelenler.html">Sizden Gelenler</a>
      <a href="soru-uret.html">Soru Üret</a>
      <a href="cark.html">Çarkıfelek</a>
      <a href="video-izle.html">Video İzle Kazan</a>
      <a href="favoriler.html">Favoriler</a>
      <a href="profil.html">Profil</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="akademi.html">Akademi</a>
      <a href="istatistik.html">İstatistik</a>
      <a href="leaderboard.html">Liderlik</a>
      <a href="admin.html" class="active admin-link" id="admin-link">Admin</a>
      <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
    </nav>
  </header>
  <!-- Main -->
  <main>
    <div class="admin-wrap">
      <h2 style="color:#735aff;text-align:center;font-weight:900;margin-bottom:15px;">Admin Paneli</h2>
      <div style="color:#ed4a88;text-align:center;font-size:1.08em;margin-bottom:11px;">
        Test ve kategori ekleme/güncelleme, sonuçları JSON ile yükleme
      </div>
      <label class="admin-label">Kategori Ekle (JSON)</label>
      <textarea id="kategori-json" rows="2" placeholder='[{"slug":"genel","name":"Genel Kültür","description":"Genel bilgi testleri"}]'></textarea>
      <button class="admin-btn" onclick="kategorileriYukle()">Kategorileri Ekle/Güncelle</button>

      <label class="admin-label">Test Ekle (JSON)</label>
      <textarea id="test-json" rows="7" placeholder='{"title":"Deneme Testi","description":"Açıklama","category":"genel","questions":[{"text":"Soru?","options":["a","b"],"image":""}],"correctAnswers":[0],"results":[{"min":0,"max":1,"text":"Başarı","image":""}]}'></textarea>
      <input type="text" id="test-id" placeholder="Test ID (varsa güncelle)" style="width:100%;margin-bottom:10px;">
      <button class="admin-btn" onclick="testiYukle()">Test Ekle/Güncelle</button>

      <label class="admin-label">Sosyal Medyada Otomatik Paylaşım</label>
      <button class="admin-btn" onclick="paylasimYap()">Testleri Tüm Sosyal Medyada Paylaş</button>

      <div id="admin-sonuc" style="margin-top:13px;color:#7a53c4;font-weight:700;min-height:18px;"></div>
    </div>
  </main>
  <!-- Footer -->
  <footer>
    <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
    <div class="odeme-logo">
      <img src="wise.png" alt="Wise" />
      <img src="payoneer.png" alt="Payoneer" />
      <img src="iban.png" alt="IBAN" />
    </div>
  </footer>
  <!-- Firebase/JS -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script src="main.js"></script>
  <script>
    // Sadece admin yetkisi kontrolü
    firebase.auth().onAuthStateChanged(function(user) {
      if (!user || user.email !== "admin@testlik.com") {
        document.body.innerHTML = "<div style='color:#ed4a88;font-size:1.25em;text-align:center;margin-top:60px;'>Bu sayfaya sadece admin erişebilir.</div>";
      }
    });

    // Kategori ekle/güncelle
    async function kategorileriYukle() {
      const val = document.getElementById("kategori-json").value.trim();
      try {
        const arr = JSON.parse(val);
        for (const kat of arr) {
          await db.collection("kategoriler").doc(kat.slug).set(kat, {merge:true});
        }
        document.getElementById("admin-sonuc").innerText = "Kategoriler başarıyla yüklendi/güncellendi!";
      } catch(e) {
        document.getElementById("admin-sonuc").innerText = "Hatalı JSON veya veri!";
      }
    }

    // Test ekle/güncelle
    async function testiYukle() {
      const val = document.getElementById("test-json").value.trim();
      const id = document.getElementById("test-id").value.trim();
      try {
        const obj = JSON.parse(val);
        if(id){
          await db.collection("tests").doc(id).set({...obj, updatedAt:new Date()}, {merge:true});
          document.getElementById("admin-sonuc").innerText = "Test güncellendi!";
        }else{
          await db.collection("tests").add({...obj, createdAt:new Date()});
          document.getElementById("admin-sonuc").innerText = "Yeni test başarıyla eklendi!";
        }
      } catch(e) {
        document.getElementById("admin-sonuc").innerText = "Hatalı JSON veya veri!";
      }
    }

    // Sosyal medya otomatik paylaşım (demo)
    function paylasimYap() {
      document.getElementById("admin-sonuc").innerText = "Test(ler) otomatik olarak sosyal medyada paylaşıldı! (Demo fonksiyonu)";
      // Gerçek paylaşım için dış API entegrasyonu gerekir.
    }
  </script>
</body>
</html>
