<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel | Testlik.com</title>
  <meta name="description" content="Testlik.com yönetici paneli. Test, kullanıcı ve bildirim yönetimi.">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="img/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <style>
    .admin-panel {max-width:700px;margin:46px auto 18px auto;background:#fff;border-radius:20px;box-shadow:0 2px 18px #735aff13;padding:38px 34px;}
    .admin-hdr {color:#735aff;font-weight:700;font-size:1.33em;margin-bottom:18px;}
    .admin-form input, .admin-form select, .admin-form textarea {width:100%;margin-bottom:7px;}
    .info-mini {font-size:.92em;color:#5a6cff;}
    .social-btns {display: flex; gap: 16px; margin: 22px 0 12px 0;}
    .social-btn {background:#fff;border:1.5px solid #8f7fff;color:#8f7fff;padding:7px 16px;border-radius:16px;font-weight:700;cursor:pointer;transition:all .14s;}
    .social-btn:hover {background:#735aff;color:#fff;}
  </style>
</head>
<body>
  <header>
    <div class="container">
      <img src="img/logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="admin.html" class="active admin-link">Admin</a>
      </nav>
    </div>
  </header>
  <main>
    <section class="admin-panel">
      <h1 class="admin-hdr">Admin Panel <span class="emoji">🛠️</span></h1>
      <div class="info-mini">Sadece JSON'u yapıştırman yeterli. Kategori, açıklama, başlık alanı otomatik algılanır.</div>
      <form class="admin-form" id="adminTestForm">
        <textarea id="a_json" rows="9" placeholder="Sadece JSON verisini buraya yapıştır (ör: { 'title':'...', ... })" required></textarea>
        <button type="submit" class="cta-btn">Testi Ekle</button>
        <div id="adminFormMsg" style="min-height:18px;font-weight:600;margin-top:7px;"></div>
      </form>
      <div class="social-btns">
        <button class="social-btn" onclick="shareAll('facebook')">Facebook'ta Paylaş</button>
        <button class="social-btn" onclick="shareAll('twitter')">Twitter'da Paylaş</button>
        <button class="social-btn" onclick="shareAll('linkedin')">LinkedIn'de Paylaş</button>
      </div>
    </section>
  </main>
  <footer>
    <div class="container">
      <p>&copy; 2025 <b>Testlik.com</b></p>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script>
    // Çıkış kontrol
    firebase.auth().onAuthStateChanged(user => {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) logoutBtn.style.display = user ? 'inline-block' : 'none';
      if (!user || user.email !== "admin@testlik.com") {
        document.body.innerHTML = "<h2 style='text-align:center;margin-top:88px;color:#ed4a88;'>Bu panele erişim yetkiniz yok.</h2>";
      }
    });

    // Test ekleme (sadece JSON)
    document.getElementById("adminTestForm").onsubmit = async function(e) {
      e.preventDefault();
      const jsonRaw = document.getElementById("a_json").value.trim();
      let testData;
      try { testData = JSON.parse(jsonRaw); } 
      catch { document.getElementById("adminFormMsg").innerText = "Geçersiz JSON!"; return;}
      testData.createdBy = "admin";
      if (!testData.likes) testData.likes = 0;
      if (!testData.likedBy) testData.likedBy = [];
      if (!testData.image) testData.image = "img/soru-isareti.png";
      try {
        await db.collection("tests").add(testData);
        document.getElementById("adminFormMsg").style.color = "#13bd72";
        document.getElementById("adminFormMsg").innerText = "Test başarıyla eklendi!";
        document.getElementById("adminTestForm").reset();
      } catch (err) {
        document.getElementById("adminFormMsg").style.color = "#ed4a88";
        document.getElementById("adminFormMsg").innerText = "Hata!";
      }
    };

    // Basit sosyal medya paylaşımı (testlik.com ana sayfa)
    function shareAll(platform) {
      const url = "https://testlik.com";
      const title = "Testlik.com'da yeni testler yayında! 🎉";
      let shareUrl = "";
      if (platform === "facebook") shareUrl = `https://facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`;
      if (platform === "twitter") shareUrl = `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=${encodeURIComponent(title)}`;
      if (platform === "linkedin") shareUrl = `https://www.linkedin.com/shareArticle?mini=true&url=${encodeURIComponent(url)}&title=${encodeURIComponent(title)}`;
      window.open(shareUrl, "_blank");
    }
  </script>
</body>
</html>
