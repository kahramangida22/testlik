<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel | Testlik.com</title>
  <meta name="description" content="Testlik.com - Admin panel: test, kategori, sonuç yönetimi.">
  <link rel="stylesheet" href="styles.css" />
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
</head>
<body>
  <header>
    <div class="container nav-flex">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="active admin-link">Admin</a>
      </nav>
    </div>
  </header>
  <main>
    <section>
      <h1>Admin Panel</h1>
      <div class="test-card" id="admin-area">
        <p>Yönetici girişinizi doğrulayın...</p>
      </div>
    </section>
  </main>
  <footer>
    <div class="container footer-flex">
      <p>&copy; 2025 Testlik.com</p>
      <div class="odeme-logo">
        <img src="wise.png" alt="Wise" style="height:28px; margin-right:10px;"/>
        <img src="payoneer.png" alt="Payoneer" style="height:28px; margin-right:10px;"/>
        <img src="iban.png" alt="IBAN" style="height:28px;"/>
      </div>
    </div>
  </footer>
  <script>
    firebase.auth().onAuthStateChanged(async function(user) {
      const area = document.getElementById("admin-area");
      if (!user) {
        area.innerHTML = "<p>Bu alanı görmek için giriş yapın.</p>";
        return;
      }
      // Admin kontrolü: Firestore'da isAdmin alanı olmalı
      const doc = await db.collection("users").doc(user.uid).get();
      if (!doc.exists || !doc.data().isAdmin) {
        area.innerHTML = "<p>Yetkiniz yok!</p>";
        return;
      }
      // Form
      area.innerHTML = `
        <h3>Test Ekle</h3>
        <form id="testForm">
          <input type="text" id="title" placeholder="Test Başlığı" required><br>
          <input type="text" id="image" placeholder="Görsel (URL)"><br>
          <select id="category">
            <option value="Genel">Genel</option>
            <option value="Kişilik">Kişilik</option>
            <option value="Bilgi">Bilgi</option>
          </select><br>
          <textarea id="description" placeholder="Kısa Açıklama"></textarea><br>
          <textarea id="questions" placeholder='Sorular (JSON format)' required rows="7"></textarea><br>
          <textarea id="results" placeholder='Sonuçlar (JSON format)' rows="5"></textarea><br>
          <button type="submit" class="cta-btn">Testi Kaydet</button>
        </form>
        <div id="admin-status"></div>
        <div style="font-size:13px;margin-top:16px">
          <b>Örnek Sorular JSON:</b>
          <pre>[
  {
    "question": "Seni en iyi anlatan kelime?",
    "options": ["Enerjik", "Duygusal", "Mantıklı", "Yaratıcı"]
  },
  {
    "question": "En rahat hissettiğin ortam?",
    "options": ["Kalabalık", "Doğa", "Ev", "Sahne"]
  }
]</pre>
          <b>Örnek Sonuçlar JSON:</b>
          <pre>[
  {
    "min": 0,
    "max": 10,
    "text": "Sen oldukça duygusal birisin!",
    "image": "https://link.com/duygusal.jpg"
  },
  {
    "min": 11,
    "max": 20,
    "text": "Sen çok mantıklı bir insansın!",
    "image": "https://link.com/mantikli.jpg"
  }
]</pre>
        </div>
      `;
      // Form submit
      document.getElementById("testForm").onsubmit = async function(e) {
        e.preventDefault();
        try {
          const test = {
            title: document.getElementById("title").value,
            image: document.getElementById("image").value,
            category: document.getElementById("category").value,
            description: document.getElementById("description").value,
            questions: JSON.parse(document.getElementById("questions").value),
            results: document.getElementById("results").value ? JSON.parse(document.getElementById("results").value) : [],
            createdAt: new Date()
          };
          await db.collection("tests").add(test);
          document.getElementById("admin-status").innerHTML = "<b style='color:green'>Test kaydedildi!</b>";
        } catch (err) {
          document.getElementById("admin-status").innerHTML = "<b style='color:red'>Hata oluştu:</b> " + err.message;
        }
      };
    });
  </script>
</body>
</html>
