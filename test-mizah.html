<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>😂 Mizah Testi</title>
  <link rel="stylesheet" href="test-style.css" />
</head>
<body>

  <header>
    <div class="ust-kisim">
      <h1 class="logo">✨ Testlik.com</h1>
      <div class="menu">
        <a href="index.html">🏠 Ana Sayfa</a>
        <a href="kategoriler.html">📂 Kategoriler</a>
      </div>
      <div class="kullanici-paneli" id="kullanici-paneli">
        <button id="girisBtn">Giriş Yap</button>
        <div id="giris-yapan-panel" style="display: none;">

          <span id="kullanici-puani">0</span> puan
          <button onclick="cikisYap()">Çıkış Yap</button>
        </div>
      </div>
    </div>

  <main>
    <div id="soru-alani">
      <div class="soru-kutusu">
        <p id="soru"></p>
      </div>
      <div id="secenekler"></div>

      <div style="text-align:center;">
        <div id="dogru-cevap" style="margin-top: 15px;"></div>
        <button id="sonrakiBtn" style="display:none;">Sonraki Soru</button>
      </div>
    </div>

    <div id="reklam-alani">
      <p>🎬 Bu alanda reklam olabilir!</p>
    </div>

    <div id="test-bitti" style="display:none;">
      <h2>Test tamamlandı! 🎉</h2>
      <a href="index.html" class="btn">🏠 Ana Sayfa</a>
      <a href="test-mizah.html" class="btn">🔁 Aynı kategoride başka test çöz</a>
    </div>
  </main>

  <script type="module" src="test-mizah.js"></script>

</html>
