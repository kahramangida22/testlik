  <script>
    // Admin linki kontrolü
    firebase.auth().onAuthStateChanged(function(user) {
      var adminLink = document.getElementById('admin-link');
      if (adminLink) {
        if (user && user.email === "admin@testlik.com") adminLink.style.display = "inline-block";
        else adminLink.style.display = "none";
      }
    });

    // Liderlik tablosu: En çok puana sahip ilk 10 kullanıcıyı göster
    async function yukleLiderlik() {
      const snap = await db.collection("users")
        .orderBy("point", "desc").limit(10).get();
      let html = "<ol style='padding-left:18px;'>";
      let idx = 1;
      snap.forEach(doc => {
        const data = doc.data();
        let ad = data.displayName || data.email.split("@")[0];
        let puan = data.point || 0;
        html += `<li style="margin-bottom:10px;">
          <span style="font-weight:700;color:${idx===1 ? '#ed4a88' : '#735aff'};">${ad}</span>
          <span style="color:#7a53c4;margin-left:10px;">${puan} puan</span>
          ${idx===1 ? " 🥇" : idx===2 ? " 🥈" : idx===3 ? " 🥉" : ""}
        </li>`;
        idx++;
      });
      html += "</ol>";
      document.getElementById("liderlik-listesi").innerHTML = html;
    }

    document.addEventListener("DOMContentLoaded", yukleLiderlik);
  </script>
</body>
