<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Favori Testlerim | Testlik.com</title>
  <meta name="description" content="Testlik.com - Favori testlerini burada görebilirsin.">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="img/favicon.png" />
</head>
<body>
  <header>
    <div class="container">
      <img src="img/logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="favoriler.html" class="active">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link">Admin</a>
      </nav>
    </div>
  </header>
  <main>
    <section>
      <h1>Favori Testlerim</h1>
      <div id="favorites-list" class="test-list">
        <p>Favoriler yükleniyor...</p>
      </div>
    </section>
  </main>
  <footer>
    <div class="container">
      <p>&copy; 2025 Testlik.com</p>
      <div class="odeme-logo">
        <img src="img/wise.png" alt="Wise" />
        <img src="img/payoneer.png" alt="Payoneer" />
        <img src="img/iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <script src="firebase.js"></script>
  <script>
    auth.onAuthStateChanged(async user => {
      const favList = document.getElementById("favorites-list");
      if (!user) {
        favList.innerHTML = "<p>Favori testlerini görmek için giriş yapmalısın.</p><a href='giris.html' class='cta-btn'>Giriş Yap</a>";
        return;
      }
      favList.innerHTML = "<p>Favoriler yükleniyor...</p>";
      try {
        const userDoc = await db.collection("users").doc(user.uid).get();
        const favorites = userDoc.data()?.favorites || [];
        if (favorites.length === 0) {
          favList.innerHTML = "<p>Hiç favori testin yok!</p>";
          return;
        }
        favList.innerHTML = "";
        for (let testId of favorites) {
          const testDoc = await db.collection("tests").doc(testId).get();
          if (testDoc.exists) {
            const t = testDoc.data();
            favList.innerHTML += `
              <div class="test-card">
                <img src="${t.image || 'img/test-category-default.png'}" alt="Test Görseli" loading="lazy" />
                <div class="category">${t.category || 'Genel'}</div>
                <h3>${t.title}</h3>
                <p>${t.description || ''}</p>
                <a href="test-render.html?id=${testDoc.id}" class="cta-btn">Testi Çöz</a>
                <button onclick="removeFavorite('${testDoc.id}')" style="margin-top:10px;background:#ed143d;color:#fff;border:none;border-radius:18px;padding:7px 18px;cursor:pointer;">Favorilerden Kaldır</button>
              </div>
            `;
          }
        }
      } catch (err) {
        favList.innerHTML = "<p>Favoriler yüklenemedi!</p>";
        console.error(err);
      }
    });

    async function removeFavorite(testId) {
      const user = auth.currentUser;
      if (!user) return;
      const userRef = db.collection("users").doc(user.uid);
      const userDoc = await userRef.get();
      let favorites = userDoc.data().favorites || [];
      favorites = favorites.filter(fav => fav !== testId);
      await userRef.update({ favorites });
      location.reload();
    }
  </script>
</body>
</html>
