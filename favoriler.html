<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Favori Testlerim | Testlik.com</title>
  <meta name="description" content="Testlik.com - Favorilere eklediğin testler burada!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="img/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <style>
    .remove-fav-btn {
      background:#ffd7ee;
      color:#ed4a88;
      border:none;
      border-radius:18px;
      padding:7px 18px;
      font-weight:700;
      font-size:1em;
      cursor:pointer;
      margin-top:10px;
      transition:background .13s;
    }
    .remove-fav-btn:hover {background:#ed4a88;color:#fff;}
  </style>
</head>
<body>
  <header>
    <div class="container">
      <img src="img/logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html" class="active">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <main>
    <section>
      <h1 style="text-align:center;color:#735aff;font-weight:700;margin-top:34px;">Favori Testlerim <span class="emoji">💖</span></h1>
      <div id="favorites-list" class="test-list">
        <div class="loader">Favoriler yükleniyor...</div>
      </div>
    </section>
  </main>
  <footer>
    <div class="container">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="img/wise.png" alt="Wise" />
        <img src="img/payoneer.png" alt="Payoneer" />
        <img src="img/iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script>
    firebase.auth().onAuthStateChanged(function(user) {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        if (user) logoutBtn.style.display = 'inline-block';
        else logoutBtn.style.display = 'none';
      }
    });
    document.addEventListener('DOMContentLoaded', function() {
      var logoutBtnElem = document.getElementById('logout-btn');
      if (logoutBtnElem) {
        logoutBtnElem.onclick = function(e) {
          e.preventDefault();
          firebase.auth().signOut().then(() => {
            window.location.href = "index.html";
          });
        }
      }
    });

    auth.onAuthStateChanged(async user => {
      const favList = document.getElementById("favorites-list");
      if (!user) {
        favList.innerHTML = "<div class='test-card'><p>Favori testlerini görmek için giriş yapmalısın.</p><a href='giris.html' class='cta-btn'>Giriş Yap</a></div>";
        return;
      }
      favList.innerHTML = "<div class='loader'>Favoriler yükleniyor...</div>";
      try {
        const userDoc = await db.collection("users").doc(user.uid).get();
        const favorites = userDoc.data()?.favorites || [];
        if (favorites.length === 0) {
          favList.innerHTML = "<div class='test-card'><p>Hiç favori testin yok!</p></div>";
          return;
        }
        favList.innerHTML = "";
        for (let testId of favorites) {
          const testDoc = await db.collection("tests").doc(testId).get();
          if (testDoc.exists) {
            const t = testDoc.data();
            favList.innerHTML += `
              <div class="test-card" style="max-width:340px;">
                <img src="${t.image || 'img/soru-isareti.png'}" alt="Test Görseli" loading="lazy" />
                <div class="category">${t.category || 'Genel'}</div>
                <h3 style="color:#735aff;">${t.title}</h3>
                <p>${t.description || ''}</p>
                <a href="test-render.html?id=${testDoc.id}" class="cta-btn animated-btn" style="margin-top:8px;">Testi Çöz</a>
                <button onclick="removeFavorite('${testDoc.id}')" class="remove-fav-btn">Favorilerden Kaldır</button>
              </div>
            `;
          }
        }
      } catch (err) {
        favList.innerHTML = "<div class='test-card'><p>Favoriler yüklenemedi!</p></div>";
        console.error(err);
      }
    });

    async function removeFavorite(testId) {
      const user = auth.currentUser;
      if (!user) return;
      const userRef = db.collection("users").doc(user.uid);
      const userDoc = await userRef.get();
      let favorites = userDoc.data().favorites || [];
      favorites = favorites.filter(fav => fav !== testId);
      await userRef.update({ favorites });
      location.reload();
    }
  </script>
</body>
</html>
