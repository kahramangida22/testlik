<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Favorilerim | Testlik.com</title>
  <meta name="description" content="Testlik.com - Favorilere eklediğin testleri kolayca tekrar çöz!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo"><img src="logo.png" alt="Testlik.com" style="height:32px;vertical-align:middle;"> Testlik.com</div>
    <nav class="nav-links">
      <a href="index.html">Anasayfa</a>
      <a href="kategoriler.html">Kategoriler</a>
      <a href="sizdengelenler.html">Sizden Gelenler</a>
      <a href="soru-uret.html">Soru Üret</a>
      <a href="cark.html">Çarkıfelek</a>
      <a href="video-izle.html">Video İzle Kazan</a>
      <a href="favoriler.html" class="active">Favoriler</a>
      <a href="profil.html">Profil</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="akademi.html">Akademi</a>
      <a href="istatistik.html">İstatistik</a>
      <a href="leaderboard.html">Liderlik</a>
      <a href="admin.html" class="admin-link" id="admin-link" style="display:none;">Admin</a>
      <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
    </nav>
  </header>
  <!-- Main -->
  <main>
    <section style="max-width:1100px;margin:38px auto 30px auto;">
      <h1 style="color:#735aff;text-align:center;margin:34px 0 24px 0;font-weight:800;">Favori Testlerim</h1>
      <div id="favori-list" class="kategori-grid"></div>
    </section>
  </main>
  <!-- Footer -->
  <footer>
    <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
    <div class="odeme-logo">
      <img src="wise.png" alt="Wise" />
      <img src="payoneer.png" alt="Payoneer" />
      <img src="iban.png" alt="IBAN" />
    </div>
  </footer>
  <!-- Firebase/JS -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script src="main.js"></script>
  <script>
    // Giriş ve admin linki kontrolü
    firebase.auth().onAuthStateChanged(function(user) {
      var adminLink = document.getElementById('admin-link');
      if (adminLink) {
        if (user && user.email === "admin@testlik.com") adminLink.style.display = "inline-block";
        else adminLink.style.display = "none";
      }
      if (user) {
        favorileriYukle(user.uid);
      } else {
        document.getElementById("favori-list").innerHTML = "<div style='color:#bbb;text-align:center;width:100%;'>Favori testleri görebilmek için giriş yapmalısın.</div>";
      }
    });

    // Favori testleri getir
    async function favorileriYukle(uid) {
      const userDoc = await db.collection("users").doc(uid).get();
      const favs = userDoc.data()?.favorites || [];
      if (!favs.length) {
        document.getElementById("favori-list").innerHTML = "<div style='color:#bbb;text-align:center;width:100%;'>Hiç favori testin yok.</div>";
        return;
      }
      // Favori testlerin detaylarını çek
      let html = "";
      const snap = await db.collection("tests").where(firebase.firestore.FieldPath.documentId(), "in", favs.slice(0, 10)).get();
      snap.forEach(doc => {
        const t = doc.data();
        html += `
          <div class="kategori-card">
            <img src="${t.image || 'img/soru-isareti.png'}" alt="Test Görseli">
            <h3>${t.title || "Test"}</h3>
            <p>${t.description || ""}</p>
            <button class="btn" style="margin-top:9px;" onclick="window.location.href='test-render.html?id=${doc.id}'">Çöz</button>
            <button class="btn" style="background:#f8f0fd;color:#ed4a88;border:1px solid #ed4a88;margin-top:7px;" onclick="favoridenKaldir('${doc.id}')">Favoriden Kaldır</button>
          </div>
        `;
      });
      document.getElementById("favori-list").innerHTML = html || "<div style='color:#bbb;text-align:center;width:100%;'>Hiç favori testin yok.</div>";
    }

    // Favoriden kaldır fonksiyonu
    async function favoridenKaldir(testId) {
      const user = firebase.auth().currentUser;
      if (!user) return;
      const userRef = db.collection("users").doc(user.uid);
      const doc = await userRef.get();
      let favs = doc.data()?.favorites || [];
      favs = favs.filter(id => id !== testId);
      await userRef.update({ favorites: favs });
      favorileriYukle(user.uid);
    }
  </script>
</body>
</html>
