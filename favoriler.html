
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Favori Testlerim - Testlik</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; }
    h2 { text-align: center; color: #333; }
    .test-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
    .test-card { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s; }
    .test-card:hover { transform: scale(1.02); }
    .test-title { font-size: 18px; font-weight: bold; color: #222; }
    .test-category { font-size: 14px; color: #777; }
  </style>
</head>
<body>
  <h2>Favori Testlerim</h2>
  <div class="test-list" id="favoritesList">Yükleniyor...</div>

  <script>
    const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
    const container = document.getElementById("favoritesList");

    if (favorites.length === 0) {
      container.innerHTML = "<p style='text-align:center;'>Henüz favori testin yok.</p>";
    } else {
      favorites.forEach(test => {
        const card = document.createElement("div");
        card.className = "test-card";
        card.innerHTML = \`
          <div class="test-title">\${test.title}</div>
          <div class="test-category">\${test.category}</div>
        \`;
        card.onclick = () => {
          localStorage.setItem("currentTest", JSON.stringify(test));
          window.location.href = "test-render.html";
        };
        container.appendChild(card);
      });
    }
  </script>
</body>
</html>
