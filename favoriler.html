<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Favorilerim | Testlik.com</title>
  <meta name="description" content="Testlik.com - Favori testlerini görüntüle, tek tıkla teste ulaş!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Giriş Modalı (Her sayfa için ortak) -->
  <div class="modal-bg" id="login-modal" style="display:none;">
    <div class="modal-card">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <h2>Testlik.com'a Giriş</h2>
      <button class="modal-google" onclick="loginGoogle()">
        <img src="google-icon.png" style="height:22px;vertical-align:middle;margin-right:9px;"> Google ile Giriş Yap
      </button>
      <hr style="margin:23px 0 15px 0;opacity:.19;">
      <input type="email" id="login-email" class="modal-inp" placeholder="E-posta" style="width:95%;padding:11px;border-radius:9px;border:1px solid #ccbaff;">
      <input type="password" id="login-pass" class="modal-inp" placeholder="Şifre" style="width:95%;padding:11px;border-radius:9px;border:1px solid #ccbaff;margin-top:8px;">
      <button class="modal-btn" onclick="loginEmail()">Giriş Yap</button>
      <div id="login-error" style="color:#ed4a88;font-size:.98em;min-height:22px;margin-top:7px;"></div>
      <button class="modal-btn" style="margin-top:18px;background:#7a53c4;" onclick="registerEmail()">Kayıt Ol</button>
      <button class="modal-guest" onclick="guestLogin()">Üyeliksiz Devam Et</button>
    </div>
  </div>
  <!-- Header -->
  <header>
    <div class="nav-flex">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html" class="active">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link" id="admin-link" style="display:none;">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <!-- Main -->
  <main style="max-width:1100px;margin:0 auto;">
    <h1 style="color:#735aff;font-size:1.35em;font-weight:800;margin:30px 0 15px 0;">Favori Testlerim</h1>
    <div class="card-grid" id="favori-list">
      <!-- Favori testler JS ile gelecek -->
    </div>
  </main>
  <!-- Footer -->
  <footer>
    <div class="footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="wise.png" alt="Wise" />
        <img src="payoneer.png" alt="Payoneer" />
        <img src="iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <!-- Firebase/JS -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script src="main.js"></script>
  <script>
    // Modal ve admin
    firebase.auth().onAuthStateChanged(function(user) {
      var adminLink = document.getElementById('admin-link');
      if (adminLink) {
        if (user && (user.email === "admin@testlik.com" || user.email === "seninadminmailin@...")) adminLink.style.display = "inline-block";
        else adminLink.style.display = "none";
      }
      if (!user) openModal();
      else closeModal();
    });

    // Favoriler listesi
    firebase.auth().onAuthStateChanged(async function(user) {
      if (!user) return;
      const favDiv = document.getElementById("favori-list");
      favDiv.innerHTML = `<div style="color:#bba5fa;width:100%;">Yükleniyor...</div>`;
      let doc = await db.collection("users").doc(user.uid).get();
      let favs = (doc.data() && doc.data().favorites) || [];
      if (!favs.length) {
        favDiv.innerHTML = `<div style="color:#ed4a88;width:100%;">Hiç favori testin yok!</div>`;
        return;
      }
      // Testlerin tamamını çekip göster
      let promises = favs.map(id => db.collection("tests").doc(id).get());
      let testler = await Promise.all(promises);
      let html = "";
      testler.forEach(tdoc => {
        if (!tdoc.exists) return;
        let t = tdoc.data();
        html += `
          <div class="card" style="position:relative;">
            <img src="${t.image || 'test-category-default.png'}" class="card-img" alt="Test" onclick="window.location.href='test-render.html?id=${tdoc.id}'" style="cursor:pointer;" />
            <div class="card-title">${t.title || "Test Başlığı"}</div>
            <div class="card-desc">${t.description || ""}</div>
            <div class="card-desc" style="font-size:.94em;color:#ed4a88;margin-top:7px;">${t.category || ""}</div>
            <button class="card-fav" onclick="removeFav('${tdoc.id}', event)">
              <img src="favorite-active.png" alt="Favorilerden çıkar" style="width:32px;height:32px;">
            </button>
          </div>
        `;
      });
      favDiv.innerHTML = html;
    });

    // Favori kaldırma
    function removeFav(id, e) {
      e.stopPropagation();
      firebase.auth().onAuthStateChanged(function(user) {
        if (!user) return;
        let userRef = db.collection("users").doc(user.uid);
        userRef.get().then(doc => {
          let favs = (doc.data() && doc.data().favorites) || [];
          favs = favs.filter(f => f !== id);
          userRef.update({favorites: favs}).then(() => location.reload());
        });
      });
    }
  </script>
</body>
</html>
