<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dil Desteği - Testlik</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="logo">Testlik Dil Desteği</div>
  </header>

  <main>
    <h2 id="title">🌍 Hoş geldiniz!</h2>
    <p id="desc">Test çözerek eğlenmeye ve kazanmaya başlayın.</p>
  </main>

  <footer>
    <p>© 2025 Testlik</p>
  </footer>

  <script>
    const userLang = navigator.language || navigator.userLanguage;
    if (userLang.startsWith("en")) {
      document.getElementById("title").innerText = "🌍 Welcome!";
      document.getElementById("desc").innerText = "Start having fun and earning by solving quizzes.";
    } else if (userLang.startsWith("es")) {
      document.getElementById("title").innerText = "🌍 ¡Bienvenido!";
      document.getElementById("desc").innerText = "Comienza a divertirte y ganar resolviendo pruebas.";
    } else if (userLang.startsWith("fr")) {
      document.getElementById("title").innerText = "🌍 Bienvenue!";
      document.getElementById("desc").innerText = "Commencez à vous amuser et à gagner en résolvant des quiz.";
    } else if (userLang.startsWith("de")) {
      document.getElementById("title").innerText = "🌍 Willkommen!";
      document.getElementById("desc").innerText = "Beginnen Sie mit dem Lösen von Quizfragen zu verdienen und Spaß zu haben.";
    }
    // Default is Turkish (already set)
  </script>
</body>
</html>
