
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Testlik - Anasayfa</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f9f9f9; padding: 20px; }
    h2 { text-align: center; color: #333; }
    .filter-buttons { text-align: center; margin-bottom: 20px; }
    .filter-buttons button {
      margin: 5px;
      padding: 8px 16px;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: white;
      cursor: pointer;
    }
    .filter-buttons button:hover { background-color: #0056b3; }
    .test-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
    .test-card { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; cursor: pointer; transition: transform 0.2s; }
    .test-card:hover { transform: scale(1.02); }
    .test-title { font-size: 18px; font-weight: bold; color: #222; }
    .test-category { font-size: 14px; color: #777; }
    .favorite { position: absolute; top: 10px; right: 10px; font-size: 20px; color: #ccc; cursor: pointer; }
    .favorite.active { color: gold; }
  </style>
</head>
<body>
  <h2>Bugünün Testleri</h2>
  <div class="filter-buttons" id="filterButtons"></div>
  <div class="test-list" id="testList">Yükleniyor...</div>

  <script>
    let allTests = [];

    function getFavorites() {
      return JSON.parse(localStorage.getItem("favorites")) || [];
    }

    function saveFavorites(favs) {
      localStorage.setItem("favorites", JSON.stringify(favs));
    }

    function toggleFavorite(test) {
      let favs = getFavorites();
      const index = favs.findIndex(t => t.id === test.id);
      if (index > -1) {
        favs.splice(index, 1);
      } else {
        favs.push(test);
      }
      saveFavorites(favs);
      renderTests(allTests); // yeniden çiz
    }

    function isFavorite(test) {
      return getFavorites().some(t => t.id === test.id);
    }

    function renderButtons(categories) {
      const container = document.getElementById("filterButtons");
      container.innerHTML = '<button onclick="renderTests(allTests)">Tümü</button>';
      categories.forEach(cat => {
        const btn = document.createElement("button");
        btn.textContent = cat;
        btn.onclick = () => {
          const filtered = allTests.filter(t => t.category === cat);
          renderTests(filtered);
        };
        container.appendChild(btn);
      });
    }

    function renderTests(tests) {
      const testList = document.getElementById("testList");
      testList.innerHTML = "";
      tests.forEach(test => {
        const card = document.createElement("div");
        card.className = "test-card";
        card.innerHTML = `
          <div class="test-title">${test.title}</div>
          <div class="test-category">${test.category}</div>
          <div class="favorite ${isFavorite(test) ? 'active' : ''}" title="Favorilere ekle/kaldır">★</div>
        `;
        card.onclick = (e) => {
          if (e.target.classList.contains("favorite")) {
            toggleFavorite(test);
            e.stopPropagation();
            return;
          }
          localStorage.setItem("currentTest", JSON.stringify(test));
          window.location.href = "test-render.html";
        };
        testList.appendChild(card);
      });
    }

    fetch('sample_tests.json')
      .then(response => response.json())
      .then(data => {
        allTests = data;
        const categories = [...new Set(data.map(t => t.category))];
        renderButtons(categories);
        renderTests(allTests);
      })
      .catch(err => {
        document.getElementById("testList").textContent = "Testler yüklenemedi.";
        console.error(err);
      });
  </script>
</body>
</html>
