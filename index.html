<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Testlik.com | Eğlenceli Testler Çöz</title>
  <meta name="description" content="Testlik.com - Online test çöz, puan topla, ödül kazan. Eğlenceli ve bilgi dolu testler!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="img/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="container">
      <img src="img/logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html" class="active">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <main>
    <section style="text-align:center;margin:46px 0 28px 0;">
      <h1 style="color:#735aff;font-weight:700;">Testlik.com'a Hoş Geldin!</h1>
      <p style="color:#5a6cff;">En eğlenceli testleri keşfet, puan topla, ödül kazan!</p>
      <!-- Kullanıcı adıyla arama kutusu -->
      <div style="margin:22px auto 10px auto;max-width:360px;">
        <input type="text" id="kullaniciAraInput" placeholder="Kullanıcı adı ara..." style="width:80%;padding:9px 13px;border-radius:12px;border:1px solid #ddd;">
        <button class="cta-btn" id="kullaniciAraBtn">Ara</button>
      </div>
      <div id="kullaniciAraSonuc" style="margin:10px auto;color:#735aff;font-weight:600;"></div>
    </section>
    <section id="testListesi" style="display:flex;flex-wrap:wrap;gap:24px;justify-content:center;"></section>
  </main>
  <footer>
    <div class="container">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="img/wise.png" alt="Wise" />
        <img src="img/payoneer.png" alt="Payoneer" />
        <img src="img/iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="main.js"></script>
  <script src="firebase.js"></script>
  <script>
    // Otomatik dil algılama (main.js ile de çağrılıyor, burada yedeği var)
    function detectLanguage() {
      const userLang = navigator.language || navigator.userLanguage;
      if (userLang.startsWith('tr')) document.documentElement.lang = 'tr';
      else document.documentElement.lang = 'en';
    }
    detectLanguage();

    // Çıkış butonu
    firebase.auth().onAuthStateChanged(function(user) {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) logoutBtn.style.display = user ? 'inline-block' : 'none';
    });

    // Kullanıcı adı ile arama
    document.getElementById("kullaniciAraBtn").onclick = async function() {
      const val = document.getElementById("kullaniciAraInput").value.trim();
      if (!val) return;
      const q = await db.collection("users").where("username", "==", val).get();
      let html = "";
      if (q.empty) html = "Kullanıcı bulunamadı.";
      else q.forEach(doc=>{
        const u = doc.data();
        html += `<div>
          <img src="${u.profilePic || 'img/default-profile.png'}" alt="Profil" style="width:44px;height:44px;border-radius:50%;vertical-align:middle;">
          <span style="margin-left:10px;">${u.username}</span>
          <button class="cta-btn" style="margin-left:18px;" onclick="window.location.href='profil.html?uid=${doc.id}'">Profili Gör</button>
        </div>`;
      });
      document.getElementById("kullaniciAraSonuc").innerHTML = html;
    };

    // Anasayfada son testleri göster (örnek)
    db.collection("tests").orderBy("createdAt","desc").limit(10).get().then(snapshot => {
      let html = "";
      snapshot.forEach(doc=>{
        const t = doc.data();
        html += `
          <div class="test-card">
            <img src="${t.image || 'img/soru-isareti.png'}" class="test-img" alt="Test Görseli"/>
            <div class="test-title">${t.title}</div>
            <div class="test-category">${t.category}</div>
            <div class="test-desc">${t.description}</div>
            <a href="test-render.html?id=${doc.id}" class="cta-btn">Testi Çöz</a>
          </div>
        `;
      });
      document.getElementById("testListesi").innerHTML = html || "<p>Test bulunamadı.</p>";
    });
  </script>
</body>
</html>
