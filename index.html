<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Testlik.com | Eğlenceli Testler</title>
  <meta name="description" content="Testlik.com – En eğlenceli ve kazandıran testler burada. Hemen çöz, puan topla, ödül kazan!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="img/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { background: #ece4ff;}
    .main-row { max-width: 1050px; margin: 0 auto; }
    .kategori-row { display: flex; gap: 18px; justify-content:center; flex-wrap:wrap; margin: 30px 0 18px 0;}
    .section-title { color:#735aff;font-size:1.29em;font-weight:700;margin:28px 0 14px 0;}
    .testler-grid { display: flex; gap: 14px; flex-wrap:wrap; justify-content: flex-start;}
    .test-card { background:#fff; border-radius:18px; box-shadow:0 2px 14px #735aff18; padding:14px 10px; width:170px; min-height:200px; text-align:center; margin-bottom:13px; transition:transform .13s;}
    .test-card:hover { transform:scale(1.04);}
    .test-img { width:68px;height:68px;object-fit:cover;border-radius:13px;margin-bottom:7px;}
    .test-title {font-weight:700;font-size:1.06em;margin-bottom:4px;}
    .test-desc {font-size:.95em;color:#8a79bf;margin-bottom:7px;}
    .test-btn {background:linear-gradient(90deg,#fd72ff 0%,#735aff 100%);color:#fff;font-weight:700;border-radius:9px;border:none;padding:7px 18px;font-size:.99em;cursor:pointer;margin-bottom:4px;}
    @media (max-width:1050px) {.main-row{max-width:98%;}}
    @media (max-width:700px) {.kategori-row, .testler-grid{justify-content:center;}.test-card{width:98%;min-width:140px;}}
  </style>
</head>
<body>
  <header>
    <div class="container nav-flex">
      <img src="img/logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html" class="active">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link" style="display:none;" id="admin-nav-link">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <main>
    <section class="main-row">
      <h1 style="color:#735aff;text-align:center;margin:37px 0 12px 0;font-weight:700;">
        <span class="emoji">🎉</span> Testlik.com’a Hoş Geldin!
      </h1>
      <div class="kategori-row">
        <div class="kategori-card" onclick="window.location.href='kategori-testleri.html?cat=Genel'" style="background:#fff;">
          <img src="img/category-genel.png" class="kategori-img" style="width:54px;height:54px;" alt="Genel">
          <div style="color:#735aff;font-weight:700;">Genel</div>
        </div>
        <div class="kategori-card" onclick="window.location.href='kategori-testleri.html?cat=Eğlence'" style="background:#fff;">
          <img src="img/category-eglence.png" class="kategori-img" style="width:54px;height:54px;" alt="Eğlence">
          <div style="color:#735aff;font-weight:700;">Eğlence</div>
        </div>
        <div class="kategori-card" onclick="window.location.href='kategori-testleri.html?cat=Bilgi'" style="background:#fff;">
          <img src="img/category-bilgi.png" class="kategori-img" style="width:54px;height:54px;" alt="Bilgi">
          <div style="color:#735aff;font-weight:700;">Bilgi</div>
        </div>
        <div class="kategori-card" onclick="window.location.href='kategori-testleri.html?cat=Psikoloji'" style="background:#fff;">
          <img src="img/category-psikoloji.png" class="kategori-img" style="width:54px;height:54px;" alt="Psikoloji">
          <div style="color:#735aff;font-weight:700;">Psikoloji</div>
        </div>
      </div>

      <div class="section-title">🆕 Yeni Testler</div>
      <div class="testler-grid" id="yeni-testler"></div>
      <div class="section-title">🔥 Popüler Testler</div>
      <div class="testler-grid" id="populer-testler"></div>
    </section>
  </main>
  <footer>
    <div class="container footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="img/wise.png" alt="Wise" />
        <img src="img/payoneer.png" alt="Payoneer" />
        <img src="img/iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script src="main.js"></script>
</body>
</html>
