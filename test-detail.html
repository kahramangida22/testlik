<!-- test-detail.html -->
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testlik | Test Detayı</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="firebase.js"></script>
  <script type="module">
    import { db } from './firebase.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const urlParams = new URLSearchParams(window.location.search);
    const testId = urlParams.get("id");

    let currentTest = null;
    let answers = [];

    async function loadTest() {
      const container = document.getElementById('test-detail');
      const ref = doc(db, "tests", testId);
      const snap = await getDoc(ref);
      if (snap.exists()) {
        const data = snap.data();
        currentTest = data;
        container.innerHTML = `<h2>${data.title}</h2><p>${data.description}</p>`;

        data.questions.forEach((q, i) => {
          const div = document.createElement("div");
          div.innerHTML = `<strong>${i + 1}. ${q.question}</strong><br/>`;
          q.options.forEach((opt, j) => {
            div.innerHTML += `
              <label>
                <input type="radio" name="q${i}" value="${j}" onchange="selectAnswer(${i}, ${j})"> ${opt}
              </label><br/>
            `;
          });
          container.appendChild(div);
        });

        const btn = document.createElement("button");
        btn.innerText = "Sonucu Göster";
        btn.onclick = showResult;
        container.appendChild(btn);
      } else {
        container.innerHTML = "Test bulunamadı.";
      }
    }

    window.selectAnswer = (index, value) => {
      answers[index] = value;
    };

    window.showResult = () => {
      const resultIndex = Math.floor(Math.random() * currentTest.results.length); // Şimdilik rastgele
      const result = currentTest.results[resultIndex];
      const container = document.getElementById('test-detail');
      container.innerHTML = `
        <h2>${result.title}</h2>
        <p>${result.description}</p>
        <img src="${result.image}" alt="Sonuç Görseli" />
        <p><strong>Test Sonucunu Paylaş:</strong></p>
        <button onclick="alert('Facebook\'ta paylaşıldı!')">📘 Facebook</button>
        <button onclick="alert('X\'te paylaşıldı!')">🐦 X (Twitter)</button>
        <button onclick="alert('Instagram\'da paylaşıldı!')">📸 Instagram</button>
        <button onclick="alert('TikTok\'ta paylaşıldı!')">🎵 TikTok</button>
        <button onclick="alert('YouTube Shorts\'ta paylaşıldı!')">▶️ Shorts</button>
      `;
    };

    window.onload = loadTest;
  </script>
</head>
<body>
  <nav>
    <a href="tests.html">← Tüm Testler</a>
  </nav>

  <main>
    <div id="test-detail">Yükleniyor...</div>
  </main>

  <footer>
    <p>© 2025 Testlik</p>
  </footer>
</body>
</html>
