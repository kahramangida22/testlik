<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>İstatistiklerim | Testlik.com</title>
  <meta name="description" content="Testlik.com - Kazanımların, başarıların, istatistiklerin burada!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .ist-wrap {max-width:520px;margin:39px auto 30px auto;background:#fff;border-radius:26px;box-shadow:0 2px 22px #735aff15;padding:33px 28px 23px 28px;}
    .ist-title {color:#735aff;font-size:1.25em;font-weight:800;margin-bottom:21px;}
    .ist-kutu-grid {display:grid;grid-template-columns:1fr 1fr;gap:23px 21px;margin-bottom:25px;}
    .ist-kutu {
      background:#faf4ff;border-radius:15px;box-shadow:0 1px 7px #735aff13;padding:17px 14px;text-align:center;
      display:flex;flex-direction:column;align-items:center;
    }
    .ist-kutu-label {color:#7a53c4;font-size:1em;font-weight:600;}
    .ist-kutu-deger {color:#ed4a88;font-size:1.32em;font-weight:800;margin-top:6px;}
    .ist-charts {margin-top:19px;}
    @media (max-width:600px){.ist-wrap{padding:13px 5px 9px 5px;}.ist-kutu-grid{grid-template-columns:1fr;}}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <!-- Giriş Modalı -->
  <div class="modal-bg" id="login-modal" style="display:none;">
    <div class="modal-card">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <h2>Testlik.com'a Giriş</h2>
      <button class="modal-google" onclick="loginGoogle()">
        <img src="google-icon.png" style="height:22px;vertical-align:middle;margin-right:9px;"> Google ile Giriş Yap
      </button>
      <hr style="margin:23px 0 15px 0;opacity:.19;">
      <input type="email" id="login-email" class="modal-inp" placeholder="E-posta" style="width:95%;padding:11px;border-radius:9px;border:1px solid #ccbaff;">
      <input type="password" id="login-pass" class="modal-inp" placeholder="Şifre" style="width:95%;padding:11px;border-radius:9px;border:1px solid #ccbaff;margin-top:8px;">
      <button class="modal-btn" onclick="loginEmail()">Giriş Yap</button>
      <div id="login-error" style="color:#ed4a88;font-size:.98em;min-height:22px;margin-top:7px;"></div>
      <button class="modal-btn" style="margin-top:18px;background:#7a53c4;" onclick="registerEmail()">Kayıt Ol</button>
      <button class="modal-guest" onclick="guestLogin()">Üyeliksiz Devam Et</button>
    </div>
  </div>
  <!-- Header -->
  <header>
    <div class="nav-flex">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html" class="active">İstatistik</a>
        <a href="admin.html" class="admin-link" id="admin-link" style="display:none;">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <!-- Main -->
  <main>
    <div class="ist-wrap">
      <div class="ist-title">Kişisel İstatistiklerim</div>
      <div class="ist-kutu-grid">
        <div class="ist-kutu"><div class="ist-kutu-label">Toplam Puan</div><div class="ist-kutu-deger" id="istat-puan">0</div></div>
        <div class="ist-kutu"><div class="ist-kutu-label">Çözülen Test</div><div class="ist-kutu-deger" id="istat-coz">0</div></div>
        <div class="ist-kutu"><div class="ist-kutu-label">Favori Test</div><div class="ist-kutu-deger" id="istat-fav">0</div></div>
        <div class="ist-kutu"><div class="ist-kutu-label">Çark Çevirme</div><div class="ist-kutu-deger" id="istat-cark">0</div></div>
      </div>
      <div class="ist-charts">
        <canvas id="istatChart" width="350" height="170"></canvas>
      </div>
    </div>
  </main>
  <!-- Footer -->
  <footer>
    <div class="footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="wise.png" alt="Wise" />
        <img src="payoneer.png" alt="Payoneer" />
        <img src="iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <!-- Firebase/JS -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script src="main.js"></script>
  <script>
    // Modal ve admin linki
    firebase.auth().onAuthStateChanged(function(user) {
      var adminLink = document.getElementById('admin-link');
      if (adminLink) {
        if (user && (user.email === "admin@testlik.com" || user.email === "seninadminmailin@...")) adminLink.style.display = "inline-block";
        else adminLink.style.display = "none";
      }
      if (!user) openModal();
      else closeModal();

      if (user) {
        db.collection("users").doc(user.uid).get().then(doc=>{
          let d = doc.data()||{};
          document.getElementById("istat-puan").innerText = d.points||0;
          document.getElementById("istat-coz").innerText = (d.solvedTests||[]).length;
          document.getElementById("istat-fav").innerText = (d.favorites||[]).length;
          document.getElementById("istat-cark").innerText = d.carkCount||0;

          // Grafik için örnek: son 6 test puanı veya son 6 çark sonucu
          let testPuanlari = (d.sonTestPuanlari||[30,45,20,12,28,50]);
          new Chart(document.getElementById("istatChart"), {
            type: 'bar',
            data: {
              labels: ["Test-1","Test-2","Test-3","Test-4","Test-5","Test-6"],
              datasets: [{
                label: "Son Test Puanları",
                data: testPuanlari,
                backgroundColor: ["#735aff","#ed4a88","#fd72ff","#7a53c4","#f5f0fa","#ff69b4"]
              }]
            },
            options: {
              plugins: {legend:{display:false}},
              scales: {y: {beginAtZero:true}}
            }
          });
        });
      }
    });
  </script>
</body>
</html>
