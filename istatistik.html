<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>İstatistikler | Testlik.com</title>
  <meta name="description" content="Testlik.com - Başarı istatistiklerin ve gelişimin burada!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="img/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <style>
    .istatistik-card {background:#fff;border-radius:20px;box-shadow:0 2px 18px #735aff13;padding:38px 22px;max-width:440px;margin:44px auto 24px auto;text-align:center;}
    .istatistik-ikon {font-size:2.3em;margin-bottom:9px;}
    .istatistik-baslik {font-size:1.18em;color:#735aff;font-weight:700;margin-bottom:8px;}
    .istatistik-deger {font-size:1.3em;color:#ed4a88;font-weight:700;}
    .istatistik-row {display:flex;justify-content:space-between;margin:13px 0;}
    .istatistik-label {color:#5a6cff;}
    .istatistik-hr {border-top:1px dashed #e7d8ff;margin:24px 0;}
  </style>
</head>
<body>
  <header>
    <div class="container">
      <img src="img/logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html" class="active">İstatistik</a>
        <a href="admin.html" class="admin-link">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <main>
    <section>
      <div class="istatistik-card" id="istatistik-alani">
        <div class="loader">İstatistikler yükleniyor...</div>
      </div>
    </section>
  </main>
  <footer>
    <div class="container">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="img/wise.png" alt="Wise" />
        <img src="img/payoneer.png" alt="Payoneer" />
        <img src="img/iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script>
    firebase.auth().onAuthStateChanged(function(user) {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        if (user) logoutBtn.style.display = 'inline-block';
        else logoutBtn.style.display = 'none';
      }
    });
    document.addEventListener('DOMContentLoaded', function() {
      var logoutBtnElem = document.getElementById('logout-btn');
      if (logoutBtnElem) {
        logoutBtnElem.onclick = function(e) {
          e.preventDefault();
          firebase.auth().signOut().then(() => {
            window.location.href = "index.html";
          });
        }
      }
    });

    auth.onAuthStateChanged(async user => {
      const area = document.getElementById("istatistik-alani");
      if (!user) {
        area.innerHTML = `<p>İstatistiklerini görmek için giriş yapmalısın.</p><a href="giris.html" class="cta-btn">Giriş Yap</a>`;
        return;
      }
      try {
        const doc = await db.collection("users").doc(user.uid).get();
        const u = doc.data();
        const points = u.points || 0;
        const completed = u.completedTests ? u.completedTests.length : 0;
        const favorites = u.favorites ? u.favorites.length : 0;
        const enYuksek = u.highestScore || points;
        area.innerHTML = `
          <div class="istatistik-ikon">📊</div>
          <div class="istatistik-baslik">Başarı İstatistiklerin</div>
          <div class="istatistik-row">
            <span class="istatistik-label">Toplam Puan:</span>
            <span class="istatistik-deger">${points}</span>
          </div>
          <div class="istatistik-row">
            <span class="istatistik-label">Çözülen Test:</span>
            <span class="istatistik-deger">${completed}</span>
          </div>
          <div class="istatistik-row">
            <span class="istatistik-label">Favori Test:</span>
            <span class="istatistik-deger">${favorites}</span>
          </div>
          <div class="istatistik-row">
            <span class="istatistik-label">En Yüksek Puan:</span>
            <span class="istatistik-deger">${enYuksek}</span>
          </div>
          <div class="istatistik-hr"></div>
          <div class="istatistik-row">
            <span class="istatistik-label">Kullanıcı ID:</span>
            <span style="color:#7ec8e3;font-weight:700;">${user.uid.slice(0,7)+"..."}</span>
          </div>
        `;
      } catch (err) {
        area.innerHTML = "<p>İstatistikler yüklenemedi!</p>";
        console.error(err);
      }
    });
  </script>
</body>
</html>
