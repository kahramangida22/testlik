<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <meta name="description" content="Testlik.com - Kendi başarı istatistiklerini incele!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo"><img src="logo.png" alt="Testlik.com" style="height:32px;vertical-align:middle;"> Testlik.com</div>
    <nav class="nav-links">
      <a href="index.html">Anasayfa</a>
      <a href="kategoriler.html">Kategoriler</a>
      <a href="sizdengelenler.html">Sizden Gelenler</a>
      <a href="soru-uret.html">Soru Üret</a>
      <a href="cark.html">Çarkıfelek</a>
      <a href="video-izle.html">Video İzle Kazan</a>
      <a href="favoriler.html">Favoriler</a>
      <a href="profil.html">Profil</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="akademi.html">Akademi</a>
      <a href="istatistik.html" class="active">İstatistik</a>
      <a href="leaderboard.html">Liderlik</a>
      <a href="admin.html" class="admin-link" id="admin-link" style="display:none;">Admin</a>
      <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
    </nav>
  </header>
  <!-- Main -->
  <main>
    <section style="max-width:480px;margin:36px auto 30px auto;">
      <div class="istatistik-wrap">
        <h2 style="color:#735aff;text-align:center;font-weight:900;margin-bottom:18px;">Başarı İstatistiklerim</h2>
        <div id="istatistik-bilgiler">
          <div style="text-align:center;margin-bottom:12px;">
            <span style="color:#ed4a88;font-size:1.12em;font-weight:800;">Toplam Puan: </span>
            <span id="istatistik-puan" style="font-size:1.15em;color:#7a53c4;font-weight:700;">0</span>
          </div>
          <div style="text-align:center;margin-bottom:13px;">
            <span style="color:#735aff;font-size:1.10em;font-weight:700;">Çözülen Test:</span>
            <span id="istatistik-cozum" style="color:#ed4a88;font-weight:700;">0</span>
          </div>
          <div style="margin:21px 0 9px 0;font-size:1.07em;font-weight:700;color:#735aff;">Kategori Bazında Başarı</div>
          <div id="kategori-istatistik" style="font-size:.99em;"></div>
        </div>
      </div>
    </section>
  </main>
  <!-- Footer -->
  <footer>
    <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
    <div class="odeme-logo">
      <img src="wise.png" alt="Wise" />
      <img src="payoneer.png" alt="Payoneer" />
      <img src="iban.png" alt="IBAN" />
    </div>
  </footer>
  <!-- Firebase/JS -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script src="main.js"></script>
  <script>
    firebase.auth().onAuthStateChanged(async function(user) {
      var adminLink = document.getElementById('admin-link');
      if (adminLink) {
        if (user && user.email === "admin@testlik.com") adminLink.style.display = "inline-block";
        else adminLink.style.display = "none";
      }
      if (user) {
        // Genel başarılar
        const doc = await db.collection("users").doc(user.uid).get();
        const data = doc.data();
        document.getElementById("istatistik-puan").innerText = data.point || 0;
        document.getElementById("istatistik-cozum").innerText = data.solvedTests ? data.solvedTests.length : 0;
        // Kategori bazında başarı
        if (data.solvedTests && data.solvedTests.length) {
          // Test ID'lerine göre testleri topla
          let solved = data.solvedTests.slice(0, 20); // Son 20 testi analiz et
          const snap = await db.collection("tests").where(firebase.firestore.FieldPath.documentId(), "in", solved).get();
          let kategoriMap = {};
          snap.forEach(doc => {
            const t = doc.data();
            if (!kategoriMap[t.category]) kategoriMap[t.category] = 0;
            kategoriMap[t.category]++;
          });
          // Kategorileri ad ile göster
          let html = "";
          const katSnap = await db.collection("kategoriler").get();
          katSnap.forEach(kd => {
            const kat = kd.data();
            if (kategoriMap[kat.slug]) {
              html += `<div><b>${kat.name}:</b> ${kategoriMap[kat.slug]} test</div>`;
            }
          });
          document.getElementById("kategori-istatistik").innerHTML = html || "<div style='color:#bbb;'>Kategori başarı bulunamadı.</div>";
        } else {
          document.getElementById("kategori-istatistik").innerHTML = "<div style='color:#bbb;'>Henüz hiç test çözmedin.</div>";
        }
      } else {
        document.getElementById("istatistik-bilgiler").innerHTML = "<div style='color:#bbb;text-align:center;'>Giriş yapmadan görüntülenemez.</div>";
      }
    });
  </script>
</body>
</html>
