<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>İstatistiklerim | Testlik.com</title>
  <meta name="description" content="Testlik.com - Kişisel başarı istatistikleri ve analizler.">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .istatistik-flex {display:flex;gap:28px;flex-wrap:wrap;justify-content:center;}
    .istatistik-card {
      background:#fff;
      border-radius:28px;
      box-shadow:0 2px 24px #735aff19;
      padding:32px 26px 28px 26px;
      max-width:350px;
      min-width:230px;
      text-align:center;
      margin:18px 0;
      font-size:1.08em;
      flex:1;
    }
    .istatistik-title {color:#735aff;font-size:1.12em;font-weight:700;margin-bottom:8px;}
    .istatistik-badge {
      font-size:2.05em;color:#fff;
      background:linear-gradient(90deg,#fd72ff 0%,#735aff 100%);
      border-radius:18px;
      padding:11px 28px;
      font-weight:800;
      letter-spacing:0.02em;
      box-shadow:0 2px 12px #735aff29;
      margin-bottom:12px;
      display:inline-block;
    }
    .istatistik-kat-icon {
      width:44px;height:44px;object-fit:contain;margin:0 5px -12px 0;background:#faf4ff;border-radius:12px;
      box-shadow:0 2px 12px #b69bfc19;
    }
  </style>
</head>
<body>
  <header>
    <div class="nav-flex">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html" class="active">İstatistik</a>
        <a href="admin.html" class="admin-link">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <main>
    <h1 class="main-title"><span class="emoji">📊</span> İstatistiklerim</h1>
    <div class="istatistik-flex">
      <div class="istatistik-card">
        <div class="istatistik-title">Toplam Çözülen Test</div>
        <div class="istatistik-badge" id="istatistik-test">0</div>
      </div>
      <div class="istatistik-card">
        <div class="istatistik-title">Kazanılan Toplam Puan</div>
        <div class="istatistik-badge" id="istatistik-puan">0</div>
      </div>
      <div class="istatistik-card">
        <div class="istatistik-title">En Çok Çözülen Kategori</div>
        <img src="test-category-default.png" class="istatistik-kat-icon" id="istatistik-kat-img" alt="Kategori" />
        <div id="istatistik-kat" style="color:#ed4a88;margin-top:8px;font-weight:700;">-</div>
      </div>
    </div>
  </main>
  <footer>
    <div class="footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="wise.png" alt="Wise" />
        <img src="payoneer.png" alt="Payoneer" />
        <img src="iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script>
    firebase.auth().onAuthStateChanged(function(user) {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        if (user) logoutBtn.style.display = 'inline-block';
        else logoutBtn.style.display = 'none';
      }
    });
    document.addEventListener('DOMContentLoaded', function() {
      var logoutBtnElem = document.getElementById('logout-btn');
      if (logoutBtnElem) {
        logoutBtnElem.onclick = function(e) {
          e.preventDefault();
          firebase.auth().signOut().then(() => {
            window.location.href = "index.html";
          });
        }
      }
    });

    // Kişisel istatistikleri getir
    firebase.auth().onAuthStateChanged(async user => {
      if (!user) {
        document.querySelector('.istatistik-flex').innerHTML = `
          <div class="istatistik-card"><p>İstatistiklerini görmek için giriş yapmalısın.</p><a href="giris.html" class="cta-btn">Giriş Yap</a></div>
        `;
        return;
      }
      const userDoc = await db.collection("users").doc(user.uid).get();
      const d = userDoc.data();
      document.getElementById("istatistik-test").innerText = (d.completedTests || []).length;
      document.getElementById("istatistik-puan").innerText = d.points || 0;

      // En çok çözülen kategori hesaplama (örnek amaçlı completedCategories array’i)
      let catCounts = {};
      (d.completedCategories || []).forEach(cat => {
        catCounts[cat] = (catCounts[cat] || 0) + 1;
      });
      let maxCat = "-";
      let maxCount = 0;
      for (let c in catCounts) {
        if (catCounts[c] > maxCount) {
          maxCat = c;
          maxCount = catCounts[c];
        }
      }
      let catImg = "test-category-default.png";
      if (maxCat === "Genel") catImg = "category-genel.png";
      if (maxCat === "Eğlence") catImg = "category-eglence.png";
      if (maxCat === "Bilgi") catImg = "category-bilgi.png";
      if (maxCat === "Psikoloji") catImg = "category-psikoloji.png";
      if (maxCat === "Oyun") catImg = "category-oyun.png";
      document.getElementById("istatistik-kat-img").src = catImg;
      document.getElementById("istatistik-kat").innerText = maxCat !== "-" ? maxCat : "-";
    });
  </script>
</body>
</html>
