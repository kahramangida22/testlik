
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Kişilik Testi</title>
  <script type="module" src="auth.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { color: #333; }
    .question { margin-bottom: 20px; }
    button { padding: 10px 20px; font-size: 16px; }
  </style>
</head>
<body>

  <h1>Kişilik Testi</h1>

  <div class="question">
    <p>1. Seni en iyi anlatan kelime?</p>
    <label><input type="radio" name="q1"> Enerjik</label><br>
    <label><input type="radio" name="q1"> Duygusal</label><br>
    <label><input type="radio" name="q1"> Mantıklı</label><br>
    <label><input type="radio" name="q1"> Yaratıcı</label>
  </div>

  <div class="question">
    <p>2. En rahat hissettiğin ortam?</p>
    <label><input type="radio" name="q2"> Kalabalık</label><br>
    <label><input type="radio" name="q2"> Doğa</label><br>
    <label><input type="radio" name="q2"> Ev</label><br>
    <label><input type="radio" name="q2"> Sahne</label>
  </div>

  <div class="question">
    <p>3. En çok vakit geçirdiğin şey?</p>
    <label><input type="radio" name="q3"> Arkadaşlar</label><br>
    <label><input type="radio" name="q3"> Kitap</label><br>
    <label><input type="radio" name="q3"> Hayaller</label><br>
    <label><input type="radio" name="q3"> İnternet</label>
  </div>

  <div id="result"></div>
  <button onclick="submitTest()">Testi Bitir</button>

  <script>
    function submitTest() {
      const totalQuestions = 3;
      const selectedAnswers = document.querySelectorAll('input[type="radio"]:checked').length;
      const pointPerQuestion = 10;
      const score = selectedAnswers * pointPerQuestion;
      const total = totalQuestions * pointPerQuestion;

      document.getElementById("result").innerHTML = `<h3>Puanın: ${score} / ${total}</h3>`;

      // Firebase'e puan ekle
      if (typeof addPoints === "function") {
        addPoints(score);
      }
    }
  </script>

</body>
</html>
