<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kategori Testleri | Testlik.com</title>
  <meta name="description" content="Testlik.com - Kategoriye özel testleri çöz, puan topla, ödül kazan!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo"><img src="logo.png" alt="Testlik.com" style="height:32px;vertical-align:middle;"> Testlik.com</div>
    <nav class="nav-links">
      <a href="index.html">Anasayfa</a>
      <a href="kategoriler.html" class="active">Kategoriler</a>
      <a href="sizdengelenler.html">Sizden Gelenler</a>
      <a href="soru-uret.html">Soru Üret</a>
      <a href="cark.html">Çarkıfelek</a>
      <a href="video-izle.html">Video İzle Kazan</a>
      <a href="favoriler.html">Favoriler</a>
      <a href="profil.html">Profil</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="akademi.html">Akademi</a>
      <a href="istatistik.html">İstatistik</a>
      <a href="leaderboard.html">Liderlik</a>
      <a href="admin.html" class="admin-link" id="admin-link" style="display:none;">Admin</a>
      <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
    </nav>
  </header>
  <!-- Main -->
  <main>
    <section style="max-width:1100px;margin:38px auto 30px auto;">
      <div style="margin-bottom:24px;">
        <h1 id="cat-name" style="color:#735aff;margin:12px 0 4px 0;font-weight:800;">Kategori Testleri</h1>
        <p id="cat-desc" style="color:#7a53c4;font-size:1.1em;"></p>
      </div>
      <div id="cat-testler" class="kategori-grid">
        <!-- Kategoriye ait testler burada JS ile yüklenecek -->
      </div>
    </section>
  </main>
  <!-- Footer -->
  <footer>
    <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
    <div class="odeme-logo">
      <img src="wise.png" alt="Wise" />
      <img src="payoneer.png" alt="Payoneer" />
      <img src="iban.png" alt="IBAN" />
    </div>
  </footer>
  <!-- Firebase/JS -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script src="main.js"></script>
  <script>
    // Giriş ve admin kontrolü
    firebase.auth().onAuthStateChanged(function(user) {
      var adminLink = document.getElementById('admin-link');
      if (adminLink) {
        if (user && user.email === "admin@testlik.com") adminLink.style.display = "inline-block";
        else adminLink.style.display = "none";
      }
    });

    // URL'den kategori slug'ı al
    function getQueryParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || "";
    }
    const catSlug = getQueryParam("cat");

    // Kategori adı ve açıklamasını Firestore'dan çek
    async function kategoriYukle() {
      if (!catSlug) return;
      const snap = await db.collection("kategoriler").where("slug", "==", catSlug).limit(1).get();
      if (snap.empty) {
        document.getElementById("cat-name").innerText = "Kategori Bulunamadı";
        document.getElementById("cat-desc").innerText = "";
        return;
      }
      const k = snap.docs[0].data();
      document.getElementById("cat-name").innerText = k.name || "Kategori";
      document.getElementById("cat-desc").innerText = k.description || "";
    }

    // Kategoriye ait testleri Firestore'dan çek
    async function testleriYukle() {
      if (!catSlug) return;
      const snap = await db.collection("tests").where("category", "==", catSlug).orderBy("createdAt", "desc").limit(30).get();
      let html = "";
      snap.forEach(doc => {
        const t = doc.data();
        html += `
          <div class="kategori-card" onclick="window.location.href='test-render.html?id=${doc.id}'">
            <img src="${t.image || 'img/soru-isareti.png'}" alt="Test Görseli">
            <h3>${t.title || "Test"}</h3>
            <p>${t.description || ""}</p>
          </div>
        `;
      });
      document.getElementById("cat-testler").innerHTML = html || "<div style='color:#bbb;'>Bu kategoride henüz test yok.</div>";
    }

    document.addEventListener("DOMContentLoaded", () => {
      kategoriYukle();
      testleriYukle();
    });
  </script>
</body>
</html>
