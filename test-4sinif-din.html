<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>4. Sınıf Din Kültürü Testi</title>
  <link rel="stylesheet" href="styles/test-style.css" />
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js"></script>
</head>
<body>
  <div class="header">
    <h1 class="logo">Testlik.com</h1>
    <div class="nav-buttons">
      <button onclick="window.location.href='index.html'">Ana Sayfa</button>
      <button onclick="window.location.href='kategoriler.html'">Kategoriler</button>
    </div>
    <div class="user-info" id="user-info">
      <button onclick="window.location.href='giris.html'">Giriş Yap</button>
    </div>
  </div>

  <div class="container">
    <h2>🕌 4. Sınıf Din Kültürü Testi</h2>
    <div id="soru-container">
      <div id="soru"></div>
      <div id="secenekler" class="secenekler"></div>
    </div>
    <div id="sonuc"></div>
    <button id="siradaki-btn" onclick="siradakiSoru()">Sonraki Soru</button>
    <div id="puan-alani">Puan: <span id="puan">0</span></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDcneigub2eAJjTrfrkiETuLgy5ule8L6s",
      authDomain: "testlik.firebaseapp.com",
      projectId: "testlik",
      storageBucket: "testlik.appspot.com",
      messagingSenderId: "668524500496",
      appId: "1:668524500496:web:579bb4fc5990c87afedc95",
      measurementId: "G-8ZEYBJCV3T"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let sorular = [];
    let mevcutSoru = 0;
    let puan = 0;
    let cevaplandi = false;

    const soruContainer = document.getElementById("soru");
    const seceneklerDiv = document.getElementById("secenekler");
    const siradakiBtn = document.getElementById("siradaki-btn");
    const puanSpan = document.getElementById("puan");

    async function sorulariGetir() {
      const querySnapshot = await getDocs(collection(db, "4sinif-din"));
      querySnapshot.forEach((doc) => {
        sorular.push(doc.data());
      });
      sorular = sorular.sort(() => Math.random() - 0.5);
      soruGoster();
    }

    function soruGoster() {
      cevaplandi = false;
      seceneklerDiv.innerHTML = "";
      const soru = sorular[mevcutSoru];
      soruContainer.textContent = soru.soru;

      soru.secenekler.forEach(secenek => {
        const buton = document.createElement("button");
        buton.textContent = secenek;
        buton.onclick = () => cevapKontrol(secenek, soru.cevap, buton);
        seceneklerDiv.appendChild(buton);
      });
    }

    function cevapKontrol(secilen, dogru, buton) {
      if (cevaplandi) return;
      cevaplandi = true;

      if (secilen === dogru) {
        buton.classList.add("dogru");
        puan += 10;
      } else {
        buton.classList.add("yanlis");
        [...seceneklerDiv.children].forEach(btn => {
          if (btn.textContent === dogru) btn.classList.add("dogru");
        });
      }
      puanSpan.textContent = puan;
    }

    window.siradakiSoru = function() {
      mevcutSoru++;
      if (mevcutSoru < sorular.length) {
        soruGoster();
      } else {
        document.getElementById("soru-container").innerHTML = "<h3>🎉 Tüm sorular tamamlandı!</h3>";
        siradakiBtn.style.display = "none";
      }
    };

    onAuthStateChanged(auth, (user) => {
      const userDiv = document.getElementById("user-info");
      if (user) {
        userDiv.innerHTML = `
          <span>${user.displayName || user.email}</span>
          <button onclick="cikisYap()">Çıkış Yap</button>
        `;
      } else {
        userDiv.innerHTML = `<button onclick="window.location.href='giris.html'">Giriş Yap</button>`;
      }
    });

    window.cikisYap = function() {
      signOut(auth).then(() => {
        location.reload();
      });
    };

    sorulariGetir();
  </script>
</body>
</html>
