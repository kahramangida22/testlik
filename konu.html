<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Konu Detayı</title>
  <link rel="stylesheet" href="konu-style.css" />
  <script type="module" src="konu.js" defer></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>Kızlar Kulübü | Konu Detayı</h1>
      <a href="kizlar_klubu.html" class="geri-btn">← Geri Dön</a>
    </header>

    <!-- Konu içeriği -->
    <section class="konu-detay">
      <h2 id="konuBaslik">Yükleniyor...</h2>
      <p id="konuAciklama"></p>
      <div class="konu-bilgi">
        <span id="konuYazar"></span> • 
        <span id="konuTarih"></span> • 
        <span id="konuOkunma"></span> 👁️
      </div>
      <div class="butonlar">
        <button id="begenBtn">❤️ Beğen</button>
        <button id="dislikeBtn">👎 Beğenme</button>
        <button id="raporlaBtn">🚨 Raporla</button>
      </div>
    </section>

    <!-- Yorum Alanı -->
    <section class="yorumlar">
      <h3>Yorumlar</h3>
      <div id="yorumListesi"></div>

      <textarea id="yorumInput" placeholder="Yorum yaz..."></textarea>
      <button id="yorumGonderBtn">Gönder</button>
    </section>

    <!-- Reklam alanı -->
    <footer class="reklam-footer">
      REKLAM ALANI (728x90)
    </footer>
  </div>
</body>
</html>
