<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video İzle Kazan | Testlik.com</title>
  <meta name="description" content="Testlik.com - Video izle, kolayca puan kazan!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .video-card {
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 2px 24px #735aff19;
      padding: 36px 24px 34px 24px;
      max-width: 440px;
      margin: 44px auto 22px auto;
      text-align: center;
      font-size: 1.12em;
    }
    .video-embed {
      width:100%;max-width:370px;
      aspect-ratio:16/9;
      margin:0 auto 18px auto;
      border-radius:17px;
      box-shadow:0 2px 12px #b69bfc19;
      border:none;
      background:#faf4ff;
      display:block;
    }
    .video-btn {
      margin-top: 15px;
      font-size: 1.08em;
      background: linear-gradient(90deg,#fd72ff 0%, #735aff 100%);
      color: #fff;
      border: none;
      border-radius: 17px;
      padding: 10px 33px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 10px #735aff29;
      transition: background .13s;
    }
    .video-btn:disabled {background:#ccc;cursor:not-allowed;}
    .video-result {margin-top:18px;color:#ed4a88;font-weight:700;min-height:24px;}
  </style>
</head>
<body>
  <header>
    <div class="nav-flex">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html" class="active">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="video-card">
      <div style="font-weight:700;color:#735aff;margin-bottom:14px;font-size:1.22em;">Video İzle, Anında Puan Kazan!</div>
      <iframe class="video-embed" id="videoFrame"
        src="https://www.youtube.com/embed/3V-dZB5TKss?enablejsapi=1&controls=1"
        title="YouTube video player" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen>
      </iframe>
      <button class="video-btn" id="videoCheckBtn" disabled>Video Bitince Puanı Al</button>
      <div class="video-result" id="videoResult"></div>
    </div>
  </main>
  <footer>
    <div class="footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="wise.png" alt="Wise" />
        <img src="payoneer.png" alt="Payoneer" />
        <img src="iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    var player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('videoFrame', {
        events: {
          'onStateChange': onPlayerStateChange
        }
      });
    }
    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.ENDED) {
        document.getElementById('videoCheckBtn').disabled = false;
      }
    }
    // Navbar çıkış butonu
    firebase.auth().onAuthStateChanged(function(user) {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        if (user) logoutBtn.style.display = 'inline-block';
        else logoutBtn.style.display = 'none';
      }
    });
    document.addEventListener('DOMContentLoaded', function() {
      var logoutBtnElem = document.getElementById('logout-btn');
      if (logoutBtnElem) {
        logoutBtnElem.onclick = function(e) {
          e.preventDefault();
          firebase.auth().signOut().then(() => {
            window.location.href = "index.html";
          });
        }
      }
    });

    // Video tamamlanınca puan ver
    document.getElementById("videoCheckBtn").onclick = async function() {
      const btn = document.getElementById("videoCheckBtn");
      const res = document.getElementById("videoResult");
      btn.disabled = true;
      res.innerHTML = "İşleniyor...";
      const user = firebase.auth().currentUser;
      if (!user) {
        res.innerHTML = "<span style='color:#ed4a88;'>Giriş yapmalısın!</span>";
        return;
      }
      // Video ödülünü tekrar tekrar vermemek için "videoWatched" alanı kontrolü
      const userRef = db.collection("users").doc(user.uid);
      const userDoc = await userRef.get();
      if (userDoc.data().videoWatched && (Date.now() - userDoc.data().videoWatched < 1000*60*60*24)) {
        res.innerHTML = "<span style='color:#bba5fa;'>Bugün zaten izledin. Yarın tekrar izle!</span>";
        return;
      }
      // Ödül ekle
      await userRef.update({
        points: (userDoc.data().points || 0) + 30,
        videoWatched: Date.now()
      });
      res.innerHTML = "<span style='color:#13bd72;'>Tebrikler, 30 puan kazandın!</span>";
    };
  </script>
</body>
</html>
