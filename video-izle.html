  <!-- Main -->
  <main>
    <div class="video-wrap">

  <!-- Firebase/JS -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script src="main.js"></script>
  <script>
    // Video/reklam listesi (demo, gerçek reklam için entegre gereklidir)
    const reklamlar = [
      {src:"https://www.w3schools.com/html/mov_bbb.mp4", puan:10, metin:"10 puan kazandın!"},
      {src:"https://www.w3schools.com/html/movie.mp4", puan:25, metin:"25 puan bonus!"},
      {src:"https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4", puan:20, metin:"20 puan bonus!"},
    ];

    function rastgeleReklam() {
      return reklamlar[Math.floor(Math.random()*reklamlar.length)];
    }

    function videoYukle() {
      const reklam = rastgeleReklam();
      document.getElementById("video-alan").innerHTML = `
        <video id="bonus-video" width="100%" controls style="border-radius:14px;box-shadow:0 2px 9px #735aff1a;">
          <source src="${reklam.src}" type="video/mp4">
          Tarayıcınız video oynatmayı desteklemiyor.
        </video>
      `;
      document.getElementById("video-sonuc").innerText = "";
      document.getElementById("yeniden-btn").style.display = "none";
      document.getElementById("bonus-video").onended = function() {
        videoBitir(reklam.puan, reklam.metin);
      };
    }

    async function videoBitir(puan, metin) {
      document.getElementById("video-sonuc").innerText = metin;
      document.getElementById("yeniden-btn").style.display = "inline-block";
      firebase.auth().onAuthStateChanged(async function(user){
        if(user){
          const userRef = db.collection("users").doc(user.uid);
          const doc = await userRef.get();
          let mevcut = doc.data()?.point || 0;
          await userRef.update({ point: mevcut + puan });
        }
      });
    }

    document.getElementById("yeniden-btn").onclick = videoYukle;
    document.addEventListener("DOMContentLoaded", videoYukle);

    // Admin ve login kontrolü
    firebase.auth().onAuthStateChanged(function(user) {
      var adminLink = document.getElementById('admin-link');
      if (adminLink) {
        if (user && user.email === "admin@testlik.com") adminLink.style.display = "inline-block";
        else adminLink.style.display = "none";
      }
    });
  </script>
