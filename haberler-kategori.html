<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Haberler - Kategori</title>
  <link rel="stylesheet" href="haberler-kategori-style.css">
  <script type="module" src="haberler-kategori.js" defer></script>
</head>
<body>

  <!-- NAVBAR (index ile birebir) -->
  <header class="site-header">
    <div class="navbar">
      <div class="logo">🧠 <span>Testlik</span><strong>.com</strong></div>
      <nav class="menu">
        <a href="kategoriler.html">🎯 Kategoriler</a>
        <a href="index.html">🏠 Ana Sayfa</a>
        <a href="haberler.html">📰 Haberler</a>
        <a href="puan-tablosu.html">🏆 Puan Durumu</a>
      </nav>
      <div id="kullaniciAlani" class="kullanici-kontrol"></div>
    </div>
  </header>

  <!-- İÇERİK -->
  <main>
    <h2 id="kategoriBaslik">Kategori</h2>
    <div id="haberListesi" class="haber-grid"></div>
  </main>

  <footer>
    <p>© 2025 Testlik.com | Tüm hakları saklıdır.</p>
  </footer>

  <!-- GİRİŞ / ÇIKIŞ -->
  <script type="module">
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const auth = getAuth();
    const kullaniciAlani = document.getElementById("kullaniciAlani");

    onAuthStateChanged(auth, (user) => {
      if (user) {
        const puan = localStorage.getItem("puan") || 0;
        kullaniciAlani.innerHTML = `
          <span>👤 ${user.displayName || "Kullanıcı"}</span>
          <span>⭐ ${puan} puan</span>
          <button onclick="cikisYap()">🚪 Çıkış</button>
        `;
      } else {
        kullaniciAlani.innerHTML = `<a href="giris.html">🔐 Giriş Yap</a>`;
      }
    });

    window.cikisYap = () => {
      signOut(auth).then(() => location.reload());
    };
  </script>

</body>
</html>
