<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Testlik.com | Haber Kategorisi</title>
  <link rel="stylesheet" href="index-style.css" />
  <script type="module" src="haberler-kategori.js" defer></script>
</head>
<body>

  <!-- SABİT REKLAMLAR -->
  <div class="sabit-reklam sag-reklam">
    <ins class="adsbygoogle" style="display:block;width:120px;height:600px" data-ad-client="ca-pub-XXXXXXXXXXXX" data-ad-slot="1111111111"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>
  <div class="sabit-reklam sol-reklam">
    <ins class="adsbygoogle" style="display:block;width:120px;height:600px" data-ad-client="ca-pub-XXXXXXXXXXXX" data-ad-slot="2222222222"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <!-- ÜST BAR -->
  <header class="site-header">
    <div class="navbar">
      <div class="logo">🧠 <span>Testlik</span><strong>.com</strong></div>
      <nav class="menu">
        <a href="kategoriler.html">🎯 Kategoriler</a>
        <a href="index.html">🏠 Ana Sayfa</a>
        <a href="haberler.html" class="aktif">📰 Haberler</a>
        <a href="puan-tablosu.html">🏆 Puan Durumu</a>
      </nav>
      <div id="kullaniciAlani" class="kullanici-kontrol"></div>
    </div>
  </header>

  <!-- İÇERİK -->
  <main>
    <section class="bolum">
      <h2 id="kategoriBaslik">Yükleniyor...</h2>
      <div id="haberListesi" class="icerik-kutulari"></div>
    </section>

    <div class="alt-reklam">
      <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXXXX" data-ad-slot="3333333333" data-ad-format="auto" data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
  </main>

  <footer>
    <p>© 2025 Testlik.com | Eğlenceli testlerin ve ilginç haberlerin adresi</p>
  </footer>

  <!-- Giriş/Çıkış JS -->
  <script type="module">
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const auth = getAuth();
    const kullaniciAlani = document.getElementById("kullaniciAlani");

    onAuthStateChanged(auth, (user) => {
      if (user) {
        const puan = localStorage.getItem("puan") || 0;
        kullaniciAlani.innerHTML = `
          <span>👤 ${user.displayName || "Kullanıcı"}</span>
          <span>⭐ ${puan} puan</span>
          <button onclick="cikisYap()">🚪 Çıkış</button>
        `;
      } else {
        kullaniciAlani.innerHTML = `<a href="giris.html">🔐 Giriş Yap</a>`;
      }
    });

    window.cikisYap = () => {
      signOut(auth).then(() => location.reload());
    };
  </script>

</body>
</html>
