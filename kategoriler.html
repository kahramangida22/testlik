<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Kategoriler | Testlik.com</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Testlik.com - Kategorilere göre eğlenceli testler.">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="nav-flex">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html" class="active">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>

  <main>
    <h1 class="main-title"><span class="emoji">📚</span> Kategoriler</h1>
    <div style="text-align:center;margin-bottom:20px;">
      <button class="cta-btn ghost-btn" onclick="filterCategory('')">Tümü</button>
      <button class="cta-btn ghost-btn" onclick="filterCategory('Genel')">Genel</button>
      <button class="cta-btn ghost-btn" onclick="filterCategory('Eğlence')">Eğlence</button>
      <button class="cta-btn ghost-btn" onclick="filterCategory('Bilgi')">Bilgi</button>
      <button class="cta-btn ghost-btn" onclick="filterCategory('Psikoloji')">Psikoloji</button>
      <button class="cta-btn ghost-btn" onclick="filterCategory('Oyun')">Oyun</button>
    </div>
    <section class="testler-grid" id="kategori-test-list">
      <!-- JS ile testler burada listelenir -->
    </section>
  </main>

  <footer>
    <div class="footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="wise.png" alt="Wise" />
        <img src="payoneer.png" alt="Payoneer" />
        <img src="iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script src="main.js"></script>
  <script>
    // Navbar çıkış butonu
    firebase.auth().onAuthStateChanged(function(user) {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        if (user) logoutBtn.style.display = 'inline-block';
        else logoutBtn.style.display = 'none';
      }
    });
    document.addEventListener('DOMContentLoaded', function() {
      var logoutBtnElem = document.getElementById('logout-btn');
      if (logoutBtnElem) {
        logoutBtnElem.onclick = function(e) {
          e.preventDefault();
          firebase.auth().signOut().then(() => {
            window.location.href = "index.html";
          });
        }
      }
    });

    // Testleri kategoriye göre getir
    let currentCategory = '';
    async function loadKategoriTests(category = '') {
      const testList = document.getElementById("kategori-test-list");
      testList.innerHTML = "<p>Testler yükleniyor...</p>";
      let ref = db.collection("tests");
      if (category) ref = ref.where("category", "==", category);
      ref = ref.orderBy("createdAt", "desc");
      const snapshot = await ref.get();
      if (snapshot.empty) {
        testList.innerHTML = "<p>Bu kategoride henüz test yok.</p>";
        return;
      }
      testList.innerHTML = "";
      snapshot.forEach(doc => {
        const t = doc.data();
        // Kategori ikonunu otomatik çek
        let icon = "test-category-default.png";
        if (t.category === "Genel") icon = "category-genel.png";
        if (t.category === "Eğlence") icon = "category-eglence.png";
        if (t.category === "Bilgi") icon = "category-bilgi.png";
        if (t.category === "Psikoloji") icon = "category-psikoloji.png";
        if (t.category === "Oyun") icon = "category-oyun.png";
        testList.innerHTML += `
          <div class="test-card">
            <img src="${icon}" alt="${t.category || ''}"/>
            <span>${t.title}</span>
            <small>${t.description || ''}</small>
            <a href="test-render.html?id=${doc.id}" class="cta-btn" style="margin-top:13px;">Testi Çöz</a>
          </div>
        `;
      });
    }
    function filterCategory(cat) {
      currentCategory = cat;
      loadKategoriTests(cat);
    }
    // İlk açılışta tüm testleri getir
    loadKategoriTests();
  </script>
</body>
</html>
