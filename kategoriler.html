<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kategoriler | Testlik.com</title>
  <meta name="description" content="Testlik.com - Kategorilere göre eğlenceli testler.">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="img/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="container nav-flex">
      <img src="img/logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html" class="active">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <main>
    <section class="hero" style="padding-bottom:20px;">
      <h1><span class="emoji">📚</span> Kategoriler</h1>
      <div style="margin:0 auto 20px auto;display:flex;gap:14px;justify-content:center;flex-wrap:wrap;">
        <button class="cta-btn ghost-btn" onclick="filterCategory('')">Tümü</button>
        <button class="cta-btn ghost-btn" onclick="filterCategory('Genel')">Genel</button>
        <button class="cta-btn ghost-btn" onclick="filterCategory('Eğlence')">Eğlence</button>
        <button class="cta-btn ghost-btn" onclick="filterCategory('Bilgi')">Bilgi</button>
        <button class="cta-btn ghost-btn" onclick="filterCategory('Psikoloji')">Psikoloji</button>
        <button class="cta-btn ghost-btn" onclick="filterCategory('Tarih')">Tarih</button>
        <button class="cta-btn ghost-btn" onclick="filterCategory('Teknoloji')">Teknoloji</button>
        <button class="cta-btn ghost-btn" onclick="filterCategory('Diğer')">Diğer</button>
      </div>
    </section>
    <section class="test-list" id="test-list"></section>
  </main>
  <footer>
    <div class="container footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="img/wise.png" alt="Wise" />
        <img src="img/payoneer.png" alt="Payoneer" />
        <img src="img/iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script>
    firebase.auth().onAuthStateChanged(function(user) {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        if (user) logoutBtn.style.display = 'inline-block';
        else logoutBtn.style.display = 'none';
      }
    });
    document.addEventListener('DOMContentLoaded', function() {
      var logoutBtnElem = document.getElementById('logout-btn');
      if (logoutBtnElem) {
        logoutBtnElem.onclick = function(e) {
          e.preventDefault();
          firebase.auth().signOut().then(() => {
            window.location.href = "index.html";
          });
        }
      }
    });

    // Kategori filtreleme ve testleri çekme
    let currentCategory = '';
    async function loadTests(category = '') {
      const testList = document.getElementById("test-list");
      testList.innerHTML = "<p>Testler yükleniyor...</p>";
      let ref = db.collection("tests");
      if (category) ref = ref.where("category", "==", category);
      ref = ref.orderBy("createdAt", "desc");
      const snapshot = await ref.get();
      if (snapshot.empty) {
        testList.innerHTML = "<p>Bu kategoride henüz test yok.</p>";
        return;
      }
      testList.innerHTML = "";
      snapshot.forEach(doc => {
        const t = doc.data();
        testList.innerHTML += `
          <div class="test-card" style="max-width:360px;">
            <img src="${t.image || 'img/test-category-default.png'}" alt="Test Görseli" loading="lazy"/>
            <div class="category">${t.category || 'Genel'}</div>
            <h3 style="color:#735aff;margin-bottom:7px;font-size:1.18em;">${t.title}</h3>
            <p style="color:#8f7fff;font-size:.98em;min-height:30px;">${t.description || ''}</p>
            <a href="test-render.html?id=${doc.id}" class="cta-btn" style="margin-top:10px;">Testi Çöz</a>
          </div>
        `;
      });
    }
    function filterCategory(cat) {
      currentCategory = cat;
      loadTests(cat);
    }
    // İlk açılışta tüm testler
    loadTests();
  </script>
</body>
</html>
