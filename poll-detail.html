<!-- poll-detail.html -->
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Testlik | Anket Detayı</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="firebase.js"></script>
  <script type="module">
    import { db } from './firebase.js';
    import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const urlParams = new URLSearchParams(window.location.search);
    const pollId = urlParams.get("id");

    let currentPoll = null;

    async function loadPoll() {
      const container = document.getElementById('poll-detail');
      const ref = doc(db, "polls", pollId);
      const snap = await getDoc(ref);
      if (snap.exists()) {
        currentPoll = { id: snap.id, ...snap.data() };
        container.innerHTML = `<h2>${currentPoll.question}</h2>`;
        currentPoll.options.forEach((opt, i) => {
          const btn = document.createElement("button");
          btn.innerText = opt;
          btn.onclick = () => vote(i);
          container.appendChild(btn);
        });
      } else {
        container.innerHTML = "Anket bulunamadı.";
      }
    }

    async function vote(index) {
      currentPoll.votes[index]++;
      const ref = doc(db, "polls", currentPoll.id);
      await updateDoc(ref, { votes: currentPoll.votes });
      showResults();
    }

    function showResults() {
      const container = document.getElementById('poll-detail');
      container.innerHTML = `<h2>${currentPoll.question}</h2><h3>Sonuçlar</h3>`;
      currentPoll.options.forEach((opt, i) => {
        const voteCount = currentPoll.votes[i];
        container.innerHTML += `<p>${opt}: ${voteCount} oy</p>`;
      });
    }

    window.onload = loadPoll;
  </script>
</head>
<body>
  <nav>
    <a href="polls.html">← Tüm Anketler</a>
  </nav>

  <main>
    <div id="poll-detail">Yükleniyor...</div>
  </main>

  <footer>
    <p>© 2025 Testlik</p>
  </footer>
</body>
</html>
