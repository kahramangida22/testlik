<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Çöz - Testlik</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="logo">Testlik Test</div>
  </header>

  <main>
    <h2>🧠 Test Başlığı</h2>
    <form id="quizForm">
      <div class="question">
        <p>Soru 1: Testlik ne amaçla kullanılır?</p>
        <label><input type="radio" name="q1" value="a"> Eğlenmek</label><br>
        <label><input type="radio" name="q1" value="b"> Öğrenmek</label><br>
        <label><input type="radio" name="q1" value="c"> Para kazanmak</label>
      </div>

      <button type="submit">Cevapları Gönder</button>
    </form>
    <p id="result"></p>
  </main>

  <footer>
    <p>© 2025 Testlik</p>
  </footer>

  <script>
    document.getElementById("quizForm").onsubmit = function(e) {
      e.preventDefault();
      document.getElementById("result").innerText = "Cevaplarınız alındı! 🎉";
    };
  </script>
</body>
</html>
