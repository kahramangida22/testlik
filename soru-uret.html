<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Soru/Öneri Gönder | Testlik.com</title>
  <meta name="description" content="Testlik.com - Kendi testini/sorunu öner, puan kazan!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .soru-card {
      background:#fff;border-radius:28px;box-shadow:0 2px 24px #735aff19;
      padding:36px 28px 28px 28px;max-width:430px;margin:44px auto 24px auto;
      font-size:1.13em;color:#4a306f;text-align:center;
    }
    .soru-title {
      color:#735aff;font-size:1.22em;font-weight:800;margin-bottom:13px;display:flex;align-items:center;gap:10px;justify-content:center;
    }
    .soru-inp, .soru-textarea {
      width:99%;padding:9px 10px;margin-bottom:11px;
      border-radius:14px;border:1.3px solid #b69bfc;font-size:1.07em;
      background:#faf4ff;resize:vertical;
      font-family:inherit;
    }
    .soru-textarea {min-height:44px;max-height:200px;}
    .soru-btn {
      background:linear-gradient(90deg,#fd72ff 0%,#735aff 100%);
      color:#fff;border:none;border-radius:17px;
      padding:11px 29px;margin-top:7px;font-weight:700;font-size:1.06em;cursor:pointer;
      box-shadow:0 2px 10px #735aff29;transition:background .13s;
    }
    .soru-btn:active{background:#ed4a88;}
    .soru-result {margin-top:16px;color:#ed4a88;font-weight:700;min-height:24px;}
  </style>
</head>
<body>
  <header>
    <div class="nav-flex">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html" class="active">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="soru-card">
      <div class="soru-title"><img src="add.png" style="height:32px;" alt="Ekle"/> Soru / Test / Öneri Gönder</div>
      <input class="soru-inp" id="soru-title" placeholder="Başlık (zorunlu)" maxlength="60"/>
      <textarea class="soru-textarea" id="soru-desc" placeholder="Kısa açıklama, soru veya önerin (zorunlu)" maxlength="300"></textarea>
      <button class="soru-btn" id="soru-btn">Gönder</button>
      <div class="soru-result" id="soru-result"></div>
    </div>
  </main>
  <footer>
    <div class="footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="wise.png" alt="Wise" />
        <img src="payoneer.png" alt="Payoneer" />
        <img src="iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script>
    // Navbar çıkış butonu
    firebase.auth().onAuthStateChanged(function(user) {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        if (user) logoutBtn.style.display = 'inline-block';
        else logoutBtn.style.display = 'none';
      }
    });
    document.addEventListener('DOMContentLoaded', function() {
      var logoutBtnElem = document.getElementById('logout-btn');
      if (logoutBtnElem) {
        logoutBtnElem.onclick = function(e) {
          e.preventDefault();
          firebase.auth().signOut().then(() => {
            window.location.href = "index.html";
          });
        }
      }
    });

    // Soru/öneri gönderme
    document.getElementById("soru-btn").onclick = async function() {
      const title = document.getElementById("soru-title").value.trim();
      const desc = document.getElementById("soru-desc").value.trim();
      const res = document.getElementById("soru-result");
      if (!title || !desc) {
        res.innerHTML = "<span>Lütfen başlık ve açıklama gir.</span>";
        return;
      }
      // Kullanıcıya login değilse anonim ekle
      let uid = null, displayName = "Anonim";
      const user = firebase.auth().currentUser;
      if (user) {
        uid = user.uid;
        displayName = user.displayName || user.email || "Kullanıcı";
      }
      await db.collection("suggestions").add({
        title, desc, createdAt: Date.now(), uid, displayName
      });
      res.innerHTML = "<span style='color:#13bd72;'>Önerin başarıyla kaydedildi! Teşekkürler 🙏</span>";
      document.getElementById("soru-title").value = "";
      document.getElementById("soru-desc").value = "";
    }
  </script>
</body>
</html>
