<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <meta name="description" content="Testlik.com - Yeni test, soru veya önerini gönder, belki sitede yayınlansın!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo"><img src="logo.png" alt="Testlik.com" style="height:32px;vertical-align:middle;"> Testlik.com</div>
    <nav class="nav-links">
      <a href="index.html">Anasayfa</a>
      <a href="kategoriler.html">Kategoriler</a>
      <a href="sizdengelenler.html">Sizden Gelenler</a>
      <a href="soru-uret.html" class="active">Soru Üret</a>
      <a href="cark.html">Çarkıfelek</a>
      <a href="video-izle.html">Video İzle Kazan</a>
      <a href="favoriler.html">Favoriler</a>
      <a href="profil.html">Profil</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="akademi.html">Akademi</a>
      <a href="istatistik.html">İstatistik</a>
      <a href="leaderboard.html">Liderlik</a>
      <a href="admin.html" class="admin-link" id="admin-link" style="display:none;">Admin</a>
      <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
    </nav>
  </header>
  <!-- Main -->
  <main>
    <section style="max-width:500px;margin:36px auto 30px auto;">
      <div class="profile-wrap">
        <h2 style="color:#735aff;text-align:center;font-weight:900;margin-bottom:15px;">Soru / Test Öner</h2>
        <div style="color:#7a53c4;text-align:center;font-size:1.08em;margin-bottom:11px;">Yeni bir test, soru ya da konu fikrin varsa paylaş!</div>
        <form id="soru-uret-form">
          <label>Test / Soru Başlığı</label>
          <input type="text" id="soru-baslik" maxlength="60" placeholder="Başlık (ör: En sevdiğin yemek...)">
          <label>Soru veya Test Detayı</label>
          <textarea id="soru-detay" rows="3" maxlength="400" placeholder="Kısa açıklama, örnek soru veya öneri"></textarea>
          <button class="btn" type="submit">Gönder</button>
          <div id="soru-uret-sonuc" style="margin-top:7px;color:#7a53c4;font-weight:700;min-height:18px;"></div>
        </form>
        <hr style="margin:24px 0 15px 0;border:none;border-top:1px solid #ece8fa;">
        <div style="text-align:center;">
          <button class="btn" onclick="rastgeleOner()">AI'den rastgele test önerisi al</button>
          <div id="ai-oneri" style="margin-top:13px;color:#ed4a88;font-weight:600;"></div>
        </div>
      </div>
    </section>
  </main>
  <!-- Footer -->
  <footer>
    <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
    <div class="odeme-logo">
      <img src="wise.png" alt="Wise" />
      <img src="payoneer.png" alt="Payoneer" />
      <img src="iban.png" alt="IBAN" />
    </div>
  </footer>
  <!-- Firebase/JS -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script src="main.js"></script>
  <script>
    // Admin kontrolü
    firebase.auth().onAuthStateChanged(function(user) {
      var adminLink = document.getElementById('admin-link');
      if (adminLink) {
        if (user && user.email === "admin@testlik.com") adminLink.style.display = "inline-block";
        else adminLink.style.display = "none";
      }
    });

    // Form ile yeni öneri/soru gönder
    document.getElementById("soru-uret-form").onsubmit = async function(e){
      e.preventDefault();
      const baslik = document.getElementById("soru-baslik").value.trim();
      const detay = document.getElementById("soru-detay").value.trim();
      if(!baslik || baslik.length < 5){
        document.getElementById("soru-uret-sonuc").innerText = "Başlık en az 5 karakter olmalı!";
        return;
      }
      if(!detay || detay.length < 10){
        document.getElementById("soru-uret-sonuc").innerText = "Detay en az 10 karakter olmalı!";
        return;
      }
      let kullanici = "Anonim";
      const user = firebase.auth().currentUser;
      if(user) kullanici = user.displayName || user.email.split("@")[0];
      await db.collection("suggestions").add({
        user: kullanici,
        title: baslik,
        detail: detay,
        createdAt: new Date()
      });
      document.getElementById("soru-uret-sonuc").innerText = "Önerin alındı, teşekkürler!";
      document.getElementById("soru-baslik").value = "";
      document.getElementById("soru-detay").value = "";
    };

    // Basit yapay zeka önerisi (örnek - gerçek AI entegre için API gerekir)
    function rastgeleOner() {
      const ornekler = [
        "Hangi dondurma seni yansıtıyor?",
        "Gelecekteki mesleğin hangi test ile belirlenir?",
        "En sevdiğin film karakterine göre kişilik analizi",
        "Beyin tipin: Mantıkçı mı hayalperest mi?",
        "Sana en uygun tatil şehri hangisi?",
        "Gizli bir yeteneğin var mı? Testle keşfet!",
        "Günlük alışkanlıklarına göre hangi hayvansın?",
        "Çocukluğundan kalma bir alışkanlığın hangisi?",
        "Hangisi seni daha iyi tanımlar: Deneyim mi, Bilgi mi?"
      ];
      const rnd = Math.floor(Math.random() * ornekler.length);
      document.getElementById("ai-oneri").innerText = ornekler[rnd];
    }
  </script>
</body>
</html>
