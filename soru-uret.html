<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Soru/Test Öner | Testlik.com</title>
  <meta name="description" content="Testlik.com - Kendi testini ya da sorunuzu önerin, yayınlansın!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="nav-flex">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html" class="active">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <main>
    <h1 class="main-title"><span class="emoji">💡</span> Soru/Test Öner</h1>
    <div class="soru-card">
      <form id="suggestForm">
        <label for="testTitle">Test Başlığı</label>
        <input type="text" id="testTitle" required placeholder="Başlık...">
        <label for="testDesc">Kısa Açıklama</label>
        <input type="text" id="testDesc" required placeholder="Test hakkında kısa bilgi...">
        <label for="testQ">Soru / Detay / Açıklama</label>
        <textarea id="testQ" required placeholder="Test sorusu, örnek seçenekler veya açıklamanı yaz..."></textarea>
        <button class="cta-btn" style="width:100%;" type="submit">Gönder</button>
      </form>
      <div id="formMsg" style="margin-top:13px;min-height:22px;"></div>
    </div>
  </main>
  <footer>
    <div class="footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="wise.png" alt="Wise" />
        <img src="payoneer.png" alt="Payoneer" />
        <img src="iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script>
    firebase.auth().onAuthStateChanged(function(user) {
      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        if (user) logoutBtn.style.display = 'inline-block';
        else logoutBtn.style.display = 'none';
      }
    });
    document.addEventListener('DOMContentLoaded', function() {
      var logoutBtnElem = document.getElementById('logout-btn');
      if (logoutBtnElem) {
        logoutBtnElem.onclick = function(e) {
          e.preventDefault();
          firebase.auth().signOut().then(() => {
            window.location.href = "index.html";
          });
        }
      }
    });

    // Öneri gönderme
    document.getElementById("suggestForm").onsubmit = async function(e) {
      e.preventDefault();
      const title = document.getElementById("testTitle").value.trim();
      const desc = document.getElementById("testDesc").value.trim();
      const detail = document.getElementById("testQ").value.trim();
      if (!title || !desc || !detail) {
        document.getElementById("formMsg").innerHTML = "<span style='color:#ed4a88;'>Tüm alanları doldurmalısın!</span>";
        return;
      }
      try {
        await db.collection("suggestions").add({
          title, desc, detail,
          createdAt: new Date(),
          status: "waiting"
        });
        document.getElementById("formMsg").innerHTML = "<span style='color:#13bd72;'>Önerin başarıyla gönderildi, onay sonrası yayınlanacak!</span>";
        document.getElementById("suggestForm").reset();
      } catch (err) {
        document.getElementById("formMsg").innerHTML = "<span style='color:#ed4a88;'>Hata oluştu! Lütfen tekrar dene.</span>";
      }
    };
  </script>
</body>
</html>
