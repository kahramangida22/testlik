<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Soru Öner | Testlik.com</title>
  <meta name="description" content="Testlik.com - Kendi sorunuzu/testinizi önerin, platforma katkı sağlayın!">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .so-wrap {max-width:510px;margin:39px auto 30px auto;background:#fff;border-radius:26px;box-shadow:0 2px 22px #735aff15;padding:33px 28px 25px 28px;}
    .so-title {color:#735aff;font-size:1.29em;font-weight:800;margin-bottom:19px;}
    .so-label {display:block;margin-bottom:7px;color:#735aff;font-weight:600;}
    .so-inp, .so-text {
      width:100%;padding:11px 8px;border-radius:11px;border:1.3px solid #ccbaff;font-size:1.03em;font-family:'Fredoka',Arial;background:#f5f0fa;
      margin-bottom:13px;
    }
    .so-text {min-height:80px;resize:vertical;}
    .so-btn {
      background:linear-gradient(90deg,#fd72ff 0%,#735aff 100%);
      color:#fff;font-weight:700;border-radius:13px;border:none;box-shadow:0 2px 11px #735aff14;padding:10px 28px;font-size:1.08em;cursor:pointer;
      transition:background .13s;margin-top:7px;
    }
    .so-btn:active{background:#ed4a88;}
    .so-sonuc {color:#ed4a88;font-size:1em;min-height:19px;margin-top:7px;}
  </style>
</head>
<body>
  <!-- Giriş Modalı -->
  <div class="modal-bg" id="login-modal" style="display:none;">
    <div class="modal-card">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <h2>Testlik.com'a Giriş</h2>
      <button class="modal-google" onclick="loginGoogle()">
        <img src="google-icon.png" style="height:22px;vertical-align:middle;margin-right:9px;"> Google ile Giriş Yap
      </button>
      <hr style="margin:23px 0 15px 0;opacity:.19;">
      <input type="email" id="login-email" class="modal-inp" placeholder="E-posta" style="width:95%;padding:11px;border-radius:9px;border:1px solid #ccbaff;">
      <input type="password" id="login-pass" class="modal-inp" placeholder="Şifre" style="width:95%;padding:11px;border-radius:9px;border:1px solid #ccbaff;margin-top:8px;">
      <button class="modal-btn" onclick="loginEmail()">Giriş Yap</button>
      <div id="login-error" style="color:#ed4a88;font-size:.98em;min-height:22px;margin-top:7px;"></div>
      <button class="modal-btn" style="margin-top:18px;background:#7a53c4;" onclick="registerEmail()">Kayıt Ol</button>
      <button class="modal-guest" onclick="guestLogin()">Üyeliksiz Devam Et</button>
    </div>
  </div>
  <!-- Header -->
  <header>
    <div class="nav-flex">
      <img src="logo.png" alt="Testlik.com Logo" class="logo" />
      <nav>
        <a href="index.html">Anasayfa</a>
        <a href="kategoriler.html">Kategoriler</a>
        <a href="sizdengelenler.html">Sizden Gelenler</a>
        <a href="soru-uret.html" class="active">Soru Üret</a>
        <a href="cark.html">Çarkıfelek</a>
        <a href="video-izle.html">Video İzle Kazan</a>
        <a href="favoriler.html">Favoriler</a>
        <a href="profil.html">Profil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="akademi.html">Akademi</a>
        <a href="istatistik.html">İstatistik</a>
        <a href="admin.html" class="admin-link" id="admin-link" style="display:none;">Admin</a>
        <a href="#" id="logout-btn" style="display:none;">Çıkış Yap</a>
      </nav>
    </div>
  </header>
  <!-- Main -->
  <main>
    <div class="so-wrap">
      <div class="so-title">Kendi Testini veya Sorunu Öner</div>
      <form id="so-form" onsubmit="return soruOnermek();">
        <label class="so-label" for="so-title">Konu Başlığı</label>
        <input class="so-inp" id="so-title" maxlength="50" required placeholder="Örneğin: Arkadaşlık Testi" />
        <label class="so-label" for="so-text">Soru/Detay</label>
        <textarea class="so-text" id="so-text" maxlength="600" required placeholder="Test/konu önerini buraya yaz"></textarea>
        <button class="so-btn" type="submit">Öneriyi Gönder</button>
        <div class="so-sonuc" id="so-sonuc"></div>
      </form>
    </div>
  </main>
  <!-- Footer -->
  <footer>
    <div class="footer-flex">
      <p>&copy; 2025 <b>Testlik.com</b> | <span style="color:#ff69b4;">Tüm Hakları Saklıdır</span></p>
      <div class="odeme-logo">
        <img src="wise.png" alt="Wise" />
        <img src="payoneer.png" alt="Payoneer" />
        <img src="iban.png" alt="IBAN" />
      </div>
    </div>
  </footer>
  <!-- Firebase/JS -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase.js"></script>
  <script src="main.js"></script>
  <script>
    // Modal ve admin linki
    firebase.auth().onAuthStateChanged(function(user) {
      var adminLink = document.getElementById('admin-link');
      if (adminLink) {
        if (user && (user.email === "admin@testlik.com" || user.email === "seninadminmailin@...")) adminLink.style.display = "inline-block";
        else adminLink.style.display = "none";
      }
      if (!user) openModal();
      else closeModal();
    });

    // Soru önerme fonksiyonu
    function soruOnermek() {
      var title = document.getElementById("so-title").value.trim();
      var text = document.getElementById("so-text").value.trim();
      var sonuc = document.getElementById("so-sonuc");
      firebase.auth().onAuthStateChanged(function(user) {
        if (!user) return;
        db.collection("suggestions").add({
          displayName: user.displayName || "",
          email: user.email || "",
          title,
          text,
          createdAt: new Date(),
          date: new Date().toLocaleString("tr-TR")
        }).then(() => {
          sonuc.innerText = "Önerin başarıyla iletildi! 🎉";
          document.getElementById("so-form").reset();
        }).catch(() => {
          sonuc.innerText = "Hata oluştu, tekrar dene!";
        });
      });
      return false;
    }
  </script>
</body>
</html>
